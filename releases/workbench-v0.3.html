<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Workbench</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js"></script>

  <style>
    /* === CSS VARIABLES (Spec §7.2) === */
    :root {
      --navy-midnight: #002244;
      --navy-sailor:   #005EB8;
      --navy-gold:     #C5B230;
      --navy-light:    #EAF2FB;

      --bg-main:       #f8fafc;
      --bg-surface:    #ffffff;
      --bg-raised:     #f1f5f9;
      --border:        #e2e8f0;
      --border-strong: #94a3b8;
      --text-main:     #1e293b;
      --text-muted:    #64748b;
      --text-faint:    #94a3b8;

      --accent:        var(--navy-sailor);
      --accent-light:  var(--navy-light);
      --accent-gold:   var(--navy-gold);

      --success: #059669;
      --warning: #f59e0b;
      --danger:  #dc2626;
      --info:    #0ea5e9;

      --likert-strong-pos:   #1d4ed8;
      --likert-pos:          #3b82f6;
      --likert-somewhat-pos: #93c5fd;
      --likert-neutral:      #94a3b8;
      --likert-somewhat-neg: #fdba74;
      --likert-neg:          #f97316;
      --likert-strong-neg:   #c2410c;

      --topbar-h:    48px;
      --sidebar-w:   268px;
      --console-h:   168px;
      --config-h:    200px;
    }

    [data-theme="dark"] {
      --bg-main:       #0a1628;
      --bg-surface:    #0f2040;
      --bg-raised:     #1a3056;
      --border:        #1e3a5f;
      --border-strong: #2d5a8e;
      --text-main:     #e2eaf4;
      --text-muted:    #7ea3c4;
      --text-faint:    #4a7099;
    }

    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: var(--bg-main);
      color: var(--text-main);
    }

    button { cursor: pointer; font-family: inherit; font-size: inherit; }

    input, select, textarea {
      font-family: inherit;
      font-size: inherit;
      color: var(--text-main);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }

    /* === TOP BAR === */
    #top-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: var(--topbar-h);
      background: var(--navy-midnight);
      border-bottom: 2px solid var(--navy-sailor);
      flex-shrink: 0;
      z-index: 100;
    }

    .app-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #fff;
      white-space: nowrap;
      margin-right: 6px;
    }

    .mode-toggle {
      display: flex;
      gap: 2px;
      background: rgba(0,0,0,0.35);
      border-radius: 6px;
      padding: 3px;
    }
    .mode-btn {
      padding: 4px 13px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn.active { background: var(--navy-sailor); color: #fff; }
    .mode-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #e2eaf4; }

    #active-dataset-indicator {
      padding: 3px 10px;
      background: rgba(0,0,0,0.25);
      border-radius: 4px;
      font-size: 11px;
      color: #7ea3c4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 300px;
      min-width: 120px;
    }
    #active-dataset-indicator.has-data { color: var(--navy-gold); }

    .flex-spacer { flex: 1; }

    .tb-btn {
      padding: 4px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      color: #c8d8e8;
      font-size: 11px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }
    #theme-toggle { padding: 4px 8px; font-size: 15px; line-height: 1; }

    /* === MODE PANELS === */
    .mode-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .mode-panel.hidden { display: none !important; }

    /* === PIPELINE MODE BODY === */
    #pipeline-body {
      flex: 1;
      display: flex;
      min-height: 0;
      overflow: hidden;
    }

    #pipeline-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* --- Config Panel --- */
    #config-panel {
      background: var(--bg-surface);
      display: flex;
      flex-direction: column;
      flex: 0 0 35%;
      min-height: 120px;
      overflow: hidden;
      position: relative;
      transition: flex-basis 0.2s ease;
    }
    #config-panel.collapsed {
      flex-basis: 32px !important;
      min-height: 0 !important;
      overflow: hidden;
    }
    #config-panel::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 20px;
      background: linear-gradient(transparent, var(--bg-surface));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 1;
    }
    #config-panel.has-overflow::after { opacity: 1; }

    /* --- Split Divider --- */
    #split-divider {
      flex: 0 0 6px;
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: ns-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      flex-shrink: 0;
    }
    #split-divider::before {
      content: '· · ·';
      font-size: 8px;
      color: var(--border-strong);
      letter-spacing: 3px;
    }
    #split-divider:hover { background: var(--accent-light); }
    #config-panel.collapsed + #split-divider { display: none; }

    .panel-header {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 32px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      flex-shrink: 0;
    }
    .panel-header:hover { background: var(--accent-light); color: var(--accent); }
    .panel-header .arrow { margin-left: auto; transition: transform 0.2s; font-style: normal; }
    .collapsed .panel-header .arrow { transform: rotate(-90deg); }

    #config-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .config-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-faint);
      font-size: 12px;
    }

    /* --- Data Inspector --- */
    #data-inspector {
      flex: 1;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-main);
      position: relative;
    }
    #data-inspector::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 20px;
      background: linear-gradient(transparent, var(--bg-main));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 1;
    }
    #data-inspector.has-overflow::after { opacity: 1; }

    #inspector-meta {
      padding: 5px 12px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #inspector-table-wrap {
      flex: 1;
      overflow: auto;
    }

    .inspector-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-faint);
      gap: 8px;
      font-size: 12px;
    }
    .inspector-empty .ei-icon { font-size: 32px; }

    .data-table {
      border-collapse: collapse;
      font-size: 12px;
      min-width: 100%;
      white-space: nowrap;
    }
    .data-table th {
      position: sticky;
      top: 0;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      padding: 0;
      z-index: 2;
      vertical-align: top;
    }
    .col-header-name {
      padding: 6px 8px 4px;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-main);
    }
    .vdp {
      border-top: 1px solid var(--border);
      padding: 3px 8px 5px;
      background: var(--bg-surface);
      font-size: 10px;
      color: var(--text-muted);
    }
    .vdp-stats { display: flex; gap: 8px; margin-bottom: 3px; }
    .vdp-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .vdp-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }
    .data-table td {
      border: 1px solid var(--border);
      padding: 3px 8px;
      color: var(--text-main);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .data-table tr:nth-child(even) td { background: var(--bg-raised); }
    .row-num-cell {
      color: var(--text-faint);
      font-size: 10px;
      text-align: right;
      padding: 3px 6px;
      user-select: none;
      width: 40px;
    }

    /* === PIPELINE SIDEBAR === */
    #pipeline-sidebar {
      width: var(--sidebar-w);
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #sidebar-header {
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: 32px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      flex-shrink: 0;
      gap: 6px;
    }

    #qv-toggle {
      margin-left: auto;
      padding: 2px 7px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 10px;
      color: var(--text-muted);
    }
    #qv-toggle.on { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    #node-list { flex: 1; overflow-y: auto; padding: 4px 0; }

    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: calc(100% - 16px);
      margin: 2px 8px;
      padding: 4px;
      background: transparent;
      border: 1px dashed var(--border-strong);
      border-radius: 4px;
      color: var(--text-faint);
      font-size: 11px;
      transition: all 0.15s;
    }
    .add-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    .node-card {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      margin: 1px 5px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.1s;
    }
    .node-card:hover { background: var(--bg-raised); }
    .node-card.selected { background: var(--accent-light); border-color: var(--accent); }

    .node-icon { font-size: 17px; flex-shrink: 0; }

    .node-info { flex: 1; min-width: 0; }
    .node-name {
      font-weight: 600;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .node-type-sub { font-size: 10px; color: var(--text-muted); }

    .node-star {
      background: none;
      border: none;
      font-size: 12px;
      padding: 0 2px;
      color: var(--text-faint);
      opacity: 0.5;
    }
    .node-star.starred { color: var(--accent-gold); opacity: 1; }

    .node-del {
      background: none;
      border: none;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      color: var(--text-faint);
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .node-card:hover .node-del { opacity: 1; }
    .node-del:hover { color: var(--danger); }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.idle    { background: var(--text-faint); }
    .status-dot.ok      { background: var(--success); }
    .status-dot.error   { background: var(--danger); }
    .status-dot.running { background: var(--warning); animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.4 } }

    /* --- Stash Panel --- */
    #stash-panel {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      max-height: 200px;
      overflow: hidden;
      transition: max-height 0.2s;
    }
    #stash-panel.collapsed { max-height: 32px; }

    #stash-list { overflow-y: auto; flex: 1; }

    .stash-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      font-size: 11px;
      border-bottom: 1px solid var(--border);
    }
    .stash-item:hover { background: var(--bg-raised); }
    .stash-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stash-ts { font-size: 10px; color: var(--text-faint); white-space: nowrap; }
    .stash-actions { display: flex; gap: 3px; }
    .stash-act {
      padding: 1px 5px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 10px;
      color: var(--text-muted);
    }
    .stash-act:hover { background: var(--accent-light); color: var(--accent); }
    .stash-empty { padding: 8px 10px; font-size: 11px; color: var(--text-faint); }

    /* === CONSOLE === */
    #console-panel {
      flex-shrink: 0;
      background: #080e1c;
      border-top: 1px solid #1e3a5f;
      display: flex;
      flex-direction: column;
      max-height: calc(var(--console-h) + 28px);
      overflow: hidden;
      transition: max-height 0.22s ease;
    }
    #console-panel.collapsed { max-height: 28px; }

    #console-header {
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: 28px;
      background: #0c1628;
      border-bottom: 1px solid #1e3a5f;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      gap: 6px;
    }
    #console-header span.label {
      font-size: 11px;
      font-weight: 700;
      color: #4a7099;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    #console-clear {
      padding: 1px 6px;
      background: transparent;
      border: 1px solid #1e3a5f;
      border-radius: 3px;
      font-size: 10px;
      color: #4a7099;
    }
    #console-clear:hover { color: #7ea3c4; }
    #console-arrow { margin-left: auto; color: #4a7099; }

    #console-log {
      height: var(--console-h);
      overflow-y: auto;
      padding: 5px 10px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
    }
    #console-panel.collapsed #console-log { display: none; }

    .log-line { padding: 1px 0; line-height: 1.55; }
    .log-ts { color: #2d5a8e; margin-right: 6px; }
    .log-line.info    .log-msg { color: #7ea3c4; }
    .log-line.error   .log-msg { color: #f87171; }
    .log-line.warn    .log-msg { color: #fbbf24; }
    .log-line.success .log-msg { color: #34d399; }

    /* === VIZ MODE === */
    #viz-mode { overflow: hidden; }

    #viz-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .viz-btn {
      padding: 5px 12px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-main);
      font-size: 12px;
      font-weight: 500;
    }
    .viz-btn:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .viz-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #viz-dataset-picker {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      min-width: 180px;
      max-width: 300px;
    }

    #viz-header-block {
      max-height: 100px;
      width: 100%;
      background: var(--navy-midnight);
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      overflow: hidden;
    }
    .viz-header-placeholder {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      font-style: italic;
    }

    #viz-filter-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
      min-height: 32px;
    }
    #viz-filter-bar.hidden { display: none; }
    .viz-clear-filters {
      margin-left: auto;
      padding: 2px 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .viz-clear-filters:hover { color: var(--danger); border-color: var(--danger); }

    #viz-main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }
    #viz-config-sidebar {
      width: 280px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-empty-msg {
      padding: 24px 16px;
      color: var(--text-faint);
      font-size: 12px;
      text-align: center;
    }
    .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
    .sidebar-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .sidebar-input { width: 100%; margin-bottom: 8px; }
    .sidebar-apply-btn {
      width: 100%;
      padding: 6px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .sidebar-apply-btn:hover { opacity: 0.88; }
    .sidebar-checkbox-list { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; }
    .sidebar-checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }

    #viz-canvas {
      flex: 1;
      overflow: auto;
      background: var(--bg-main);
      padding: 24px;
    }

    /* === VIZ CANVAS BLOCKS & ELEMENTS === */
    .dwb-block {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .dwb-block-header {
      display: flex;
      align-items: center;
      padding: 5px 10px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border);
      gap: 6px;
    }
    .dwb-block-handle { color: var(--text-faint); cursor: grab; font-size: 14px; user-select: none; }
    .dwb-block-label { font-size: 11px; color: var(--text-muted); flex: 1; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .dwb-block-menu-btn {
      padding: 2px 6px; background: transparent; border: none;
      color: var(--text-faint); cursor: pointer; font-size: 16px; border-radius: 3px; line-height: 1;
    }
    .dwb-block-menu-btn:hover { background: var(--border); color: var(--text-main); }

    .dwb-block-slots { display: flex; gap: 0; }

    .dwb-slot {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
      border-right: 1px solid var(--border);
      min-height: 80px;
      box-sizing: border-box;
    }
    .dwb-slot:last-child { border-right: none; }

    .dwb-element-card {
      background: var(--bg-raised);
      border: 2px solid transparent;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .dwb-element-card:hover { border-color: var(--border-strong); }
    .dwb-element-card.selected { border-color: var(--accent); }

    .dwb-element-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    .dwb-element-title-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      padding: 0;
      outline: none;
      min-width: 0;
    }
    .dwb-element-title-input:focus { background: var(--bg-raised); border-radius: 3px; padding: 0 4px; }
    .dwb-element-type-badge {
      font-size: 10px; color: var(--text-faint); background: var(--bg-main);
      border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; white-space: nowrap; flex-shrink: 0;
    }
    .dwb-element-menu-btn {
      padding: 2px 5px; background: transparent; border: none;
      color: var(--text-faint); cursor: pointer; font-size: 14px; border-radius: 3px; flex-shrink: 0; line-height: 1;
    }
    .dwb-element-menu-btn:hover { background: var(--border); }

    .dwb-element-content { padding: 12px; min-height: 120px; }

    .dwb-add-element-btn {
      display: block; width: 100%; padding: 6px; text-align: center;
      color: var(--text-faint); border: 1px dashed var(--border); border-radius: 4px;
      cursor: pointer; font-size: 12px; background: none;
    }
    .dwb-add-element-btn:hover { color: var(--accent); border-color: var(--accent); }

    .dwb-add-block-row { text-align: center; margin: 8px 0; }
    .dwb-add-block-btn {
      padding: 6px 20px; background: transparent;
      border: 1px dashed var(--border-strong); border-radius: 6px;
      color: var(--text-faint); font-size: 12px; cursor: pointer;
    }
    .dwb-add-block-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    .dwb-filter-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; background: var(--accent-light); color: var(--accent);

    }
    .dwb-filter-chip-remove {
      cursor: pointer; opacity: 0.6; font-weight: bold;

    }
    .dwb-filter-chip-remove:hover { opacity: 1; }

    .dwb-data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .dwb-data-table th {
      position: sticky; top: 0; background: var(--bg-raised);
      padding: 6px 10px; text-align: left; font-weight: 600;
      border-bottom: 2px solid var(--border-strong); white-space: nowrap;
    }
    .dwb-data-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .dwb-data-table tbody tr:hover { background: var(--bg-raised); }
    .dwb-table-scroll { overflow: auto; max-height: 400px; }
    .dwb-table-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 6px 0 8px; }
    .dwb-search-input {
      padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px;
      font-size: 13px; background: var(--bg-surface); color: var(--text-main);
    }
    .dwb-row-count { font-size: 12px; color: var(--text-muted); }
    mark { background: var(--accent-gold); color: var(--navy-midnight); border-radius: 2px; padding: 0 1px; }

    .dwb-empty-state {
      display: flex; align-items: center; justify-content: center;
      min-height: 120px; color: var(--text-faint); font-size: 14px;
      text-align: center; padding: 24px;
    }

    /* Context menus */
    .dwb-ctx-menu {
      position: fixed; background: var(--bg-surface); border: 1px solid var(--border-strong);
      border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 600; min-width: 160px; padding: 4px 0;
    }
    .dwb-ctx-item {
      display: block; width: 100%; padding: 7px 14px; text-align: left;
      background: none; border: none; font-size: 13px; color: var(--text-main); cursor: pointer;
    }
    .dwb-ctx-item:hover { background: var(--bg-raised); }
    .dwb-ctx-item.danger { color: var(--danger); }

    /* Add block dialog buttons */
    .layout-opt-btn {
      flex: 1; padding: 10px 8px; background: var(--bg-raised);
      border: 2px solid var(--border); border-radius: 6px;
      font-size: 12px; font-weight: 500; color: var(--text-main);
      text-align: center; cursor: pointer; transition: all 0.15s;
    }
    .layout-opt-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .layout-opt-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .ratio-opt-btn {
      padding: 5px 10px; background: var(--bg-raised); border: 2px solid var(--border);
      border-radius: 4px; font-size: 11px; font-weight: 500; color: var(--text-muted); cursor: pointer;
    }
    .ratio-opt-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ratio-opt-btn.selected { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* Element picker */
    .element-picker-cat {
      font-size: 10px; font-weight: 800; color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.09em; padding: 8px 8px 3px;
    }
    .element-picker-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
    .element-picker-item:hover { background: var(--bg-raised); }
    .element-picker-icon { font-size: 20px; flex-shrink: 0; }
    .element-picker-title { font-weight: 600; font-size: 13px; }
    .element-picker-desc { font-size: 11px; color: var(--text-muted); }
    .element-recommended {
      display: inline-block; padding: 1px 5px; background: var(--accent-light);
      color: var(--accent); border-radius: 3px; font-size: 10px; font-weight: 600; margin-left: 6px;
    }

    /* Presentation mode */
    .presentation-mode #top-bar,
    .presentation-mode #viz-toolbar,
    .presentation-mode #viz-config-sidebar,
    .presentation-mode .dwb-block-menu,
    .presentation-mode .dwb-element-menu,
    .presentation-mode .dwb-add-block-row,
    .presentation-mode .dwb-add-element-btn { display: none !important; }
    .presentation-mode #viz-canvas { padding: 0; }

    /* === NODE PICKER MODAL === */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .overlay.hidden { display: none; }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: 10px;

      overflow: hidden;

    }

    #node-picker { width: 480px; max-height: 72vh; }

    .modal-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);

      font-size: 14px;

    .modal-close {
      margin-left: auto;

      border: none;

    }

    #picker-search {

    }

    .picker-cat {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 8px 8px 3px;
    }

      background: var(--accent);
      border: none;
      border-radius: 5px;

    }

    .btn-secondary {
      padding: 6px 14px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-main);
      font-size: 12px;
    }
    .btn-secondary:hover { background: var(--border); }

    /* === SCROLLBARS === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
  <span class="app-title">⚓ Data Workbench</span>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-pm" onclick="DWB.setMode('pipeline')">⚙ Pipeline</button>
    <button class="mode-btn"        id="btn-vm" onclick="DWB.setMode('viz')">📊 Visualize</button>
  </div>

  <div id="active-dataset-indicator">No active dataset</div>
  <div class="flex-spacer"></div>

  <button class="tb-btn" onclick="DWB.saveWorkflow()">💾 Save</button>
  <button class="tb-btn" onclick="DWB.showLoadModal()">📂 Load</button>
  <button class="tb-btn" onclick="DWB.exportWorkflow()">⬇ Export</button>
  <label  class="tb-btn" style="cursor:pointer">⬆ Import
    <input type="file" accept=".json" style="display:none" onchange="DWB._importWorkflowFile(this)">
  </label>

  <button class="tb-btn" id="theme-toggle" onclick="DWB.toggleTheme()">🌙</button>
</div>

<!-- ============================================================
     PIPELINE MODE
     ============================================================ -->
<div id="pipeline-mode" class="mode-panel">

  <div id="pipeline-body">

    <!-- MAIN: config + inspector -->
    <div id="pipeline-main">

      <!-- Config Panel (collapsible) -->
      <div id="config-panel">
        <div class="panel-header" onclick="DWB.togglePanel('config-panel')">
          <span id="config-title">Node Config</span>
          <i class="arrow">▾</i>
        </div>
        <div id="config-body">
          <div class="config-empty">Select a node to configure it.</div>
        </div>
      </div>

      <!-- Resizable split divider -->
      <div id="split-divider"></div>

      <!-- Data Inspector -->
      <div id="data-inspector">
        <div id="inspector-meta">No data loaded</div>
        <div id="inspector-table-wrap">
          <div class="inspector-empty">
            <span class="ei-icon">📋</span>
            <span>Run a node to see data here.</span>
          </div>
        </div>
      </div>

    </div>

    <!-- PIPELINE TRACK SIDEBAR -->
    <div id="pipeline-sidebar">

      <div id="sidebar-header">
        Pipeline
        <button id="qv-toggle" onclick="DWB.toggleQuickView()" title="Show starred nodes only">⭐ Quick View</button>
      </div>

      <div id="stash-panel">
        <div class="panel-header" onclick="DWB.togglePanel('stash-panel')">
          <span>Stashes</span>

          <div class="stash-empty">No stashes yet.</div>

    <div id="console-header" onclick="DWB.togglePanel('console-panel')">

      <button id="console-clear" onclick="event.stopPropagation();DWB.clearConsole()">Clear</button>
      <span id="console-arrow">▲</span>
    </div>

</div>

<!-- ============================================================
     VIZ MODE
     ============================================================ -->
<div id="viz-mode" class="mode-panel hidden">

  <!-- Viz Toolbar -->
  <div id="viz-toolbar">
    <button class="viz-btn" id="btn-add-block" onclick="DWB.viz && DWB.viz.showAddBlockDialog()">＋ Add Block</button>
    <select id="viz-dataset-picker" onchange="DWB.viz && DWB.viz.onDatasetPickerChange(this.value)">
      <option value="">No datasets — push data from pipeline</option>
    </select>
    <div class="flex-spacer"></div>
    <button class="viz-btn" id="btn-presentation" onclick="DWB.viz && DWB.viz.togglePresentation()">⛶ Presentation</button>
    <button class="viz-btn" disabled title="Coming soon">📤 Export PPTX</button>
    <button class="viz-btn" disabled title="Coming soon">🌐 Export HTML</button>

<!-- ============================================================
     NODE PICKER MODAL
     ============================================================ -->

      Add Node
      <button class="modal-close" onclick="DWB.closePicker()">✕</button>

<!-- ============================================================

     ============================================================ -->
<div id="wf-overlay" class="overlay hidden" onclick="if(event.target===this)DWB.closeWfModal()">

      Load Workflow
      <button class="modal-close" onclick="DWB.closeWfModal()">✕</button>

      <div class="wf-list" id="wf-list"></div>

     ============================================================ -->

      Add Block
      <button class="modal-close" onclick="DWB.viz&&DWB.viz.closeAddBlockDialog()">✕</button>

        <button class="layout-opt-btn" data-layout="2col" onclick="DWB.viz._selectBlockLayout('2col',this)">2 Columns</button>
        <button class="layout-opt-btn" data-layout="3col" onclick="DWB.viz._selectBlockLayout('3col',this)">3 Columns</button>

      Add Element
      <button class="modal-close" onclick="DWB.viz&&DWB.viz.closeElementPicker()">✕</button>

<script>
// ================================================================
//  CORE ENGINE  (Spec §5.3)
// ================================================================
window.DWB = (() => {
  'use strict';

  // ---- Internal state ----
  const _typeDefs       = {};
  const pipeline        = { nodes: [], activeNodeId: null };
  const stashes         = {};
  const promotedDatasets = {};
  const vizState        = { _elementRegistry: {}, _headerRegistry: {} };
  let activeDataset = null;
  let _mode      = 'pipeline';
  let _quickView = false;
  let _insertIdx = 0;

  // ---- Utilities ----
  const _uid = () => 'n' + Math.random().toString(36).slice(2, 9);
  const _hms = () => new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });

  function parseCSV(text) {
    const result = Papa.parse(text, {
      header: false,
      skipEmptyLines: true,
      trimHeaders: false
    });
    if (!result.data || result.data.length < 1) {
      return { headers: [], rows: [] };
    }
    if (result.errors && result.errors.length > 0) {
      const msgs = result.errors.slice(0, 3).map(e => e.message).join('; ');
      log(`CSV parse warnings: ${msgs}`, 'warn');
    }
    const headers = result.data[0].map(h => String(h).trim());
    const rows    = result.data.slice(1);
    return { headers, rows };
  }

  function generateOptions(headers, selected) {
    return headers.map(h =>
      `<option value="${h}"${h === selected ? ' selected' : ''}>${h}</option>`
    ).join('');
  }

  function toObjects(data) {
    if (!data?.headers?.length) return [];
    return data.rows.map(row =>
      Object.fromEntries(data.headers.map((h, i) => [h, row[i] ?? '']))
    );
  }

  function fromObjects(arr, headers) {
    const hdrs = headers || (arr[0] ? Object.keys(arr[0]) : []);
    return { headers: hdrs, rows: arr.map(o => hdrs.map(h => o[h] ?? '')) };
  }

  // ---- Console ----
  function log(msg, level) {
    const el = document.getElementById('console-log');
    if (!el) return;
    const cls = level === true || level === 'error' ? 'error'
              : level === 'warn'    ? 'warn'
              : level === 'success' ? 'success'
              : 'info';
    const line = document.createElement('div');
    line.className = `log-line ${cls}`;
    line.innerHTML = `<span class="log-ts">${_hms()}</span><span class="log-msg">${String(msg)}</span>`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function clearConsole() {
    const el = document.getElementById('console-log');
    if (el) el.innerHTML = '';
  }

  // ---- Stash ----
  function getStash(name) { return stashes[name] || null; }

  function setStash(name, data, nodeId) {
    stashes[name] = { name, data, timestamp: new Date(), nodeId: nodeId || null };
    _renderStashes();
    log(`Stashed "${name}" — ${data.rows.length} rows`);
  }

  function listStashes() { return Object.keys(stashes); }

  function _deleteStash(name) {
    delete stashes[name];
    _renderStashes();
    log(`Stash "${name}" deleted`);
  }

  function _renderStashes() {
    const el = document.getElementById('stash-list');
    const names = Object.keys(stashes);
    if (!names.length) { el.innerHTML = '<div class="stash-empty">No stashes yet.</div>'; return; }
    el.innerHTML = names.map(name => {
      const s = stashes[name];
      const ts = s.timestamp instanceof Date
        ? s.timestamp.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';
      return `<div class="stash-item">
        <span class="stash-name" title="${name}">${name}</span>
        <span class="stash-ts">${ts}</span>
        <div class="stash-actions">
          <button class="stash-act" onclick="DWB.promoteToActive('${name}',DWB.getStash('${name}').data)" title="Promote to active">▲</button>
          <button class="stash-act" onclick="DWB._deleteStash('${name}')" title="Delete">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  // ---- Data utilities ----
  function passthroughCopy(data) {
    const out = {
      headers: [...data.headers],
      rows: data.rows.map(r => [...r])
    };
    if (data.columnTypes)    out.columnTypes    = [...data.columnTypes];
    if (data.columnTypeMeta) out.columnTypeMeta = Object.assign({}, data.columnTypeMeta);
    return out;
  }

  function inferTypes(data) {
    const LIKERT_SCALES = [
      ['strongly disagree','disagree','neutral','agree','strongly agree'],
      ['strongly disagree','disagree','neither agree nor disagree','agree','strongly agree'],
      ['never','rarely','sometimes','often','always'],
      ['very dissatisfied','dissatisfied','neutral','satisfied','very satisfied'],
      ['not at all','barely','neutral','somewhat','strongly'],
      ['not at all','slightly','moderately','very','extremely'],
      ['poor','fair','good','very good','excellent'],
      ['1','2','3','4','5'],
      ['1','2','3','4'],
      ['yes','no'],
      ['true','false'],
      ['complete','incomplete'],
      ['yes','no','n/a'],
    ];

    return data.headers.map((header, colIdx) => {
      const values = data.rows
        .map(r => String(r[colIdx] ?? '').trim())
        .filter(v => v !== '');

      if (values.length === 0) return 'text';

      const uniqueVals  = [...new Set(values.map(v => v.toLowerCase()))];
      const uniqueCount = uniqueVals.length;
      const totalCount  = values.length;

      // Likert: unique values are a subset of a known scale
      for (const scale of LIKERT_SCALES) {
        const inScale    = uniqueVals.filter(v => scale.includes(v));
        const outOfScale = uniqueVals.filter(v => !scale.includes(v));
        if (
          inScale.length >= Math.min(2, scale.length) &&
          outOfScale.length === 0 &&
          uniqueCount <= scale.length
        ) return 'likert';
      }

      // Number: >80% of non-empty values parse as finite float
      const numericCount = values.filter(v => {
        const cleaned = v.replace(/[$,%\s]/g, '');
        return cleaned !== '' && isFinite(parseFloat(cleaned));
      }).length;
      if (numericCount / totalCount > 0.8) return 'number';

      // Date: >80% parse as valid dates, value length > 4 chars
      const dateCount = values.filter(v => {
        if (v.length <= 4) return false;
        const d = new Date(v);
        return !isNaN(d.getTime());
      }).length;
      if (dateCount / totalCount > 0.8) return 'date';

      // Categorical: uniqueCount <= 20 AND unique ratio <= 15%, not free text
      if (uniqueCount <= 20 && uniqueCount / totalCount <= 0.15) {
        const avgWords = values.reduce((sum, v) =>
          sum + v.split(/\s+/).length, 0) / totalCount;
        if (avgWords <= 4) return 'categorical';
      }

      return 'text';
    });
  }

  // ---- Config update (no re-render) ----
  function updateConfig(nodeId, key, value) {
    const node = pipeline.nodes.find(n => n.id === nodeId);
    if (node) node.config[key] = value;
  }

  // ---- Active Dataset ----
  function promoteToActive(name, data) {
    const columnTypes    = data.columnTypes    ? [...data.columnTypes]           : inferTypes(data);
    const columnTypeMeta = data.columnTypeMeta ? Object.assign({}, data.columnTypeMeta) : {};
    activeDataset = {
      name, data,
      objects: toObjects(data),
      rowCount: data.rows.length,
      promotedFrom: null,
      timestamp: new Date(),
      columnTypes,
      columnTypeMeta
    };
    promotedDatasets[name] = {
      name,
      headers: data.headers,
      rows: data.rows,
      columnTypes,
      columnTypeMeta,
      rowCount: data.rows.length,
      timestamp: new Date()
    };
    const ind = document.getElementById('active-dataset-indicator');
    ind.textContent = `Active: ${name} · ${data.rows.length.toLocaleString()} rows`;
    ind.classList.add('has-data');
    log(`Promoted "${name}" to active dataset (${data.rows.length} rows)`, 'success');
    const tc = { number: 0, date: 0, categorical: 0, likert: 0, text: 0 };
    columnTypes.forEach(t => { if (tc[t] !== undefined) tc[t]++; else tc.text++; });
    log(`Type inference — number: ${tc.number}, date: ${tc.date}, categorical: ${tc.categorical}, likert: ${tc.likert}, text: ${tc.text}`);
  }

  function getColumnMeta(colIndex) {
    if (!activeDataset) return { type: 'text', meta: null };
    return {
      type: (activeDataset.columnTypes || [])[colIndex] || 'text',
      meta: (activeDataset.columnTypeMeta || {})[colIndex] || null
    };
  }

  // ---- Theme ----
  function toggleTheme() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = dark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('dwb_theme', next);
    document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
  }

  function _applyTheme() {
    const t = localStorage.getItem('dwb_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
  }

  // ---- Panel collapse ----
  function togglePanel(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('collapsed');
    if (id === 'console-panel') {
      const arrow = document.getElementById('console-arrow');
      if (arrow) arrow.textContent = el.classList.contains('collapsed') ? '▲' : '▼';
    }
  }

  // ---- Mode ----
  function setMode(mode) {
    _mode = mode;
    document.getElementById('pipeline-mode').classList.toggle('hidden', mode !== 'pipeline');
    document.getElementById('viz-mode').classList.toggle('hidden', mode !== 'viz');
    document.getElementById('btn-pm').classList.toggle('active', mode === 'pipeline');
    document.getElementById('btn-vm').classList.toggle('active', mode === 'viz');
  }

  // ---- Node registration ----
  function register(type, def) {
    _typeDefs[type] = def;
    log(`Registered: ${type}`);
  }

  function registerElement(key, def) {
    vizState._elementRegistry[key] = def;
    log(`Registered element: ${key}`);
  }

  function registerHeaderElement(key, def) {
    vizState._headerRegistry[key] = def;
    log(`Registered header element: ${key}`);
  }

  // ---- Pipeline: node CRUD ----
  function _mkNode(type) {
    const def = _typeDefs[type];
    return {
      id: _uid(), type,
      customName: def?.title || type,
      isStarred: false,
      status: 'idle',
      config: JSON.parse(JSON.stringify(def?.defaultConfig || {})),
      output: null, errorMsg: null
    };
  }

  function addNode(type, atIdx) {
    const node = _mkNode(type);
    pipeline.nodes.splice(atIdx, 0, node);
    renderTrack();
    selectNode(node.id);
    log(`Added: ${_typeDefs[type]?.title || type}`);
  }

  function selectNode(id) {
    pipeline.activeNodeId = id;
    renderTrack();
    renderActiveNode();
    // Show output in inspector if node has run
    const node = pipeline.nodes.find(n => n.id === id);
    if (node?.output) renderDataInspector(node.output);
  }

  // ---- Pipeline execution ----
  function runFrom(nodeId) {
    const startIdx = nodeId
      ? pipeline.nodes.findIndex(n => n.id === nodeId)
      : 0;
    if (startIdx < 0) { log(`Node ${nodeId} not found`, 'error'); return; }

    let input = startIdx > 0 ? (pipeline.nodes[startIdx - 1].output || null) : null;

    for (let i = startIdx; i < pipeline.nodes.length; i++) {
      const node = pipeline.nodes[i];
      const def  = _typeDefs[node.type];
      if (!def) { log(`Unknown type: ${node.type}`, 'error'); break; }

      node.status = 'running';
      _updateCard(node.id);

      try {
        def.execute(node, input);
        node.status = 'ok';
        input = node.output || null;
        log(`✓ ${node.customName || def.title}`, 'success');
      } catch (e) {
        node.status = 'error';
        node.errorMsg = e.message;
        _updateCard(node.id);
        log(`✗ ${node.customName || def.title}: ${e.message}`, 'error');
        break;
      }
      _updateCard(node.id);
    }

    // Show active node's output (or last node's)
    const active = pipeline.nodes.find(n => n.id === pipeline.activeNodeId);
    const target = (active?.output ? active : pipeline.nodes[pipeline.nodes.length - 1]);
    if (target?.output) renderDataInspector(target.output);
  }

  // ---- Split divider ----
  function _initSplitDivider() {
    const divider  = document.getElementById('split-divider');
    const main     = document.getElementById('pipeline-main');
    const cfgPanel = document.getElementById('config-panel');
    if (!divider || !main || !cfgPanel) return;

    function applyH(h) {
      cfgPanel.style.flexBasis = h + 'px';
    }

    function clampH(raw) {
      const rect = main.getBoundingClientRect();
      return Math.max(120, Math.min(rect.height - 120 - 6, raw));
    }

    // Restore saved ratio
    const savedRatio = parseFloat(localStorage.getItem('dwb_split_ratio') || '0.35');
    requestAnimationFrame(() => {
      const rect = main.getBoundingClientRect();
      if (rect.height > 0) applyH(clampH(rect.height * savedRatio));
    });

    // Mouse drag
    let dragging = false;
    divider.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      dragging = true;
      e.preventDefault();
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    function onMove(e) {
      if (!dragging) return;
      const h = clampH(e.clientY - main.getBoundingClientRect().top);
      applyH(h);
      localStorage.setItem('dwb_split_ratio', (h / main.getBoundingClientRect().height).toFixed(3));
    }
    function onUp() {
      dragging = false;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }

    // Touch drag
    divider.addEventListener('touchstart', () => {
      document.addEventListener('touchmove', onTouchMove, { passive: false });
      document.addEventListener('touchend', onTouchEnd);
    }, { passive: true });
    function onTouchMove(e) {
      e.preventDefault();
      const h = clampH(e.touches[0].clientY - main.getBoundingClientRect().top);
      applyH(h);
      localStorage.setItem('dwb_split_ratio', (h / main.getBoundingClientRect().height).toFixed(3));
    }
    function onTouchEnd() {
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
    }
  }

  // ---- Config panel ----
  function renderActiveNode() {
    const node = pipeline.nodes.find(n => n.id === pipeline.activeNodeId);
    const body  = document.getElementById('config-body');
    const title = document.getElementById('config-title');
    const panel = document.getElementById('config-panel');

    if (!node) {
      body.innerHTML  = '<div class="config-empty">Select a node to configure it.</div>';
      title.textContent = 'Node Config';
      panel.classList.remove('has-overflow');
      return;
    }
    const def = _typeDefs[node.type];
    title.textContent = `${def?.icon || ''} ${node.customName}`;
    panel.classList.remove('collapsed');

    const idx = pipeline.nodes.indexOf(node);
    const prevData = idx > 0 ? (pipeline.nodes[idx - 1].output || null) : null;

    if (def?.renderConfig) {
      def.renderConfig(node, prevData);
    } else {
      body.innerHTML = `<div style="padding:8px;font-size:12px;color:var(--text-muted)">
        Type: <strong>${node.type}</strong><br>No config UI for this node.
      </div>`;
    }

    panel.classList.toggle('has-overflow', body.scrollHeight > body.clientHeight);
  }

  // ---- Pipeline track ----
  function renderTrack() {
    const list  = document.getElementById('node-list');
    const nodes = _quickView ? pipeline.nodes.filter(n => n.isStarred) : pipeline.nodes;

    let html = `<button class="add-btn" onclick="DWB.openPicker(0)">＋ Add Node</button>`;

    if (_quickView && !nodes.length) {
      html += `<div style="padding:12px;text-align:center;font-size:11px;color:var(--text-faint)">No starred nodes.</div>`;
    }

    nodes.forEach(node => {
      const def = _typeDefs[node.type] || {};
      const realIdx = pipeline.nodes.indexOf(node) + 1;
      const sel = node.id === pipeline.activeNodeId ? ' selected' : '';
      html += `
      <div class="node-card${sel}" data-nid="${node.id}" onclick="DWB.selectNode('${node.id}')">
        <span class="node-icon">${def.icon || '⬜'}</span>
        <div class="node-info">
          <div class="node-name">${node.customName}</div>
          <div class="node-type-sub">${def.title || node.type}</div>
        </div>
        <button class="node-star${node.isStarred?' starred':''}"
          onclick="event.stopPropagation();DWB._toggleStar('${node.id}')"
          title="${node.isStarred?'Unstar':'Star'}">★</button>
        <span class="status-dot ${node.status}"></span>
        <button class="node-del"
          onclick="event.stopPropagation();DWB.deleteNode('${node.id}')"
          title="Delete node">×</button>
      </div>
      <button class="add-btn" onclick="DWB.openPicker(${realIdx})">＋</button>`;
    });

    list.innerHTML = html;
  }

  function _updateCard(nodeId) {
    const node = pipeline.nodes.find(n => n.id === nodeId);
    if (!node) return;
    const card = document.querySelector(`[data-nid="${nodeId}"]`);
    if (!card) { renderTrack(); return; }
    const dot = card.querySelector('.status-dot');
    if (dot) dot.className = `status-dot ${node.status}`;
  }

  function _toggleStar(nodeId) {
    const node = pipeline.nodes.find(n => n.id === nodeId);
    if (node) { node.isStarred = !node.isStarred; renderTrack(); }
  }

  function deleteNode(nodeId) {
    const idx = pipeline.nodes.findIndex(n => n.id === nodeId);
    if (idx < 0) return;
    const node = pipeline.nodes[idx];
    const def  = _typeDefs[node.type] || {};

    if (node.output !== null) {
      if (!confirm(`Delete "${node.customName || def.title}"?`)) return;
    }

    const wasActive = pipeline.activeNodeId === nodeId;
    pipeline.nodes.splice(idx, 1);
    if (wasActive) pipeline.activeNodeId = null;

    renderTrack();
    renderActiveNode();

    if (pipeline.nodes.length === 0) {
      renderDataInspector(null);
    } else if (idx < pipeline.nodes.length) {
      runFrom(pipeline.nodes[idx].id);
    }

    log(`Deleted: ${node.customName || def.title}`);
  }

  // ---- Quick View ----
  function toggleQuickView() {
    _quickView = !_quickView;
    document.getElementById('qv-toggle').classList.toggle('on', _quickView);
    renderTrack();
  }

  // ---- Node picker ----
  function openPicker(idx) {
    _insertIdx = idx;
    _renderPickerList('');
    document.getElementById('picker-overlay').classList.remove('hidden');
    const s = document.getElementById('picker-search');
    s.value = ''; s.focus();
  }

  function closePicker() {
    document.getElementById('picker-overlay').classList.add('hidden');
  }

  function _renderPickerList(q) {
    const list = document.getElementById('picker-list');
    const lq   = q.toLowerCase();
    const byCat = {};
    for (const [type, def] of Object.entries(_typeDefs)) {
      if (!def.implemented) continue;
      if (lq && !def.title.toLowerCase().includes(lq) && !(def.desc||'').toLowerCase().includes(lq)) continue;
      const cat = def.category || 'Other';
      (byCat[cat] = byCat[cat] || []).push({ type, def });
    }
    if (!Object.keys(byCat).length) {
      list.innerHTML = `<div style="padding:16px;color:var(--text-faint);font-size:12px">No nodes match.</div>`;
      return;
    }
    list.innerHTML = Object.entries(byCat).map(([cat, items]) =>
      `<div class="picker-cat">${cat}</div>` +
      items.map(({ type, def }) =>
        `<div class="picker-item" onclick="DWB._pickNode('${type}')">
          <span class="picker-item-icon">${def.icon || '⬜'}</span>
          <div>
            <div class="picker-item-title">${def.title}</div>
            <div class="picker-item-desc">${def.desc || ''}</div>
          </div>
        </div>`
      ).join('')
    ).join('');
  }

  function _filterPicker(q) { _renderPickerList(q); }

  function _pickNode(type) {
    closePicker();
    addNode(type, _insertIdx);
  }

  // ---- Data Inspector ----
  function renderDataInspector(data) {
    const wrap = document.getElementById('inspector-table-wrap');
    const meta = document.getElementById('inspector-meta');

    const insp = document.getElementById('data-inspector');
    if (!data?.headers?.length) {
      wrap.innerHTML = `<div class="inspector-empty">
        <span class="ei-icon">📋</span><span>No data to display.</span>
      </div>`;
      meta.textContent = 'No data';
      insp?.classList.remove('has-overflow');
      return;
    }

    const MAX = 200;
    const display = data.rows.slice(0, MAX);
    meta.textContent = `Showing ${display.length.toLocaleString()} of ${data.rows.length.toLocaleString()} rows · ${data.headers.length} columns`;

    // VDP stats
    const stats = data.headers.map((_, ci) => {
      const vals   = data.rows.map(r => r[ci] ?? '');
      const filled = vals.filter(v => v !== '');
      const unique = new Set(filled).size;
      const freq   = {};
      filled.forEach(v => { freq[v] = (freq[v] || 0) + 1; });
      const top = Object.values(freq).sort((a,b) => b-a)[0] || 0;
      const topPct = filled.length ? Math.round((top / filled.length) * 100) : 0;
      return { total: data.rows.length, filled: filled.length, unique, topPct };
    });

    let html = `<table class="data-table"><thead><tr>
      <th><div style="padding:6px 8px;font-size:11px;color:var(--text-faint)">#</div>
          <div class="vdp"><div class="vdp-stats"><span>row</span></div></div></th>`;

    data.headers.forEach((h, ci) => {
      const s = stats[ci];
      html += `<th>
        <div class="col-header-name" title="${h}">${h}</div>
        <div class="vdp">
          <div class="vdp-stats">
            <span title="Non-empty values">${s.filled.toLocaleString()} vals</span>
            <span title="Unique values">${s.unique.toLocaleString()} uniq</span>
          </div>
          <div class="vdp-bar-track">
            <div class="vdp-bar-fill" style="width:${s.topPct}%" title="Top value: ${s.topPct}% of filled"></div>
          </div>
        </div>
      </th>`;
    });

    html += '</tr></thead><tbody>';
    display.forEach((row, ri) => {
      html += `<tr><td class="row-num-cell">${ri + 1}</td>`;
      data.headers.forEach((_, ci) => {
        const v = String(row[ci] ?? '');
        html += `<td title="${v.replace(/"/g,'&quot;')}">${v}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
    insp?.classList.toggle('has-overflow', wrap.scrollHeight > wrap.clientHeight);
  }

  // ---- Viz CSV drop ----
  function _vizDrop(event) {
    event.preventDefault();
    const f = event.dataTransfer.files[0];
    if (f) _loadVizCSV(f);
  }

  function _vizFileInput(input) {
    if (input.files[0]) _loadVizCSV(input.files[0]);
  }

  function _loadVizCSV(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const data = parseCSV(e.target.result);
      const label = file.name.replace(/\.csv$/i, '');
      const ingest = { id: _uid(), type: 'INGEST', customName: file.name, isStarred: false,
        status: 'ok', config: { fileName: file.name }, output: data, errorMsg: null };
      const push   = { id: _uid(), type: 'PUSH_TO_VIZ', customName: label, isStarred: false,
        status: 'ok', config: { datasetName: label }, output: data, errorMsg: null };
      pipeline.nodes.push(ingest, push);
      renderTrack();
      promoteToActive(label, data);
      if (vizState.onDatasetPromoted) vizState.onDatasetPromoted(label);
    };
    reader.readAsText(file);
  }

  // ---- Workflow ----
  function _serialize(name) {
    return {
      version: '1.0', name,
      savedAt: new Date().toISOString(),
      nodes: pipeline.nodes.map(n => ({
        id: n.id, type: n.type, customName: n.customName,
        isStarred: n.isStarred,
        config: Object.fromEntries(Object.entries(n.config).filter(([k]) => k !== 'fileData'))
      })),
      stashNames: Object.keys(stashes)
    };
  }

  function _apply(wf) {
    pipeline.nodes = (wf.nodes || []).map(n =>
      ({ ...n, status: 'idle', output: null, errorMsg: null })
    );
    pipeline.activeNodeId = null;
    renderTrack();
    renderActiveNode();
    log(`Workflow "${wf.name}" applied (${pipeline.nodes.length} nodes)`, 'success');
  }

  function saveWorkflow() {
    const name = prompt('Workflow name:', `workflow_${new Date().toISOString().slice(0,10)}`);
    if (!name) return;
    const store = JSON.parse(localStorage.getItem('dwb_workflows') || '{}');
    store[name] = _serialize(name);
    localStorage.setItem('dwb_workflows', JSON.stringify(store));
    log(`Saved workflow "${name}"`, 'success');
  }

  function showLoadModal() {
    const store = JSON.parse(localStorage.getItem('dwb_workflows') || '{}');
    const names = Object.keys(store);
    const list = document.getElementById('wf-list');
    list.innerHTML = names.length
      ? names.map(n => {
          const wf = store[n];
          const dt = wf.savedAt ? new Date(wf.savedAt).toLocaleString() : '';
          return `<div class="wf-item">
            <span class="wf-item-name" onclick="DWB._loadWf('${n}');DWB.closeWfModal()">${n}</span>
            <span class="wf-item-date">${dt}</span>
            <button class="wf-item-del" onclick="DWB._delWf('${n}')">✕</button>
          </div>`;
        }).join('')
      : '<div class="wf-item" style="color:var(--text-faint)">No saved workflows.</div>';
    document.getElementById('wf-overlay').classList.remove('hidden');
  }

  function closeWfModal() { document.getElementById('wf-overlay').classList.add('hidden'); }

  function _loadWf(name) {
    const store = JSON.parse(localStorage.getItem('dwb_workflows') || '{}');
    if (store[name]) _apply(store[name]);
  }

  function _delWf(name) {
    const store = JSON.parse(localStorage.getItem('dwb_workflows') || '{}');
    delete store[name];
    localStorage.setItem('dwb_workflows', JSON.stringify(store));
    showLoadModal();
  }

  function exportWorkflow() {
    const name = prompt('Export as:', `workflow_${new Date().toISOString().slice(0,10)}`);
    if (!name) return;
    const blob = new Blob([JSON.stringify(_serialize(name), null, 2)], { type: 'application/json' });
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: `${name}.json` });
    a.click();
    log(`Exported "${name}.json"`, 'success');
  }

  function _importWorkflowFile(input) {
    const f = input.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = e => {
      try { _apply(JSON.parse(e.target.result)); }
      catch(err) { log(`Import failed: ${err.message}`, 'error'); }
    };
    reader.readAsText(f);
  }

  // ---- Init ----
  function _init() {
    _applyTheme();
    _initSplitDivider();
    renderTrack();
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closePicker();
        closeWfModal();
        if (document.documentElement.classList.contains('presentation-mode')) {
          if (vizState.togglePresentation) vizState.togglePresentation();
        }
      }
      if ((e.key === 'f' || e.key === 'F') && _mode === 'viz') {
        const tag = document.activeElement ? document.activeElement.tagName : '';
        if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT') {
          if (vizState.togglePresentation) vizState.togglePresentation();
        }
      }
    });
    log('Data Workbench ready.', 'success');
  }

  // ---- Public API (Spec §5.3) ----
  return {
    // state (readable)
    get nodes()             { return _typeDefs; },
    get pipeline()          { return pipeline; },
    get stashes()           { return stashes; },
    get activeDataset()     { return activeDataset; },
    get promotedDatasets()  { return promotedDatasets; },
    get viz()               { return vizState; },
    // registration
    register, registerElement, registerHeaderElement,
    // utilities
    parseCSV, generateOptions, toObjects, fromObjects,
    passthroughCopy, inferTypes, updateConfig,
    // execution
    runFrom, renderActiveNode, renderDataInspector,
    // node mgmt
    addNode, selectNode, renderTrack, deleteNode,
    _toggleStar,
    // stash
    getStash, setStash, listStashes, _deleteStash,
    // active dataset
    promoteToActive, getColumnMeta,
    // console
    log, clearConsole,
    // ui
    togglePanel, toggleTheme, setMode, toggleQuickView,
    openPicker, closePicker, _filterPicker, _pickNode,
    saveWorkflow, showLoadModal, closeWfModal, exportWorkflow,
    _loadWf, _delWf, _importWorkflowFile,
    _vizDrop, _vizFileInput,
    // init
    _init
  };
})();

DWB._init();

/* --- src\nodes\01_ingest.js --- */
DWB.register('INGEST', {
  title: 'Ingest CSV',
  icon: '📁',
  category: 'Input & Output',
  desc: 'Load a CSV file into the pipeline.',
  implemented: true,
  defaultConfig: { fileData: null, fileName: '' },

  renderConfig(node, prevData) {
    const body = document.getElementById('config-body');

    const statusHtml = node.config.fileName
      ? `<div style="margin-top:10px;font-size:12px;color:var(--success)">✓ Loaded: ${node.config.fileName}</div>`
      : '';

    const errorHtml = node.status === 'error'
      ? `<div style="margin-top:8px;font-size:11px;color:var(--danger)">${node.errorMsg || 'Error'}</div>`
      : '';

    body.innerHTML = `
      <div id="ingest-dz-${node.id}"
        style="border:2px dashed var(--border-strong);border-radius:6px;
               padding:20px 12px;text-align:center;cursor:pointer;
               transition:border-color 0.15s,background 0.15s">
        <div style="font-size:28px;margin-bottom:6px">📁</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">
          Drop a CSV file here, or click Browse
        </div>
        <label style="display:inline-block;padding:5px 16px;background:var(--accent);
                      color:#fff;border-radius:4px;font-size:12px;cursor:pointer;
                      border:none;font-family:inherit">
          Browse…
          <input type="file" accept=".csv" style="display:none" id="ingest-fi-${node.id}">
        </label>
      </div>
      ${statusHtml}${errorHtml}`;

    function handleFile(file) {
      if (!file || !file.name.match(/\.csv$/i)) {
        DWB.log('Please select a .csv file', 'warn');
        return;
      }
      const reader = new FileReader();
      reader.onload = ev => {
        node.config.fileData = ev.target.result;
        node.config.fileName = file.name;
        node.customName = file.name;
        DWB.renderTrack();
        DWB.runFrom(node.id);
        DWB.renderActiveNode();
      };
      reader.readAsText(file);
    }

    const fi = document.getElementById(`ingest-fi-${node.id}`);
    fi.addEventListener('change', e => handleFile(e.target.files[0]));

    const dz = document.getElementById(`ingest-dz-${node.id}`);
    dz.addEventListener('dragover', e => {
      e.preventDefault();
      dz.style.borderColor = 'var(--accent)';
      dz.style.background  = 'var(--accent-light)';
    });
    dz.addEventListener('dragleave', () => {
      dz.style.borderColor = 'var(--border-strong)';
      dz.style.background  = '';
    });
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.style.borderColor = 'var(--border-strong)';
      dz.style.background  = '';
      handleFile(e.dataTransfer.files[0]);
    });
  },

  execute(node, inputData) {
    if (!node.config.fileData) throw new Error('No file uploaded.');
    const parsed = DWB.parseCSV(node.config.fileData);
    if (parsed.headers.length === 0) throw new Error('CSV appears to be empty.');
    node.output = parsed;
    DWB.log(`Ingested ${node.config.fileName}: ${parsed.rows.length} rows, ${parsed.headers.length} columns`);
  }
});

DWB.register('STASH_SAVE', {

  defaultConfig: { stashName: '' },

    const body = document.getElementById('config-body');

    const warn = !node.config.stashName
      ? `<div style="margin-top:8px;font-size:11px;color:var(--warning)">⚠ Name required.</div>`
      : existing.includes(node.config.stashName)
        ? `<div style="margin-top:8px;font-size:11px;color:var(--warning)">⚠ Will overwrite existing stash "${node.config.stashName}"</div>`
        : '';

    const status = node.output && node.config.stashName
      ? `<div style="margin-top:10px;font-size:12px;color:var(--success)">✓ Stashed as: ${node.config.stashName}</div>`
      : '';

    const stashRef = existing.length
      ? `<div style="margin-top:6px;font-size:11px;color:var(--text-faint)">Existing stashes: ${existing.join(', ')}</div>`
      : `<div style="margin-top:6px;font-size:11px;color:var(--text-faint)">No stashes yet.</div>`;

    const dataInfo = prevData
      ? `<div style="margin-top:4px;font-size:11px;color:var(--text-faint)">${prevData.rows.length.toLocaleString()} rows · ${prevData.headers.length} columns to stash</div>`
      : `<div style="margin-top:4px;font-size:11px;color:var(--text-faint)">No upstream data yet.</div>`;

    body.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:6px">
        <label style="font-size:12px;font-weight:600;color:var(--text-muted)">Stash Name</label>
        <input type="text" id="stsh-name-${node.id}"
          value="${node.config.stashName}"
          placeholder="e.g. pre_match_snapshot"
          style="width:100%">
        ${warn}${status}${stashRef}${dataInfo}
        <button id="stsh-run-${node.id}"
          style="margin-top:8px;padding:6px 14px;background:var(--accent);color:#fff;

          📌 Save to Stash
        </button>
      </div>`;
