/* --- src\nodes\05_export_csv.js --- */
DWB.register('EXPORT_CSV', {
  title: 'Export to CSV',
  icon: '💾',
  category: 'Input & Output',
  desc: 'Download the current pipeline data as a CSV file.',
  implemented: true,
  defaultConfig: { fileName: 'export.csv' },

  renderConfig(node, prevData) {
    const body = document.getElementById('config-body');
    const hasData = !!prevData;
    const rows = hasData ? prevData.rows.length : 0;
    const cols = hasData ? prevData.headers.length : 0;

    const dataInfo = hasData
      ? `<div style="margin-top:8px;font-size:12px;color:var(--text-muted)">
           ${rows.toLocaleString()} rows × ${cols} columns ready to export
         </div>`
      : `<div style="margin-top:8px;font-size:12px;color:var(--text-faint)">
           No data — run an upstream node first.
         </div>`;

    body.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="font-size:12px;font-weight:600;color:var(--text-muted)">Filename</label>
        <input type="text" id="exp-fname-${node.id}"
          value="${node.config.fileName}"
          placeholder="export.csv"
          style="width:100%">
        ${dataInfo}
        <button id="exp-dl-${node.id}" ${hasData ? '' : 'disabled'}
          style="margin-top:8px;padding:8px 16px;font-size:13px;font-weight:600;
                 background:${hasData ? 'var(--accent)' : 'var(--bg-raised)'};
                 color:${hasData ? '#fff' : 'var(--text-faint)'};
                 border:1px solid ${hasData ? 'transparent' : 'var(--border)'};
                 border-radius:5px;cursor:${hasData ? 'pointer' : 'not-allowed'}">
          ⬇ Download CSV
        </button>
      </div>`;

    document.getElementById(`exp-fname-${node.id}`).addEventListener('input', e => {
      node.config.fileName = e.target.value.trim() || 'export.csv';
    });

    if (hasData) {
      document.getElementById(`exp-dl-${node.id}`).addEventListener('click', () => {
        // Run execute to ensure node.output is set and pipeline state is current
        DWB.runFrom(node.id);
        const data = node.output;
        if (!data) { DWB.log('Export failed — no output data', 'error'); return; }

        const escape = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
        const lines = [
          data.headers.map(escape).join(','),
          ...data.rows.map(row => row.map(escape).join(','))
        ];
        const csv  = lines.join('\r\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const fname = node.config.fileName.endsWith('.csv')
          ? node.config.fileName
          : node.config.fileName + '.csv';
        const a = Object.assign(document.createElement('a'), { href: url, download: fname });
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        DWB.log(`Exported "${fname}" (${data.rows.length} rows, ${data.headers.length} columns)`, 'success');
      });
    }
  },

  execute(node, inputData) {
    if (!inputData) throw new Error('No data to export.');
    node.output = DWB.passthroughCopy(inputData);
  }
});

/* --- src\nodes\06_filter.js --- */
DWB.register('FILTER', {
  title: 'Filter Rows',
  icon: '🔍',
  category: 'Row Operations',
  desc: 'Keep only rows matching a condition.',
  implemented: true,
  defaultConfig: { colIndex: 0, operator: 'contains', value: '', caseSensitive: false },

  renderConfig(node, prevData) {
    const body = document.getElementById('config-body');

    if (!prevData) {
      body.innerHTML = `<div class="config-empty">No upstream data. Connect a source node first.</div>`;
      return;
    }

    const cfg = node.config;
    const hideValue = cfg.operator === 'is empty' || cfg.operator === 'is not empty';

    const colOpts = prevData.headers.map((h, i) =>
      `<option value="${i}"${i == cfg.colIndex ? ' selected' : ''}>${h}</option>`
    ).join('');

    const operators = [
      'contains', 'not contains', 'equals', 'not equals',
      'starts with', 'ends with', 'greater than', 'less than',
      'is empty', 'is not empty'
    ];
    const opOpts = operators.map(op =>
      `<option value="${op}"${op === cfg.operator ? ' selected' : ''}>${op}</option>`
    ).join('');

    const status = (node.output && node.status === 'ok')
      ? `<div style="margin-top:8px;font-size:12px;color:var(--success)">✓ ${node.output.rows.length.toLocaleString()} rows kept of ${prevData.rows.length.toLocaleString()} total</div>`
      : node.status === 'error'
        ? `<div style="margin-top:8px;font-size:11px;color:var(--danger)">${node.errorMsg}</div>`
        : '';

    body.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:8px">
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:3px">Column</label>
          <select id="flt-col-${node.id}" style="width:100%">${colOpts}</select>
        </div>
        <div>
          <label style="font-size:11px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:3px">Operator</label>
          <select id="flt-op-${node.id}" style="width:100%">${opOpts}</select>
        </div>
        ${!hideValue ? `
        <div id="flt-val-wrap-${node.id}">
          <label style="font-size:11px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:3px">Value</label>
          <div style="display:flex;gap:6px">
            <input type="text" id="flt-val-${node.id}" value="${cfg.value.replace(/"/g,'&quot;')}"
              placeholder="Filter value…" style="flex:1">
            <button id="flt-run-${node.id}"
              style="padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer">
              Apply
            </button>
          </div>
        </div>` : ''}
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);cursor:pointer">
          <input type="checkbox" id="flt-cs-${node.id}" ${cfg.caseSensitive ? 'checked' : ''}>
          Case sensitive
        </label>
        ${status}
      </div>`;

    document.getElementById(`flt-col-${node.id}`).addEventListener('change', e => {
      node.config.colIndex = parseInt(e.target.value, 10);
      DWB.runFrom(node.id); DWB.renderActiveNode();
    });

    document.getElementById(`flt-op-${node.id}`).addEventListener('change', e => {
      node.config.operator = e.target.value;
      DWB.runFrom(node.id); DWB.renderActiveNode();
    });

    if (!hideValue) {
      const valEl = document.getElementById(`flt-val-${node.id}`);
      valEl.addEventListener('input', e => { node.config.value = e.target.value; });
      document.getElementById(`flt-run-${node.id}`).addEventListener('click', () => {
        node.config.value = valEl.value;
        DWB.runFrom(node.id); DWB.renderActiveNode();
      });
    }

    document.getElementById(`flt-cs-${node.id}`).addEventListener('change', e => {
      node.config.caseSensitive = e.target.checked;
      DWB.runFrom(node.id); DWB.renderActiveNode();
    });
  },

  execute(node, inputData) {
    if (!inputData) throw new Error('No input data.');
    const { colIndex, operator, value, caseSensitive } = node.config;
    const total = inputData.rows.length;

    const filtered = inputData.rows.filter(row => {
      let cell = String(row[colIndex] ?? '');

      if (operator === 'is empty')     return cell.trim() === '';
      if (operator === 'is not empty') return cell.trim() !== '';

      let cmp = value;
      if (!caseSensitive) { cell = cell.toLowerCase(); cmp = cmp.toLowerCase(); }

      if (operator === 'greater than' || operator === 'less than') {
        const cn = parseFloat(cell), vn = parseFloat(cmp);
        if (isNaN(cn) || isNaN(vn)) return false;
        return operator === 'greater than' ? cn > vn : cn < vn;
      }

      switch (operator) {
        case 'contains':     return cell.includes(cmp);
        case 'not contains': return !cell.includes(cmp);
        case 'equals':       return cell === cmp;
        case 'not equals':   return cell !== cmp;
        case 'starts with':  return cell.startsWith(cmp);
        case 'ends with':    return cell.endsWith(cmp);
        default: return true;
      }
    });

    const out = DWB.passthroughCopy(inputData);
    out.rows = filtered;
    node.output = out;
    DWB.log(`Filter: kept ${filtered.length} of ${total} rows`);
  }
});

/* --- src\nodes\07_sort.js --- */
DWB.register('SORT', {
  title: 'Sort Rows',
  icon: '↕️',
  category: 'Row Operations',
  desc: 'Sort rows by one or more columns.',
  implemented: true,
  defaultConfig: { sorts: [{ colIndex: 0, direction: 'asc' }] },

  renderConfig(node, prevData) {
    const body = document.getElementById('config-body');

    if (!prevData) {
      body.innerHTML = `<div class="config-empty">No upstream data. Connect a source node first.</div>`;
      return;
    }

    const cfg = node.config;
    if (!cfg.sorts || !cfg.sorts.length) cfg.sorts = [{ colIndex: 0, direction: 'asc' }];

    const sortRows = cfg.sorts.map((s, i) => {
      const colOpts = prevData.headers.map((h, ci) =>
        `<option value="${ci}"${ci == s.colIndex ? ' selected' : ''}>${h}</option>`
      ).join('');
      const canRemove = cfg.sorts.length > 1;
      return `
        <div style="display:flex;gap:6px;align-items:center" id="sort-row-${node.id}-${i}">
          <select id="sort-col-${node.id}-${i}" style="flex:1">${colOpts}</select>
          <button id="sort-dir-${node.id}-${i}"
            style="padding:4px 10px;border:1px solid var(--border);border-radius:4px;
                   background:${s.direction === 'asc' ? 'var(--accent-light)' : 'var(--bg-raised)'};
                   color:${s.direction === 'asc' ? 'var(--accent)' : 'var(--text-muted)'};
                   font-size:12px;cursor:pointer;white-space:nowrap;min-width:62px">
            ${s.direction === 'asc' ? '↑ Asc' : '↓ Desc'}
          </button>
          <button id="sort-del-${node.id}-${i}"
            ${canRemove ? '' : 'disabled'}
            style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;
                   background:transparent;color:${canRemove ? 'var(--danger)' : 'var(--text-faint)'};
                   font-size:12px;cursor:${canRemove ? 'pointer' : 'default'}">×</button>
        </div>`;
    }).join('');

    const canAdd = cfg.sorts.length < 3;
    const status = (node.output && node.status === 'ok')
      ? `<div style="margin-top:6px;font-size:12px;color:var(--success)">✓ ${node.output.rows.length.toLocaleString()} rows sorted</div>`
      : node.status === 'error'
        ? `<div style="margin-top:6px;font-size:11px;color:var(--danger)">${node.errorMsg}</div>`
        : '';

    body.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted)">Sort Keys</div>
        <div style="display:flex;flex-direction:column;gap:5px" id="sort-keys-${node.id}">${sortRows}</div>
        ${canAdd ? `<button id="sort-add-${node.id}"
          style="margin-top:2px;padding:5px;border:1px dashed var(--border-strong);border-radius:4px;
                 background:transparent;color:var(--text-faint);font-size:11px;cursor:pointer;width:100%">
          + Add Sort Key
        </button>` : ''}
        ${status}
      </div>`;

    // Attach handlers for each sort row
    cfg.sorts.forEach((s, i) => {
      document.getElementById(`sort-col-${node.id}-${i}`).addEventListener('change', e => {
        cfg.sorts[i].colIndex = parseInt(e.target.value, 10);
        DWB.runFrom(node.id); DWB.renderActiveNode();
      });

      document.getElementById(`sort-dir-${node.id}-${i}`).addEventListener('click', () => {
        cfg.sorts[i].direction = cfg.sorts[i].direction === 'asc' ? 'desc' : 'asc';
        DWB.runFrom(node.id); DWB.renderActiveNode();
      });

      const delBtn = document.getElementById(`sort-del-${node.id}-${i}`);
      if (cfg.sorts.length > 1) {
        delBtn.addEventListener('click', () => {
          cfg.sorts.splice(i, 1);
          DWB.runFrom(node.id); DWB.renderActiveNode();
        });
      }
    });

    if (canAdd) {
      document.getElementById(`sort-add-${node.id}`).addEventListener('click', () => {
        cfg.sorts.push({ colIndex: 0, direction: 'asc' });
        DWB.runFrom(node.id); DWB.renderActiveNode();
      });
    }
  },

  execute(node, inputData) {
    if (!inputData) throw new Error('No input data.');
    const { sorts } = node.config;

    const rows = [...inputData.rows];
    rows.sort((a, b) => {
      for (const { colIndex, direction } of sorts) {
        const av = a[colIndex] ?? '', bv = b[colIndex] ?? '';
        const an = parseFloat(av),    bn = parseFloat(bv);
        const cmp = (!isNaN(an) && !isNaN(bn))
          ? an - bn
          : String(av).localeCompare(String(bv));
        if (cmp !== 0) return direction === 'desc' ? -cmp : cmp;
      }
      return 0;
    });

    const desc = sorts.map(s =>
      `${inputData.headers[s.colIndex] || s.colIndex} ${s.direction}`
    ).join(', ');

    const out = DWB.passthroughCopy(inputData);
    out.rows = rows;
    node.output = out;
    DWB.log(`Sorted by ${desc}`);
  }
});

DWB.register('DROP_COLS', {
  title: 'Drop Column(s)',
  icon: '🗑️',
  category: 'Column Operations',
  desc: 'Remove one or more columns.',
  implemented: true,
  defaultConfig: { dropIndices: [] },

  renderConfig(node, prevData) {
    const body = document.getElementById('config-body');

    if (!prevData) {
      body.innerHTML = `<div class="config-empty">No upstream data. Connect a source node first.</div>`;
      return;
    }

    const cfg = node.config;
    const allDropped = cfg.dropIndices.length === prevData.headers.length;
    const keepCount  = prevData.headers.length - cfg.dropIndices.length;

    const warn = allDropped
      ? `<div style="margin-top:6px;font-size:11px;color:var(--danger)">⚠ Cannot drop all columns.</div>`
      : '';

    const status = (node.output && node.status === 'ok' && !allDropped)
      ? `<div style="margin-top:6px;font-size:12px;color:var(--success)">✓ Keeping ${node.output.headers.length} of ${prevData.headers.length} columns</div>`
      : node.status === 'error'
        ? `<div style="margin-top:6px;font-size:11px;color:var(--danger)">${node.errorMsg}</div>`
        : '';

    const checks = prevData.headers.map((h, i) => {
      const checked = cfg.dropIndices.includes(i);
      return `
        <label style="display:flex;align-items:center;gap:7px;padding:4px 2px;
                      font-size:12px;cursor:pointer;color:${checked ? 'var(--danger)' : 'var(--text-main)'}">
          <input type="checkbox" data-idx="${i}" ${checked ? 'checked' : ''}>
          <span style="${checked ? 'text-decoration:line-through;color:var(--text-faint)' : ''}">${h}</span>
        </label>`;
    }).join('');

    body.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:4px">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:2px">
          Check columns to drop
        </div>
        <div id="drop-checks-${node.id}" style="max-height:130px;overflow-y:auto;
             border:1px solid var(--border);border-radius:4px;padding:4px 8px">
          ${checks}
        </div>
        ${warn}${status}
      </div>`;

    document.getElementById(`drop-checks-${node.id}`).addEventListener('change', e => {
      if (e.target.type !== 'checkbox') return;
      const idx = parseInt(e.target.dataset.idx, 10);
      if (e.target.checked) {
        if (!cfg.dropIndices.includes(idx)) cfg.dropIndices.push(idx);
      } else {
        cfg.dropIndices = cfg.dropIndices.filter(i => i !== idx);
      }
      DWB.runFrom(node.id); DWB.renderActiveNode();
    });
  },

  execute(node, inputData) {
    if (!inputData) throw new Error('No input data.');
    const { dropIndices } = node.config;

    if (dropIndices.length === inputData.headers.length) {
      throw new Error('Cannot drop all columns.');
    }

    const keepIndices = inputData.headers.map((_, i) => i).filter(i => !dropIndices.includes(i));
    const out = {
      headers: keepIndices.map(i => inputData.headers[i]),
      rows:    inputData.rows.map(r => keepIndices.map(i => r[i]))
    };
    if (inputData.columnTypes) {
      out.columnTypes = keepIndices.map(i => inputData.columnTypes[i] || 'text');
    }
    if (inputData.columnTypeMeta) {
      out.columnTypeMeta = {};
      keepIndices.forEach((origIdx, newIdx) => {
        if (inputData.columnTypeMeta[origIdx]) out.columnTypeMeta[newIdx] = inputData.columnTypeMeta[origIdx];
      });
    }
    node.output = out;

    DWB.log(`Dropped ${dropIndices.length} columns, ${keepIndices.length} remaining`);
  }
});

        <button id="ren-run-${node.id}"

                 border:none;border-radius:4px;font-size:12px;cursor:pointer">

        </button>
      </div>`;

    // oninput: update config only
    prevData.headers.forEach((_, i) => {
      const inp = document.getElementById(`ren-inp-${node.id}-${i}`);
      if (!inp) return;
      inp.addEventListener('input', () => {
        const val = inp.value;
        if (val) cfg.renames[i] = val;
        else delete cfg.renames[i];
      });
    });

    document.getElementById(`ren-run-${node.id}`).addEventListener('click', () => {
      // Sync any pending values before running
      prevData.headers.forEach((_, i) => {
        const inp = document.getElementById(`ren-inp-${node.id}-${i}`);
        if (!inp) return;
        if (inp.value) cfg.renames[i] = inp.value;

      const r = renames[i];
      return (r && r.trim()) ? r.trim() : h;
    });

    const renameCount = Object.values(renames).filter(v => v && v.trim()).length;
    const out = DWB.passthroughCopy(inputData);
    out.headers = newHeaders;
    node.output = out;
    DWB.log(`Renamed ${renameCount} column${renameCount !== 1 ? 's' : ''}`);
  }
});

    // Copy source picker
    if (cfg.mode === 'copy') {

const LIKERT_TEMPLATES = {
  numeric_5:    { label: '1–5 Scale',        scale: ['1','2','3','4','5'],                                                                     midpoint: 2, positiveEnd: 'high' },
  agree_5:      { label: 'Agreement (5)',     scale: ['Strongly Disagree','Disagree','Neutral','Agree','Strongly Agree'],                       midpoint: 2, positiveEnd: 'high' },
  satisfy_5:    { label: 'Satisfaction (5)',  scale: ['Very Dissatisfied','Dissatisfied','Neutral','Satisfied','Very Satisfied'],               midpoint: 2, positiveEnd: 'high' },
  always_never: { label: 'Frequency (5)',     scale: ['Never','Rarely','Sometimes','Often','Always'],                                          midpoint: 2, positiveEnd: 'high' },
  numeric_4:    { label: '1–4 Scale',         scale: ['1','2','3','4'],                                                                       midpoint: -1, positiveEnd: 'high' },
  custom:       { label: 'Custom',            scale: [],                                                                                      midpoint: -1, positiveEnd: 'high' }
};

const TYPE_COLORS = {
  number:      'var(--info)',
  date:        'var(--success)',
  categorical: '#7c3aed',
  likert:      'var(--accent-gold)',
  text:        'var(--text-faint)'
};

function _stAutoTemplate(data, ci) {
  const unique = new Set(data.rows.map(r => String(r[ci] ?? '')).filter(v => v !== ''));
  for (const [key, tmpl] of Object.entries(LIKERT_TEMPLATES)) {
    if (key === 'custom' || !tmpl.scale.length) continue;
    const tmplLower = new Set(tmpl.scale.map(s => s.toLowerCase()));
    if ([...unique].every(v => tmplLower.has(v.toLowerCase())) && unique.size <= tmpl.scale.length) return key;
  }
  return null;
}

DWB.register('SET_TYPES', {
  title: 'Set Column Types',
  icon: '🏷️',

    const cfg       = node.config;

    const rows = prevData.headers.map((h, ci) => {

      // Sample values
      const allVals = prevData.rows.map(r => String(r[ci] ?? '')).filter(v => v !== '');
      const unique  = [...new Set(allVals)];
      const sample  = unique.slice(0, 5).map(v => v.length > 12 ? v.slice(0, 12) + '…' : v).join(', ');

      let likertSection = '';
      if (active === 'likert') {

        const tmplKey = meta.template || autoKey || 'custom';

        const scaleItems = scale.map((v, si) => {

                value="${dispLabel}" placeholder="Display label…"
                style="flex:1;font-size:11px;padding:2px 5px">
            </div>`;
        }).join('');

        const midOpts = [
          `<option value="-1"${midpoint === -1 ? ' selected' : ''}>None</option>`,
          ...scale.map((v, i) => `<option value="${i}"${i === midpoint ? ' selected' : ''}>${v}</option>`)
        ].join('');

        const dataUnique = new Set(prevData.rows.map(r => String(r[ci] ?? '')).filter(v => v !== ''));
        const scaleSet   = new Set(scale);
        const missing    = [...dataUnique].filter(v => !scaleSet.has(v));
        const warnHtml   = missing.length
          ? `<div style="margin-top:4px;font-size:10px;color:var(--warning)">⚠ Values not in scale: ${missing.slice(0,3).map(v => `"${v}"`).join(', ')}${missing.length > 3 ? ` +${missing.length - 3} more` : ''}</div>`
          : '';

        likertSection = `
          <div style="background:var(--bg-raised);border-radius:4px;padding:8px;margin:2px 0 6px 24px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
              <label style="font-size:11px;font-weight:600;color:var(--text-muted);white-space:nowrap">Template:</label>
              <select id="st-tmpl-${node.id}-${ci}" style="flex:1;font-size:11px">${tmplOpts}</select>
            </div>
            <div style="font-size:10px;font-weight:700;color:var(--text-faint);text-transform:uppercase;
                        letter-spacing:0.06em;margin-bottom:4px">Scale Order → Display Label</div>
            <div>${scaleItems}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:6px">

              <select id="st-mid-${node.id}-${ci}" style="flex:1;font-size:11px">${midOpts}</select>
            </div>
            ${warnHtml}
          </div>`;
      }

      return `
        <div style="display:grid;grid-template-columns:24px minmax(0,1fr) minmax(0,1fr) 150px;
                    gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:10px;color:var(--text-faint);text-align:right">${ci}</div>
          <div style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
               title="${hSafe}">${hDisplay}</div>
          <div style="font-size:10px;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
               title="${sampleTitle.replace(/"/g,'&quot;')}">${sample || '—'}</div>
          <div style="display:flex;align-items:center;gap:5px">
            <span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;
                         background:${dotColor};display:inline-block"></span>
            <select id="st-type-${node.id}-${ci}" data-ci="${ci}"
              style="flex:1;font-size:11px">${typeOpts}</select>
          </div>
        </div>
        ${likertSection}`;
    }).join('');

    const status = (node.output && node.status === 'ok')
      ? `<div style="margin-top:6px;font-size:12px;color:var(--success)">✓ Types applied to ${prevData.headers.length} columns</div>`
      : node.status === 'error'
        ? `<div style="margin-top:6px;font-size:11px;color:var(--danger)">${node.errorMsg}</div>`
        : '';

    body.innerHTML = `
      <div style="display:flex;flex-direction:column">
        <div style="display:grid;grid-template-columns:24px minmax(0,1fr) minmax(0,1fr) 150px;
                    gap:6px;font-size:10px;font-weight:700;color:var(--text-faint);text-transform:uppercase;
                    letter-spacing:0.06em;padding:0 0 4px;border-bottom:2px solid var(--border-strong)">
          <span>#</span><span>Column</span><span>Sample Values</span><span style="padding-left:13px">Type</span>
        </div>
        <div style="overflow-y:auto">${rows}</div>
        ${status}
        <button id="st-run-${node.id}"
          style="margin-top:8px;padding:6px 14px;background:var(--accent);color:#fff;
                 border:none;border-radius:4px;font-size:12px;cursor:pointer">
          🏷️ Apply Types
        </button>
      </div>`;

    // Type override dropdowns
    prevData.headers.forEach((_, ci) => {
      const sel = document.getElementById(`st-type-${node.id}-${ci}`);
      if (!sel) return;
      sel.addEventListener('change', e => {
        const val = e.target.value;
        if (val) cfg.overrides[ci] = val;
        else delete cfg.overrides[ci];
        if (val !== 'likert') delete cfg.likertMeta[ci];
        DWB.runFrom(node.id); DWB.renderActiveNode();
      });

      const activeType = cfg.overrides[ci] || baseTypes[ci] || 'text';
      if (activeType !== 'likert') return;

      // Template picker
      const tmplSel = document.getElementById(`st-tmpl-${node.id}-${ci}`);
      if (tmplSel) {
        tmplSel.addEventListener('change', e => {
          const key  = e.target.value;
          const tmpl = LIKERT_TEMPLATES[key];
          cfg.likertMeta[ci] = {
            template: key,
            scale: tmpl.scale.length ? [...tmpl.scale] : (cfg.likertMeta[ci]?.scale || []),
            displayLabels: {},
            midpoint: tmpl.midpoint,
            positiveEnd: tmpl.positiveEnd
          };
          DWB.runFrom(node.id); DWB.renderActiveNode();
        });
      }

      // Midpoint — updates config without re-render
      const midSel = document.getElementById(`st-mid-${node.id}-${ci}`);
      if (midSel) {
        midSel.addEventListener('change', e => {
          if (!cfg.likertMeta[ci]) cfg.likertMeta[ci] = {};
          cfg.likertMeta[ci].midpoint = parseInt(e.target.value, 10);
        });
      }
    });

    // Scale reorder buttons — direct listeners on each newly created element
    body.querySelectorAll('.st-ord-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const ci   = parseInt(btn.dataset.ci, 10);
        const si   = parseInt(btn.dataset.si, 10);
        const dir  = btn.dataset.dir;
        const meta = cfg.likertMeta[ci];
        if (!meta?.scale) return;
        const swap = dir === 'up' ? si - 1 : si + 1;
        if (swap < 0 || swap >= meta.scale.length) return;
        [meta.scale[si], meta.scale[swap]] = [meta.scale[swap], meta.scale[si]];
        DWB.runFrom(node.id); DWB.renderActiveNode();
      });
    });

    // Display label inputs — update config without re-render
    body.querySelectorAll('.st-lbl-inp').forEach(inp => {
      inp.addEventListener('input', () => {
        const ci  = parseInt(inp.dataset.ci, 10);
        const val = inp.dataset.val;
        if (!cfg.likertMeta[ci]) cfg.likertMeta[ci] = {};
        if (!cfg.likertMeta[ci].displayLabels) cfg.likertMeta[ci].displayLabels = {};
        const label = inp.value.trim();
        if (label) cfg.likertMeta[ci].displayLabels[val] = label;
        else delete cfg.likertMeta[ci].displayLabels[val];
      });
    });

    document.getElementById(`st-run-${node.id}`).addEventListener('click', () => {
      DWB.runFrom(node.id); DWB.renderActiveNode();
    });
  },

  execute(node, inputData) {
    if (!inputData) throw new Error('No input data.');
    const baseTypes  = inputData.columnTypes || DWB.inferTypes(inputData);
    const overrides  = node.config.overrides  || {};
    const likertMeta = node.config.likertMeta || {};

    const columnTypes    = baseTypes.map((t, i) => overrides[i] || t);
    const columnTypeMeta = {};
    columnTypes.forEach((t, i) => {
      if (t === 'likert' && likertMeta[i]) columnTypeMeta[i] = likertMeta[i];
    });

    const out = DWB.passthroughCopy(inputData);
    out.columnTypes    = columnTypes;
    out.columnTypeMeta = columnTypeMeta;
    node.output = out;

    const n = { number: 0, date: 0, categorical: 0, likert: 0, text: 0 };
    columnTypes.forEach(t => { if (n[t] !== undefined) n[t]++; else n.text++; });
    DWB.log(`Set types: ${n.number} number, ${n.date} date, ${n.categorical} categorical, ${n.likert} likert, ${n.text} text`);
  }
});

DWB.register('PASSTHROUGH', {
  title: 'Passthrough',
  icon: '➡️',
  category: 'Transform',
  desc: 'Passes data through unchanged. Useful as a checkpoint.',
  implemented: true,
  defaultConfig: {},

  renderConfig(node, prevData) {
    const body = document.getElementById('config-body');
    const rows = prevData ? prevData.rows.length : 0;
    const cols = prevData ? prevData.headers.length : 0;
    body.innerHTML = `
      <div style="font-size:12px;color:var(--text-muted);padding:4px 0">
        <p>No configuration — data passes through unchanged.</p>
        <p style="margin-top:8px;color:var(--text-faint)">
          Upstream: ${rows.toLocaleString()} rows · ${cols} columns
        </p>
        <button onclick="DWB.runFrom('${node.id}')"
          style="margin-top:12px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">
          ▶ Run
        </button>
      </div>`;
  },

  execute(node, inputData) {
    if (!inputData) throw new Error('No input data');
    node.output = { headers: [...inputData.headers], rows: inputData.rows.map(r => [...r]) };
  }
});

// canvas.js — Block/slot/element model, filter coordinator, canvas rendering
(function () {
  'use strict';

  const viz = DWB.viz;

  // ---- Full state on vizState ----
  viz.blocks            = [];
  viz.headerElements    = [];
  viz.activeDatasetName = null;
  viz.activeElementId   = null;
  viz.filters           = [];

  // ---- Add-block dialog internal state ----
  let _addBlockLayout       = '1col';
  let _addBlockSelectedRatio = null;
  let _addBlockTargetIdx    = null;
  let _addBlockChangeId     = null;

  // ---- Element picker internal state ----
  let _pickerSlotId          = null;
  let _pickerInsertAfterId   = null;

  // ---- ID generation ----
  viz.generateId = function () {
    return Math.random().toString(36).slice(2, 9) + Math.random().toString(36).slice(2, 6);
  };

  // ---- Dataset picker ----
  viz.onDatasetPickerChange = function (name) {
    viz.activeDatasetName = name || null;
    viz.renderAllElements();
  };

  viz.onDatasetPromoted = function (name) {
    const picker = document.getElementById('viz-dataset-picker');
    if (!picker) return;

    // Drop the "no datasets" placeholder once we have real data
    if (Object.keys(DWB.promotedDatasets).length === 1) {
      const placeholder = picker.querySelector('option[value=""]');
      if (placeholder) placeholder.remove();
    }

    // Add option if not already present
    const already = Array.from(picker.options).find(o => o.value === name);
    if (!already) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      picker.appendChild(opt);
    }

    // Auto-select if first dataset
    if (viz.activeDatasetName === null) {
      viz.activeDatasetName = name;
      picker.value = name;
    }

    viz.renderAllElements();
  };

  // ---- Finders ----
  viz.findElement = function (elementId) {
    for (const block of viz.blocks) {
      for (const slot of block.slots) {
        for (const element of slot.elements) {
          if (element.id === elementId) return { block, slot, element };
        }
      }
    }
    return null;
  };

  viz.getActiveDataset = function (element) {
    const name = (element && element.datasetName) || viz.activeDatasetName;
    return name ? DWB.promotedDatasets[name] : null;
  };

  // ---- Filter coordinator ----
  viz.addFilter = function (column, value, sourceElementId) {
    const strVal = String(value);
    const idx = viz.filters.findIndex(
      f => f.column === column && String(f.value).toLowerCase() === strVal.toLowerCase()
    );
    if (idx >= 0) {
      viz.filters.splice(idx, 1);
    } else {
      viz.filters.push({ column, value: strVal, source: sourceElementId });
    }
    viz._updateFilterBar();
    viz.onFiltersChanged();
  };

  viz.removeFilter = function (column, value) {
    viz.filters = viz.filters.filter(
      f => !(f.column === column && String(f.value).toLowerCase() === String(value).toLowerCase())
    );
    viz._updateFilterBar();
    viz.onFiltersChanged();
  };

  viz.clearFilters = function () {
    viz.filters = [];
    viz._updateFilterBar();
    viz.onFiltersChanged();
  };

  viz._updateFilterBar = function () {
    const bar   = document.getElementById('viz-filter-bar');
    const chips = document.getElementById('viz-filter-chips');
    if (!bar || !chips) return;
    if (viz.filters.length === 0) {
      bar.classList.add('hidden');
      chips.innerHTML = '';
      return;
    }
    bar.classList.remove('hidden');
    chips.innerHTML = viz.filters.map(f => {
      const col = f.column.replace(/'/g, "\\'");
      const val = String(f.value).replace(/'/g, "\\'");
      return `<span class="dwb-filter-chip">
        ${f.column}: ${f.value}
        <button class="dwb-filter-chip-remove"
          onclick="DWB.viz.removeFilter('${col}','${val}')">✕</button>
      </span>`;
    }).join('');
  };

  viz.onFiltersChanged = function () {
    viz.renderAllElements();
  };

  viz.getFilteredData = function (datasetName) {
    const ds = DWB.promotedDatasets[datasetName || viz.activeDatasetName];
    if (!ds) return null;
    if (viz.filters.length === 0) return ds;
    const filtered = ds.rows.filter(row =>
      viz.filters.every(f => {
        const ci = ds.headers.indexOf(f.column);
        if (ci < 0) return true;
        return String(row[ci] ?? '').toLowerCase() === String(f.value).toLowerCase();
      })
    );
    return { ...ds, rows: filtered, rowCount: filtered.length };
  };

  // ---- Render all / single element ----
  viz.renderAllElements = function () {
    for (const block of viz.blocks) {
      for (const slot of block.slots) {
        for (const element of slot.elements) {
          viz.renderElement(element.id);
        }
      }
    }
  };

  viz.renderElement = function (elementId) {
    const found = viz.findElement(elementId);
    if (!found) return;
    const { element } = found;
    const def = viz._elementRegistry[element.type];
    if (!def) return;
    const dataset = viz.getFilteredData(element.datasetName);
    try {
      def.render(element, dataset, viz.filters);
    } catch (e) {
      const c = document.getElementById('element-content-' + elementId);
      if (c) c.innerHTML = `<div class="dwb-empty-state" style="color:var(--danger)">Render error: ${e.message}</div>`;
    }
  };

  // ---- Sidebar ----
  viz.renderSidebar = function (elementId) {
    viz.activeElementId = elementId;
    const sidebar = document.getElementById('viz-config-sidebar');
    if (!sidebar) return;

    if (!elementId) {
      sidebar.innerHTML = '<div class="sidebar-empty-msg">Select an element to configure</div>';
      return;
    }

    const found = viz.findElement(elementId);
    if (!found) { sidebar.innerHTML = '<div class="sidebar-empty-msg">Element not found</div>'; return; }

    const { element } = found;
    const def = viz._elementRegistry[element.type];
    if (!def) { sidebar.innerHTML = '<div class="sidebar-empty-msg">Unknown element type</div>'; return; }

    const dataset  = viz.getActiveDataset(element);
    const datasets = Object.keys(DWB.promotedDatasets);
    const dsOptions = '<option value="">Use canvas dataset</option>' +
      datasets.map(n =>
        `<option value="${n}"${element.datasetName === n ? ' selected' : ''}>${n}</option>`
      ).join('');

    sidebar.innerHTML = `
      <div class="sidebar-section">
        <label class="sidebar-label">Title</label>
        <input type="text" class="sidebar-input"
          value="${(element.title || '').replace(/"/g, '&quot;')}"
          oninput="DWB.viz._updateElementTitle('${elementId}',this.value)">
        <label class="sidebar-label">Dataset override</label>
        <select class="sidebar-input"
          onchange="DWB.viz._updateElementDataset('${elementId}',this.value)">
          ${dsOptions}
        </select>
      </div>
      <div class="sidebar-section" id="sidebar-element-config"></div>
      <div style="padding:12px">
        <button class="sidebar-apply-btn"
          onclick="DWB.viz.renderElement('${elementId}')">▶ Apply / Re-render</button>
      </div>`;

    if (def.renderConfig) {
      const configContainer = document.getElementById('sidebar-element-config');
      try {
        const html = def.renderConfig(element, dataset);
        if (typeof html === 'string' && configContainer) configContainer.innerHTML = html;
      } catch (e) {
        if (configContainer) configContainer.innerHTML =
          `<div style="color:var(--danger);font-size:12px;padding:8px">Config error: ${e.message}</div>`;
      }
    }
  };

  viz._updateElementTitle = function (elementId, title) {
    const found = viz.findElement(elementId);
    if (!found) return;
    found.element.title = title;
    const inp = document.getElementById('el-title-' + elementId);
    if (inp && inp !== document.activeElement) inp.value = title;
  };

  viz._updateElementDataset = function (elementId, datasetName) {
    const found = viz.findElement(elementId);
    if (!found) return;
    found.element.datasetName = datasetName || null;
    viz.renderSidebar(elementId);
    viz.renderElement(elementId);
  };

  // ---- Canvas rendering ----
  viz.renderCanvas = function () {
    const canvas = document.getElementById('viz-canvas');
    if (!canvas) return;

    if (viz.blocks.length === 0) {
      canvas.innerHTML = `
        <div class="dwb-empty-state" style="flex-direction:column;gap:16px;min-height:300px">
          <div style="font-size:40px">📊</div>
          <div>No blocks yet.<br>Click <strong>＋ Add Block</strong> in the toolbar to start.</div>
        </div>
        <div class="dwb-add-block-row">
          <button class="dwb-add-block-btn" onclick="DWB.viz.showAddBlockDialog(0)">＋ Add Block</button>
        </div>`;
      return;
    }

    let html = '';
    viz.blocks.forEach((block, bi) => {
      html += viz._renderBlockHtml(block, bi);
      html += `<div class="dwb-add-block-row">
        <button class="dwb-add-block-btn" onclick="DWB.viz.showAddBlockDialog(${bi + 1})">＋ Add Block</button>
      </div>`;
    });
    canvas.innerHTML = html;

    viz.renderAllElements();
  };

  viz._renderBlockHtml = function (block, bi) {
    const labels = { '1col': '1 Column', '2col': '2 Columns', '3col': '3 Columns' };
    let slotsHtml = '';
    block.slots.forEach((slot, si) => {
      const pct = block.colRatios[si] || Math.floor(100 / block.slots.length);
      slotsHtml += `<div class="dwb-slot" style="flex:0 0 ${pct}%;max-width:${pct}%" data-slot-id="${slot.id}">`;
      slot.elements.forEach(el => { slotsHtml += viz._renderElementCardHtml(el, slot.id); });
      slotsHtml += `<button class="dwb-add-element-btn"
        onclick="DWB.viz.showElementPicker('${slot.id}',null)">＋ Add Element</button>`;
      slotsHtml += '</div>';
    });
    return `<div class="dwb-block" data-block-id="${block.id}">
      <div class="dwb-block-header">
        <span class="dwb-block-handle">⠿</span>
        <span class="dwb-block-label">${labels[block.layout] || block.layout}</span>
        <button class="dwb-block-menu-btn"
          onclick="DWB.viz._showBlockMenu(event,'${block.id}')">⋯</button>
      </div>
      <div class="dwb-block-slots">${slotsHtml}</div>
    </div>`;
  };

  viz._renderElementCardHtml = function (element, slotId) {
    const def      = viz._elementRegistry[element.type] || {};
    const selected = viz.activeElementId === element.id ? ' selected' : '';
    return `<div class="dwb-element-card${selected}" id="elcard-${element.id}"
      onclick="DWB.viz.selectElement('${element.id}')">
      <div class="dwb-element-header">
        <span>${def.icon || '📦'}</span>
        <input type="text" class="dwb-element-title-input" id="el-title-${element.id}"
          value="${(element.title || '').replace(/"/g, '&quot;')}"
          oninput="DWB.viz._updateElementTitle('${element.id}',this.value)"
          onclick="event.stopPropagation()">
        <span class="dwb-element-type-badge">${def.title || element.type}</span>
        <button class="dwb-element-menu-btn"
          onclick="event.stopPropagation();DWB.viz._showElementMenu(event,'${element.id}','${slotId}')">⋯</button>
      </div>
      <div class="dwb-element-content" id="element-content-${element.id}">
        <div class="dwb-empty-state" style="min-height:80px">Loading…</div>
      </div>
    </div>`;
  };

  viz.selectElement = function (elementId) {
    viz.activeElementId = elementId;
    document.querySelectorAll('.dwb-element-card').forEach(c => c.classList.remove('selected'));
    const card = document.getElementById('elcard-' + elementId);
    if (card) card.classList.add('selected');
    viz.renderSidebar(elementId);
  };

  // ---- Block context menu ----
  viz._showBlockMenu = function (e, blockId) {
    e.stopPropagation();
    viz._closeCtxMenu();
    const bi = viz.blocks.findIndex(b => b.id === blockId);
    const items = [
      { label: 'Move Up',       fn: () => viz._moveBlock(bi, -1),           off: bi === 0 },
      { label: 'Move Down',     fn: () => viz._moveBlock(bi, 1),            off: bi === viz.blocks.length - 1 },
      { label: 'Change Layout', fn: () => viz.showAddBlockDialog(null, blockId) },
      { label: 'Delete Block',  fn: () => viz._deleteBlock(blockId), danger: true }
    ];
    viz._openCtxMenu(e, items);
  };

  viz._showElementMenu = function (e, elementId, slotId) {
    e.stopPropagation();
    viz._closeCtxMenu();
    const found = viz.findElement(elementId);
    if (!found) return;
    const { slot, element } = found;
    const ei = slot.elements.indexOf(element);
    const items = [
      { label: 'Edit Config',   fn: () => viz.selectElement(elementId) },
      { label: 'Move Up',       fn: () => viz._moveElement(elementId, -1), off: ei === 0 },
      { label: 'Move Down',     fn: () => viz._moveElement(elementId, 1),  off: ei === slot.elements.length - 1 },
      { label: 'Duplicate',     fn: () => viz._duplicateElement(elementId) },
      { label: 'Delete',        fn: () => viz._deleteElement(elementId), danger: true }
    ];
    viz._openCtxMenu(e, items);
  };

  viz._openCtxMenu = function (e, items) {
    const menu = document.createElement('div');
    menu.className = 'dwb-ctx-menu';
    menu.id = 'dwb-ctx-menu';
    menu.style.left = e.clientX + 'px';
    menu.style.top  = e.clientY + 'px';
    menu.innerHTML = items.map((item, i) =>
      `<button class="dwb-ctx-item${item.danger ? ' danger' : ''}"
        ${item.off ? 'disabled style="opacity:0.4"' : ''}
        data-i="${i}">${item.label}</button>`
    ).join('');
    document.body.appendChild(menu);
    menu.querySelectorAll('[data-i]').forEach(btn => {
      btn.addEventListener('click', () => {
        viz._closeCtxMenu();
        items[parseInt(btn.dataset.i)].fn();
      });
    });
    setTimeout(() => document.addEventListener('click', viz._closeCtxMenu, { once: true }), 0);
  };

  viz._closeCtxMenu = function () {
    const m = document.getElementById('dwb-ctx-menu');
    if (m) m.remove();
  };

  // ---- Block operations ----
  viz._moveBlock = function (idx, dir) {
    const ni = idx + dir;
    if (ni < 0 || ni >= viz.blocks.length) return;
    [viz.blocks[idx], viz.blocks[ni]] = [viz.blocks[ni], viz.blocks[idx]];
    viz.renderCanvas();
  };

  viz._deleteBlock = function (blockId) {
    if (!confirm('Delete this block and all its elements?')) return;
    const idx = viz.blocks.findIndex(b => b.id === blockId);
    if (idx < 0) return;
    viz.blocks.splice(idx, 1);
    if (viz.activeElementId && !viz.findElement(viz.activeElementId)) {
      viz.activeElementId = null;
      viz.renderSidebar(null);
    }
    viz.renderCanvas();
  };

  // ---- Element operations ----
  viz._moveElement = function (elementId, dir) {
    const found = viz.findElement(elementId);
    if (!found) return;
    const { slot, element } = found;
    const idx = slot.elements.indexOf(element);
    const ni  = idx + dir;
    if (ni < 0 || ni >= slot.elements.length) return;
    slot.elements.splice(idx, 1);
    slot.elements.splice(ni, 0, element);
    viz.renderCanvas();
  };

  viz._duplicateElement = function (elementId) {
    const found = viz.findElement(elementId);
    if (!found) return;
    const { slot, element } = found;
    const copy = JSON.parse(JSON.stringify(element));
    copy.id = 'element-' + viz.generateId();
    copy._instance = null;
    slot.elements.splice(slot.elements.indexOf(element) + 1, 0, copy);
    viz.renderCanvas();
  };

  viz._deleteElement = function (elementId) {
    for (const block of viz.blocks) {
      for (const slot of block.slots) {
        const idx = slot.elements.findIndex(el => el.id === elementId);
        if (idx >= 0) {
          slot.elements.splice(idx, 1);
          if (viz.activeElementId === elementId) {
            viz.activeElementId = null;
            viz.renderSidebar(null);
          }
          viz.renderCanvas();
          return;
        }
      }
    }
  };

  // ---- Add Block Dialog ----
  viz.showAddBlockDialog = function (insertAfterIdx, changeBlockId) {
    _addBlockTargetIdx     = (insertAfterIdx !== null && insertAfterIdx !== undefined) ? insertAfterIdx : null;
    _addBlockChangeId      = changeBlockId || null;
    _addBlockLayout        = '1col';
    _addBlockSelectedRatio = null;

    // Reset layout button states
    document.querySelectorAll('.layout-opt-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.layout === '1col');
    });
    document.getElementById('add-block-ratio-section').style.display = 'none';
    document.getElementById('add-block-ratio-btns').innerHTML = '';

    document.getElementById('add-block-overlay').classList.remove('hidden');
  };

  viz.closeAddBlockDialog = function () {
    document.getElementById('add-block-overlay').classList.add('hidden');
  };

  viz._selectBlockLayout = function (layout, btn) {
    _addBlockLayout = layout;
    document.querySelectorAll('.layout-opt-btn').forEach(b => b.classList.remove('selected'));
    if (btn) btn.classList.add('selected');

    const presets = {
      '1col': [],
      '2col': [[50, 50], [60, 40], [70, 30]],
      '3col': [[33, 34, 33], [50, 25, 25]]
    };

    const ps            = presets[layout] || [];
    const ratioSection  = document.getElementById('add-block-ratio-section');
    const ratioBtns     = document.getElementById('add-block-ratio-btns');

    if (ps.length) {
      ratioSection.style.display = '';
      _addBlockSelectedRatio = ps[0];
      ratioBtns.innerHTML = ps.map((p, i) =>
        `<button class="ratio-opt-btn${i === 0 ? ' selected' : ''}"
          onclick="DWB.viz._selectRatio(this,[${p}])">${p.join('/')}%</button>`
      ).join('');
    } else {
      ratioSection.style.display = 'none';
      _addBlockSelectedRatio = null;
    }
  };

  viz._selectRatio = function (btn, ratios) {
    _addBlockSelectedRatio = ratios;
    document.querySelectorAll('.ratio-opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  };

  viz.confirmAddBlock = function () {
    const layout   = _addBlockLayout || '1col';
    const colCount = layout === '1col' ? 1 : layout === '2col' ? 2 : 3;
    let ratios     = _addBlockSelectedRatio;

    if (!ratios) {
      const even = Math.floor(100 / colCount);
      ratios = Array(colCount).fill(even);
      ratios[0] += 100 - even * colCount;
    }

    if (_addBlockChangeId) {
      const block = viz.blocks.find(b => b.id === _addBlockChangeId);
      if (block) {
        block.layout   = layout;
        block.colRatios = ratios;
        while (block.slots.length < colCount)
          block.slots.push({ id: 'slot-' + viz.generateId(), elements: [] });
        // Merge excess slots into slot[0] before trimming
        while (block.slots.length > colCount) {
          const extra = block.slots.pop();
          extra.elements.forEach(el => block.slots[0].elements.push(el));
        }
      }
    } else {
      const block = {
        id: 'block-' + viz.generateId(),
        layout,
        colRatios: ratios,
        slots: Array.from({ length: colCount }, () => ({
          id: 'slot-' + viz.generateId(),
          elements: []
        }))
      };
      if (_addBlockTargetIdx !== null) {
        viz.blocks.splice(_addBlockTargetIdx, 0, block);
      } else {
        viz.blocks.push(block);
      }
    }

    viz.closeAddBlockDialog();
    viz.renderCanvas();
  };

  // ---- Element Picker ----
  viz.showElementPicker = function (slotId, insertAfterElementId) {
    _pickerSlotId        = slotId;
    _pickerInsertAfterId = insertAfterElementId;

    const list = document.getElementById('element-picker-list');
    if (!list) return;

    const ds          = viz.getActiveDataset(null);
    const activeTypes = ds ? (ds.columnTypes || []) : [];

    const byCat = {};
    for (const [key, def] of Object.entries(viz._elementRegistry)) {
      const cat = def.category || 'Other';
      (byCat[cat] = byCat[cat] || []).push({ key, def });
    }

    if (!Object.keys(byCat).length) {
      list.innerHTML = '<div class="sidebar-empty-msg">No elements registered yet.</div>';
    } else {
      list.innerHTML = Object.entries(byCat).map(([cat, items]) =>
        `<div class="element-picker-cat">${cat}</div>` +
        items.map(({ key, def }) => {
          const rec = def.columnAffinity && def.columnAffinity.primary
            ? def.columnAffinity.primary.some(t => activeTypes.includes(t))
            : false;
          return `<div class="element-picker-item" onclick="DWB.viz._pickElement('${key}')">
            <span class="element-picker-icon">${def.icon || '📦'}</span>
            <div>
              <div class="element-picker-title">${def.title}${rec ? '<span class="element-recommended">Recommended</span>' : ''}</div>
              <div class="element-picker-desc">${def.desc || ''}</div>
            </div>
          </div>`;
        }).join('')
      ).join('');
    }

    document.getElementById('element-picker-overlay').classList.remove('hidden');
  };

  viz.closeElementPicker = function () {
    document.getElementById('element-picker-overlay').classList.add('hidden');
  };

  viz._pickElement = function (type) {
    viz.closeElementPicker();
    if (!_pickerSlotId) return;

    let targetSlot = null;
    for (const block of viz.blocks) {
      for (const slot of block.slots) {
        if (slot.id === _pickerSlotId) { targetSlot = slot; break; }
      }
      if (targetSlot) break;
    }
    if (!targetSlot) return;

    const def = viz._elementRegistry[type];
    const element = {
      id: 'element-' + viz.generateId(),
      type,
      title: def ? def.title : type,
      datasetName: null,
      config: {},
      _instance: null
    };

    if (_pickerInsertAfterId) {
      const idx = targetSlot.elements.findIndex(el => el.id === _pickerInsertAfterId);
      targetSlot.elements.splice(idx + 1, 0, element);
    } else {
      targetSlot.elements.push(element);
    }

    viz.renderCanvas();
    viz.selectElement(element.id);
  };

  // ---- Presentation Mode ----
  viz.togglePresentation = function () {
    document.documentElement.classList.toggle('presentation-mode');
    const on  = document.documentElement.classList.contains('presentation-mode');
    const btn = document.getElementById('btn-presentation');
    if (btn) btn.textContent = on ? '✕ Exit' : '⛶ Presentation';
  };

  // ---- Theme change ----
  new MutationObserver(() => {
    for (const block of viz.blocks) {
      for (const slot of block.slots) {
        for (const element of slot.elements) {
          const def = viz._elementRegistry[element.type];
          if (def && def.onThemeChange) def.onThemeChange(element);
        }
      }
    }
  }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

  // ---- Table search utility (used by DATA_TABLE element) ----
  viz.tableSearch = function (elementId) {
    const inp   = document.getElementById('search-' + elementId);
    const table = document.getElementById('table-' + elementId);
    if (!inp || !table) return;
    const term = inp.value.toLowerCase();
    table.querySelectorAll('tbody tr').forEach(row => {
      const cells   = row.querySelectorAll('td');
      const matches = !term || [...cells].some(c => c.textContent.toLowerCase().includes(term));
      row.style.display = matches ? '' : 'none';
      cells.forEach(cell => {
        const val = cell.dataset.val || '';
        if (term && val.toLowerCase().includes(term)) {
          const i = val.toLowerCase().indexOf(term);
          cell.innerHTML =
            val.slice(0, i) +
            '<mark>' + val.slice(i, i + term.length) + '</mark>' +
            val.slice(i + term.length);
        } else {
          cell.textContent = val;
        }
      });
    });
  };

  // ---- Initial canvas render ----
  viz.renderCanvas();

  DWB.log('Canvas engine ready.', 'success');
})();

/* --- src\viz\elements\e10_data_table.js --- */
DWB.registerElement('DATA_TABLE', {
  title: 'Data Table',
  icon: '📋',
  category: 'Data',
  desc: 'Displays filtered data as a formatted, searchable table.',
  headerCompatible: false,
  columnAffinity: { primary: ['text', 'categorical', 'number', 'date'] },

  renderConfig(element, dataset) {
    const cfg     = element.config || {};
    const headers = dataset ? dataset.headers : [];

    const selected = cfg.selectedColumns && cfg.selectedColumns.length > 0
      ? cfg.selectedColumns
      : headers.map((_, i) => i);

    const colChecks = headers.map((h, i) =>
      `<label class="sidebar-checkbox-item">
        <input type="checkbox" ${selected.includes(i) ? 'checked' : ''}
          onchange="DWB.viz._tableToggleCol('${element.id}',${i},this.checked)">
        ${h}
      </label>`
    ).join('');

    const maxRows     = cfg.maxRows !== undefined ? cfg.maxRows : 100;
    const showCount   = cfg.showRowCount !== false;

    return `
      <div style="padding:8px 12px 0">
        <div class="sidebar-label">Columns to display</div>
        <div class="sidebar-checkbox-list" style="margin-bottom:10px">
          ${colChecks || '<span style="color:var(--text-faint);font-size:12px">No dataset loaded</span>'}
        </div>
        <label class="sidebar-label">Max rows</label>
        <input type="number" class="sidebar-input" value="${maxRows}" min="1" max="5000"
          oninput="DWB.updateConfig_viz('${element.id}','maxRows',parseInt(this.value)||100)">
        <label class="sidebar-checkbox-item" style="margin-top:4px">
          <input type="checkbox" ${showCount ? 'checked' : ''}
            onchange="DWB.updateConfig_viz('${element.id}','showRowCount',this.checked)">
          Show row count
        </label>
      </div>`;
  },

  render(element, dataset, filters) {
    const container = document.getElementById('element-content-' + element.id);
    if (!container) return;

    if (!dataset || !dataset.rows || dataset.rows.length === 0) {
      container.innerHTML = '<div class="dwb-empty-state">No data available. Push a dataset from the pipeline.</div>';
      return;
    }

    const cfg     = element.config || {};
    const maxRows = cfg.maxRows || 100;
    const allHdrs = dataset.headers;
    const selCols = (cfg.selectedColumns && cfg.selectedColumns.length > 0)
      ? cfg.selectedColumns.filter(i => i < allHdrs.length)
      : allHdrs.map((_, i) => i);

    const rows    = dataset.rows.slice(0, maxRows);
    const searchId = 'search-' + element.id;
    const tableId  = 'table-'  + element.id;

    let html = '<div class="dwb-table-wrapper"><div class="dwb-table-toolbar">';
    if (cfg.showRowCount !== false) {
      html += `<span class="dwb-row-count">${dataset.rows.length.toLocaleString()} row${dataset.rows.length !== 1 ? 's' : ''}`;
      if (dataset.rows.length > maxRows) html += ` (showing ${maxRows})`;
      html += '</span>';
    } else {
      html += '<span></span>';
    }
    html += `<input type="text" id="${searchId}" class="dwb-search-input" placeholder="Search…"
      oninput="DWB.viz.tableSearch('${element.id}')">`;
    html += '</div>';

    html += `<div class="dwb-table-scroll"><table id="${tableId}" class="dwb-data-table"><thead><tr>`;
    selCols.forEach(ci => { html += `<th>${allHdrs[ci]}</th>`; });
    html += '</tr></thead><tbody>';

    rows.forEach(row => {
      html += '<tr>';
      selCols.forEach(ci => {
        const val = String(row[ci] ?? '');
        html += `<td data-val="${val.replace(/"/g, '&quot;')}">${val}</td>`;
      });
      html += '</tr>';
    });

    html += '</tbody></table></div></div>';
    container.innerHTML = html;
  },

  onFilterChange(element, dataset, filters) {
    DWB.viz._elementRegistry['DATA_TABLE'].render(element, dataset, filters);
  },

  onThemeChange() { /* table uses CSS vars — no action needed */ },

  getPromptContext(element, dataset, filters) {
    if (!dataset) return 'No data.';
    return `Data Table: ${dataset.rowCount} rows, ${dataset.headers.length} columns. ` +
      'Filters: ' + (filters.length ? filters.map(f => `${f.column}=${f.value}`).join(', ') : 'none');
  },

  getEchartsInstance() { return null; }
});

// Helper for updating element config from sidebar without triggering full re-render
DWB.updateConfig_viz = function (elementId, key, value) {
  const found = DWB.viz.findElement(elementId);
  if (found) found.element.config[key] = value;
};

// Helper for toggling column selection in DATA_TABLE config
DWB.viz._tableToggleCol = function (elementId, colIdx, checked) {
  const found = DWB.viz.findElement(elementId);
  if (!found) return;
  const cfg = found.element.config;
  const ds  = DWB.viz.getActiveDataset(found.element);
  if (!cfg.selectedColumns || cfg.selectedColumns.length === 0) {
    cfg.selectedColumns = ds ? ds.headers.map((_, i) => i) : [];
  }
  if (checked) {
    if (!cfg.selectedColumns.includes(colIdx)) cfg.selectedColumns.push(colIdx);
  } else {
    cfg.selectedColumns = cfg.selectedColumns.filter(i => i !== colIdx);
  }
};
