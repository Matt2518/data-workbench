      var catMap = {};
      aggData.forEach(function(d) { catMap[d.category] = d.value; });
      var yData = xCats.map(function(x) { return catMap[x] !== undefined ? catMap[x] : 0; });
      return {
        type: 'line',
        name: s.label || s.valueField,
        smooth: cfg.smoothed || false,
        data: yData,
        itemStyle: { color: s.color || _D_PALETTE[idx % _D_PALETTE.length] },
        yAxisIndex: cfg.dualYAxis ? (idx % 2) : 0
      };
    });

    var yAxisDef;
    if (cfg.dualYAxis) {
      yAxisDef = [
        { type: 'value', name: cfg.yLabel || '', nameTextStyle: { fontSize: 11 } },
        { type: 'value', name: cfg.y2Label || '', nameTextStyle: { fontSize: 11 } }
      ];
    } else {
      yAxisDef = { type: 'value', name: cfg.yLabel || '' };
    }

    _dDisposeDomCharts(container);
    var el = document.createElement('div');
    el.className = 'dash-block-chart';
    el.style.cssText = 'width:100%;height:300px';
    container.innerHTML = '';
    container.appendChild(el);

    window.DWBVizTab.loadEcharts().then(function(ec) {
      var existing = ec.getInstanceByDom(el);
      if (existing) existing.dispose();
      var chart = ec.init(el);
      chart.setOption({
        tooltip: { trigger: 'axis' },
        legend: echartsSeries.length > 1 ? { bottom: 0 } : { show: false },
        xAxis: { type: 'category', data: xCats, name: cfg.xLabel || '', nameTextStyle: { fontSize: 11 } },
        yAxis: yAxisDef,
        series: echartsSeries,
        grid: { top: 40, bottom: 40, left: 60, right: cfg.dualYAxis ? 60 : 20 }
      });
      setTimeout(function() { chart.resize(); }, 50);
    }).catch(function() { _dMissingConfig(container, 'LINE (ECharts unavailable)'); });
  }

  // ── PIE renderer ──────────────────────────────────────────────────────────────
  function _dRenderPie(viz, rows, container) {
    var cfg = viz.config || {};
    var catField = cfg.categoryField || '';
    var agg = cfg.aggregation || 'sum';

    if (!catField) {
      _dMissingConfig(container, 'PIE');
      return;
    }

    var data;
    if (agg === 'count' || !cfg.valueField) {
      var countMap = {};
      rows.forEach(function(row) {
        var cat = row[catField] !== undefined ? String(row[catField]) : '(blank)';
        countMap[cat] = (countMap[cat] || 0) + 1;
      });
      data = Object.keys(countMap).map(function(cat) { return { name: cat, value: countMap[cat] }; });
    } else {
      data = _dAggregateRows(rows, catField, cfg.valueField, agg).map(function(d) { return { name: d.category, value: d.value }; });
    }

    var showLabels = cfg.showLabels !== false;
    var showLegend = cfg.showLegend !== false;

    _dDisposeDomCharts(container);
    var el = document.createElement('div');
    el.className = 'dash-block-chart';
    el.style.cssText = 'width:100%;height:300px';
    container.innerHTML = '';
    container.appendChild(el);

    window.DWBVizTab.loadEcharts().then(function(ec) {
      var existing = ec.getInstanceByDom(el);
      if (existing) existing.dispose();
      var chart = ec.init(el);
      chart.setOption({
        color: _D_PALETTE,
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { show: showLegend, orient: 'vertical', right: 10, type: 'scroll' },
        series: [{
          type: 'pie',
          radius: cfg.donut ? ['40%','70%'] : '70%',
          data: data,
          label: { show: showLabels, formatter: '{b}: {d}%' },
          emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } }
        }]
      });
      setTimeout(function() { chart.resize(); }, 50);
    }).catch(function() { _dMissingConfig(container, 'PIE (ECharts unavailable)'); });
  }

  // ── STACKED_DIVERGING_BAR (Likert) renderer ───────────────────────────────────
  function _dRenderStackedDivergingBar(viz, rows, container) {
    var cfg = viz.config || {};
    var questionField = cfg.questionField || '';
    var responseField = cfg.responseField || '';

    if (!questionField || !responseField) {
      _dMissingConfig(container, 'STACKED_DIVERGING_BAR');
      return;
    }

    var scaleType = cfg.scaleType || '5point';
    var scaleLabels = (scaleType === 'custom') ? (cfg.scaleLabels || []) : (_LIKERT_SCALES[scaleType] || _LIKERT_SCALES['5point']);
    var scaleColors;
    if (scaleType === '7point') {
      scaleColors = _LIKERT_COLORS_7.slice();
    } else if (scaleType === 'custom') {
      var baseC = ['#1d4ed8','#3b82f6','#93c5fd','#94a3b8','#fdba74','#f97316','#c2410c'];
      scaleColors = baseC.slice(0, scaleLabels.length);
    } else {
      scaleColors = _LIKERT_COLORS_5.slice();
    }

    var n = scaleLabels.length;
    if (!n) { _dMissingConfig(container, 'STACKED_DIVERGING_BAR'); return; }

    var midIdx = Math.floor(n / 2);
    var hasNeutral = (n % 2 === 1);

    // Unique questions in first-occurrence order
    var questions = [];
    var qSeen = {};
    rows.forEach(function(row) {
      var q = row[questionField] !== undefined ? String(row[questionField]) : '';
      if (q && !qSeen[q]) { qSeen[q] = true; questions.push(q); }
    });
    if (!questions.length) { _dMissingConfig(container, 'STACKED_DIVERGING_BAR'); return; }

    // Count responses per question per scale label
    var counts = {};
    questions.forEach(function(q) {
      counts[q] = {};
      scaleLabels.forEach(function(l) { counts[q][l] = 0; });
    });

    rows.forEach(function(row) {
      var q = row[questionField] !== undefined ? String(row[questionField]) : '';
      var r = row[responseField] !== undefined ? String(row[responseField]) : '';
      if (!q || !counts[q]) return;
      var rLower = r.toLowerCase().trim();
      var matched = null;
      for (var li = 0; li < scaleLabels.length; li++) {
        if (scaleLabels[li].toLowerCase().trim() === rLower) { matched = scaleLabels[li]; break; }
      }
      if (matched) {
        var inc = 1;
        if (cfg.countField && row[cfg.countField] !== undefined) inc = parseInt(row[cfg.countField]) || 1;
        counts[q][matched] = (counts[q][matched] || 0) + inc;
      }
    });

    // Build diverging series following v1.0 stacking pattern:
    // [neutral-left(neg), ...negOrd(outermost-first, idx 0..midIdx-1), neutral-right(pos), ...posOrd(innermost-first, idx midIdx+1..n-1)]
    var neutralLabel = hasNeutral ? scaleLabels[midIdx] : '';
    var neutralColor = hasNeutral ? (scaleColors[midIdx] || '#94a3b8') : '';

    var series = [];

    if (hasNeutral) {
      series.push({
        type: 'bar', name: '__nl_' + neutralLabel, stack: 'likert',
        data: questions.map(function(q) { return -Math.floor((counts[q][neutralLabel] || 0) / 2); }),
        itemStyle: { color: neutralColor }, label: { show: false }
      });
    }

    // Negative series: outermost first = ascending index order (index 0 = most negative)
    for (var ni = 0; ni < midIdx; ni++) {
      (function(idx) {
        var lbl = scaleLabels[idx];
        series.push({
          type: 'bar', name: lbl, stack: 'likert',
          data: questions.map(function(q) { return -(counts[q][lbl] || 0); }),
          itemStyle: { color: scaleColors[idx] || '#94a3b8' },
          emphasis: { focus: 'series' }
        });
      })(ni);
    }

    if (hasNeutral) {
      series.push({
        type: 'bar', name: neutralLabel, stack: 'likert',
        data: questions.map(function(q) { return Math.ceil((counts[q][neutralLabel] || 0) / 2); }),
        itemStyle: { color: neutralColor }, emphasis: { focus: 'series' }
      });
    }

    // Positive series: innermost first = ascending index order (midIdx+1 = least positive)
    var posStart = midIdx + (hasNeutral ? 1 : 0);
    for (var pi = posStart; pi < n; pi++) {
      (function(idx) {
        var lbl = scaleLabels[idx];
        series.push({
          type: 'bar', name: lbl, stack: 'likert',
          data: questions.map(function(q) { return counts[q][lbl] || 0; }),
          itemStyle: { color: scaleColors[idx] || '#94a3b8' },
          emphasis: { focus: 'series' }
        });
      })(pi);
    }

    // Legend (skip __ ghost series, deduplicate)
    var legendData = [];
    var legendSeen = {};
    series.forEach(function(s) {
      if (!s.name.startsWith('__') && !legendSeen[s.name]) { legendSeen[s.name] = true; legendData.push(s.name); }
    });

    _dDisposeDomCharts(container);
    var el = document.createElement('div');
    el.className = 'dash-block-chart';
    el.style.cssText = 'width:100%;height:' + Math.max(200, questions.length * 40 + 80) + 'px';
    container.innerHTML = '';
    container.appendChild(el);

    window.DWBVizTab.loadEcharts().then(function(ec) {
      var existing = ec.getInstanceByDom(el);
      if (existing) existing.dispose();
      var chart = ec.init(el);
      chart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: { data: legendData, bottom: 4, type: 'scroll' },
        grid: { top: 20, bottom: 40, left: 160, right: 20 },
        xAxis: {
          type: 'value',
          min: function(value) { return -Math.max(Math.abs(value.min), Math.abs(value.max)); },
          max: function(value) { return Math.max(Math.abs(value.min), Math.abs(value.max)); }
        },
        yAxis: { type: 'category', data: questions, inverse: true },
        series: series
      });
      setTimeout(function() { chart.resize(); }, 50);
    }).catch(function() { _dMissingConfig(container, 'STACKED_DIVERGING_BAR (ECharts unavailable)'); });
  }

  // ── WORD_CLOUD renderer ───────────────────────────────────────────────────────
  function _dRenderWordCloud(viz, rows, container) {
    var cfg = viz.config || {};
    var wordField = cfg.wordField || '';

    if (!wordField) {
      _dMissingConfig(container, 'WORD_CLOUD');
      return;
    }

    var maxWords = cfg.maxWords || 100;
    var wordMap = {};
    rows.forEach(function(row) {
      var word = row[wordField] !== undefined ? String(row[wordField]).trim() : '';
      if (!word) return;
      if (cfg.weightField && row[cfg.weightField] !== undefined) {
        wordMap[word] = (wordMap[word] || 0) + (parseFloat(row[cfg.weightField]) || 0);
      } else {
        wordMap[word] = (wordMap[word] || 0) + 1;
      }
    });

    var wordData = Object.keys(wordMap)
      .map(function(w) { return { name: w, value: wordMap[w] }; })
      .sort(function(a, b) { return b.value - a.value; })
      .slice(0, maxWords);

    if (!wordData.length) { _dMissingConfig(container, 'WORD_CLOUD'); return; }

    var colorMode = cfg.colorMode || 'palette';

    _dDisposeDomCharts(container);
    var el = document.createElement('div');
    el.className = 'dash-block-chart';
    el.style.cssText = 'width:100%;height:300px';
    container.innerHTML = '';
    container.appendChild(el);

    window.DWBVizTab.loadEcharts().then(function(ec) {
      if (!_dWcPromise) {
        _dWcPromise = new Promise(function(resolve, reject) {
          var s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js';
          s.onload = resolve;
          s.onerror = function() { _dWcPromise = null; reject(new Error('Word cloud library unavailable')); };
          document.head.appendChild(s);
        });
      }
      _dWcPromise.then(function() {
        var existing = ec.getInstanceByDom(el);
        if (existing) existing.dispose();
        var chart = ec.init(el);
        var accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#005EB8';
        chart.setOption({
          series: [{
            type: 'wordCloud',
            shape: 'circle',
            sizeRange: [12, 48],
            rotationRange: [0, 0],
            gridSize: 8,
            data: wordData,
            textStyle: {
              color: colorMode === 'single'
                ? accentColor
                : function() { return _D_PALETTE[Math.floor(Math.random() * _D_PALETTE.length)]; }
            }
          }]
        });
        setTimeout(function() { chart.resize(); }, 50);
      }).catch(function() {
        container.innerHTML = '<div style="padding:20px;color:var(--danger);font-size:12px">⚠️ Word cloud library unavailable.</div>';
      });
    }).catch(function() { _dMissingConfig(container, 'WORD_CLOUD (ECharts unavailable)'); });
  }

  // ── STAT_CARD renderer ─────────────────────────────────────────────────────────
  function _dComputeStatVar(variable, allRows, filteredRows) {
    var rows = variable.scope === 'unfiltered' ? allRows : filteredRows;
    if (variable.aggregation === 'count') return rows.length;
    if (!variable.field) return 0;
    var vals = rows.map(function(r) { return r[variable.field]; }).filter(function(v) { return v !== undefined && v !== null && v !== ''; });
    if (variable.aggregation === 'sum') {
      return vals.reduce(function(s, v) { return s + (parseFloat(v) || 0); }, 0);
    }
    if (variable.aggregation === 'average') {
      if (!vals.length) return 0;
      var sum = vals.reduce(function(s, v) { return s + (parseFloat(v) || 0); }, 0);
      return +(sum / vals.length).toFixed(2);
    }
    if (variable.aggregation === 'mode') {
      var freq = {};
      vals.forEach(function(v) { freq[v] = (freq[v] || 0) + 1; });
      var best = null, bestCount = -1;
      Object.keys(freq).forEach(function(k) {
        if (freq[k] > bestCount) { best = k; bestCount = freq[k]; }
      });
      return best;
    }
    return 0;
  }

  function _dRenderStatCardLine(text, varMap) {
    return text.replace(/\{\{(\w+)\}\}/g, function(match, name) {
      return varMap.hasOwnProperty(name) ? String(varMap[name]) : match;
    });
  }

  function _dRenderStatCard(contentEl, viz, allRows, filteredRows) {
    var cfg = viz.config || {};
    if (!(cfg.lines || []).length) {
      _dMissingConfig(contentEl, 'STAT_CARD');
      return;
    }
    contentEl.innerHTML = '<div class="dash-statcard"></div>';
    var cardEl = contentEl.querySelector('.dash-statcard');
    var varMap = {};
    (cfg.variables || []).forEach(function(v) {
      if (v.name) varMap[v.name] = _dComputeStatVar(v, allRows, filteredRows);
    });
    (cfg.lines || []).forEach(function(line) {
      var div = document.createElement('div');
      div.className = 'dash-statcard-line';
      div.style.fontSize = (line.fontSize || 16) + 'px';
      div.style.fontWeight = line.weight === 'bold' ? '700' : '400';
      div.style.textAlign = line.align || 'center';
      if (line.color) div.style.color = line.color;
      div.textContent = _dRenderStatCardLine(line.text || '', varMap);
      cardEl.appendChild(div);
    });
  }

  // ── QUOTES_BOARD renderer ──────────────────────────────────────────────────────
  function _dRenderQuotesBoard(contentEl, viz, rows) {
    var cfg = viz.config || {};
    if (!cfg.quoteField) { _dMissingConfig(contentEl, 'QUOTES_BOARD'); return; }
    var maxQuotes = (cfg.maxQuotes != null) ? Math.max(1, cfg.maxQuotes) : 12;
    var layout = cfg.layout || 'grid';
    var filtered = (rows || []).filter(function(row) {
      var val = row[cfg.quoteField];
      return val !== undefined && val !== null && String(val).trim() !== '';
    }).slice(0, maxQuotes);
    var cardsHtml = filtered.map(function(row) {
      var text = String(row[cfg.quoteField]);
      var attribution = (cfg.attributionField && row[cfg.attributionField] != null)
        ? String(row[cfg.attributionField]).trim() : '';
      var sentiment = '';
      if (cfg.sentimentField && row[cfg.sentimentField] != null) {
        var s = String(row[cfg.sentimentField]).toLowerCase().trim();
        if (s === 'positive' || s === 'neutral' || s === 'negative') sentiment = s;
      }
      return '<div class="dash-quote-card' + (sentiment ? ' dash-quote-' + sentiment : '') + '">' +
        '<div class="dash-quote-text">“' + _dEsc(text) + '”</div>' +
        (attribution ? '<div class="dash-quote-attribution">— ' + _dEsc(attribution) + '</div>' : '') +
        '</div>';
    }).join('');
    contentEl.innerHTML = '<div class="dash-quotes-board' + (layout === 'list' ? ' layout-list' : '') + '">' + cardsHtml + '</div>';
  }

  // ── RICH_TEXT renderer ─────────────────────────────────────────────────────────
  function _dRenderRichText(contentEl, viz, rows) {
    var cfg = viz.config || {};
    if (!cfg.text) { _dMissingConfig(contentEl, 'RICH_TEXT'); return; }
    var row = (rows && rows[0]) ? rows[0] : {};
    var text = cfg.text.replace(/\{\{(\w+)\}\}/g, function(match, name) {
      return row.hasOwnProperty(name) ? String(row[name]) : match;
    });
    contentEl.innerHTML = '<div class="dash-richtext"></div>';
    var el = contentEl.querySelector('.dash-richtext');
    el.style.fontSize = (cfg.fontSize || 16) + 'px';
    el.style.fontWeight = cfg.weight === 'bold' ? '700' : '400';
    el.style.textAlign = cfg.align || 'left';
    if (cfg.color) el.style.color = cfg.color;
    el.textContent = text;
  }

  // ── AI_ASSIST renderer ─────────────────────────────────────────────────────────
  function _dBuildAiPrompt(viz, rows) {
    var cfg = viz.config || {};
    var maxRows = cfg.maxRows || 50;
    var fields = (cfg.includeFields && cfg.includeFields.length)
      ? cfg.includeFields
      : (rows[0] ? Object.keys(rows[0]) : []);
    var sample = rows.slice(0, maxRows).map(function(row) {
      var obj = {};
      fields.forEach(function(f) { obj[f] = row[f]; });
      return obj;
    });
    var template = cfg.promptTemplate || 'Analyze the following data and provide insights:\n\n{{data}}';
    return template.replace('{{data}}', JSON.stringify(sample, null, 2));
  }

  function _dRenderAiAssist(contentEl, viz, rows) {
    var existing = (viz.config && viz.config.response) ? viz.config.response : '';
    contentEl.innerHTML =
      '<div class="dash-ai-assist">' +
        '<div class="dash-ai-controls">' +
          '<button class="dash-ai-copy-btn">📋 Copy Prompt</button>' +
          '<span class="dash-ai-copy-status"></span>' +
        '</div>' +
        '<div class="dash-ai-response-label">Response (paste here):</div>' +
        '<textarea class="dash-ai-response" placeholder="Paste the AI response here...">' + _dEsc(existing) + '</textarea>' +
      '</div>';
    var copyBtn = contentEl.querySelector('.dash-ai-copy-btn');
    var statusEl = contentEl.querySelector('.dash-ai-copy-status');
    var respEl = contentEl.querySelector('.dash-ai-response');
    copyBtn.addEventListener('click', function() {
      var prompt = _dBuildAiPrompt(viz, rows);
      try {
        navigator.clipboard.writeText(prompt).then(function() {
          statusEl.textContent = '✓ Copied';
          setTimeout(function() { statusEl.textContent = ''; }, 2000);
        }).catch(function() {
          statusEl.textContent = '⚠️ Copy failed — select and copy manually';
        });
      } catch (e) {
        statusEl.textContent = '⚠️ Clipboard unavailable';
      }
    });
    respEl.addEventListener('blur', function() {
      viz.config = viz.config || {};
      viz.config.response = this.value;
      window.DWBShell && window.DWBShell.markDirty();
    });
  }

  function _dEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return {
    mount: mount,
    renderBarVertical: _dRenderBarVertical,
    renderLine: _dRenderLine,
    renderPie: _dRenderPie,
    renderStackedDivergingBar: _dRenderStackedDivergingBar,
    renderWordCloud: _dRenderWordCloud,
    renderStatCard: _dRenderStatCard,
    renderQuotesBoard: _dRenderQuotesBoard,
    renderRichText: _dRenderRichText,
    renderAiAssist: _dRenderAiAssist,
    aggregateRows: _dAggregateRows
  };
})();

/* --- src\v2\displays\displays-tab.js --- */
/* === DWBDisplaysTab: displays management and canvas === */

window.DWBDisplaysTab = (function() {
  const _dtTypeIcons = { DASHBOARD: '🖥', REPORT: '📄', PRESENTATION: '🎭', MERGE: '🔗' };
  const _dtTypeLabels = { DASHBOARD: 'Dashboard', REPORT: 'Report', PRESENTATION: 'Presentation', MERGE: 'Merge' };

  function _dtActiveDisplay() {
    const state = window.DWBState;
    if (!state.flow || !state.activeDisplayId) return null;
    return state.flow.displays.find(function(d) { return d.id === state.activeDisplayId; }) || null;
  }

  function mount() {
    const panel = document.getElementById('panel-displays');
    if (!panel) return;

    panel.innerHTML = `
      <div id="dt-rail">
        <div id="dt-rail-header">
          <span>Displays</span>
          <span style="margin-left:auto;font-size:10px;color:var(--text-faint)" id="dt-count"></span>
        </div>
        <div id="dt-display-list"></div>
        <button class="dt-add-btn" id="dt-add-display-btn">＋ Add Display</button>
      </div>
      <div id="dt-canvas-area" id="dt-canvas-area"></div>`;

    document.getElementById('dt-add-display-btn').addEventListener('click', _dtShowAddModal);
    _dtRenderRail();
    _dtRenderCanvas();
  }

  function _dtRenderRail() {
    const list = document.getElementById('dt-display-list');
    if (!list) return;
    const state = window.DWBState;
    const displays = (state.flow && state.flow.displays) || [];
    const countEl = document.getElementById('dt-count');
    if (countEl) countEl.textContent = displays.length;

    if (displays.length === 0) {
      list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-faint);font-size:11px">No displays yet.</div>';
      return;
    }

    list.innerHTML = displays.map(function(d) {
      const icon = _dtTypeIcons[d.type] || '📊';
      const isSelected = d.id === state.activeDisplayId;
      return `<div class="dt-display-item${isSelected ? ' selected' : ''}" data-disp-id="${d.id}">
        <span class="dt-display-icon">${icon}</span>
        <div class="dt-display-info">
          <div class="dt-display-label" title="${_dtEsc(d.label)}">${_dtEsc(d.label)}</div>
          <div class="dt-display-type">${d.type}</div>
        </div>
        <button class="dt-display-del" data-del-id="${d.id}" title="Delete">✕</button>
      </div>`;
    }).join('');

    list.querySelectorAll('.dt-display-item').forEach(function(item) {
      item.addEventListener('click', function(e) {
        if (e.target.closest('.dt-display-del')) return;
        window.DWBState.activeDisplayId = item.dataset.dispId;
        _dtRenderRail();
        _dtRenderCanvas();
      });
    });

    list.querySelectorAll('.dt-display-del').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        _dtDeleteDisplay(btn.dataset.delId);
      });
    });
  }

  function _dtRenderCanvas() {
    const area = document.getElementById('dt-canvas-area');
    if (!area) return;

    const display = _dtActiveDisplay();
    if (!display) {
      area.innerHTML = '<div class="empty-state"><div class="es-icon">🖥</div><div class="es-title">No display selected</div><div class="es-desc">Select or create a display from the rail.</div></div>';
      return;
    }

    switch (display.type) {
      case 'DASHBOARD':     window.DWBDashboard    && window.DWBDashboard.mount(area, display);    break;
      case 'REPORT':        window.DWBReport       && window.DWBReport.mount(area, display);       break;
      case 'PRESENTATION':  window.DWBPresentation && window.DWBPresentation.mount(area, display); break;
      default:
        area.innerHTML = '<div class="empty-state"><div class="es-icon">🔧</div><div class="es-title">' + _dtEsc(display.type) + '</div><div class="es-desc">Coming soon</div></div>';
    }
  }

  function _dtDeleteDisplay(dispId) {
    const state = window.DWBState;
    if (!state.flow) return;
    if (state.flow.displays.length <= 1) { alert('Cannot delete the only display.'); return; }
    state.flow.displays = state.flow.displays.filter(function(d) { return d.id !== dispId; });
    if (state.activeDisplayId === dispId) {
      state.activeDisplayId = state.flow.displays[0] ? state.flow.displays[0].id : null;
    }
    window.DWBShell.markDirty();
    mount();
  }

  function _dtShowAddModal() {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.style.zIndex = '600';

    const types = ['DASHBOARD', 'REPORT', 'PRESENTATION'];
    overlay.innerHTML = `<div class="modal" style="width:420px">
      <div class="modal-header">
        <span>Add Display</span>
        <button class="modal-close" id="dt-modal-close">✕</button>
      </div>
      <div style="padding:16px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
          ${types.map(function(t) {
            return '<button class="dt-type-card" data-type="' + t + '" style="padding:16px 10px;border:2px solid var(--border);border-radius:8px;background:var(--bg-raised);cursor:pointer;text-align:center;font-family:inherit">' +
              '<div style="font-size:28px;margin-bottom:6px">' + _dtTypeIcons[t] + '</div>' +
              '<div style="font-weight:700;font-size:13px">' + _dtTypeLabels[t] + '</div>' +
              '</button>';
          }).join('')}
        </div>
        <div class="form-row"><label>Display name</label><input type="text" id="dt-new-name" value="New Display" style="width:100%"></div>
        <button class="btn-primary" id="dt-create-btn" style="width:100%;padding:8px;margin-top:8px">Create</button>
      </div>
    </div>`;

    let selectedType = 'DASHBOARD';
    document.body.appendChild(overlay);

    overlay.querySelector('#dt-modal-close').addEventListener('click', function() { document.body.removeChild(overlay); });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) document.body.removeChild(overlay); });

    overlay.querySelectorAll('.dt-type-card').forEach(function(card) {
      card.addEventListener('click', function() {
        selectedType = card.dataset.type;
        overlay.querySelectorAll('.dt-type-card').forEach(function(c) {
          c.style.borderColor = c.dataset.type === selectedType ? 'var(--accent)' : 'var(--border)';
          c.style.background  = c.dataset.type === selectedType ? 'var(--accent-light)' : 'var(--bg-raised)';
        });
      });
      if (card.dataset.type === selectedType) {
        card.style.borderColor = 'var(--accent)';
        card.style.background  = 'var(--accent-light)';
      }
    });

    overlay.querySelector('#dt-create-btn').addEventListener('click', function() {
      const name = overlay.querySelector('#dt-new-name').value.trim() || _dtTypeLabels[selectedType];
      _dtAddDisplay(selectedType, name);
      document.body.removeChild(overlay);
    });
  }

  function _dtAddDisplay(type, label) {
    const state = window.DWBState;
    if (!state.flow) return;
    const d = window.DWBSchema.createDisplay(type, label);
    state.flow.displays.push(d);
    state.activeDisplayId = d.id;
    window.DWBShell.markDirty();
    mount();
  }

  function _dtEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { mount: mount };
})();

/* --- src\v2\displays\presentation\presentation.js --- */
/* === DWBPresentation: slide-based presentation display === */

window.DWBPresentation = (function() {
  let _presActiveIdx = 0;
  let _presPptxPromise = null;

  function _presLoadPptx() {
    if (window.PptxGenJS) return Promise.resolve(window.PptxGenJS);
    if (_presPptxPromise) return _presPptxPromise;
    _presPptxPromise = new Promise(function(resolve, reject) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/pptxgenjs@3/dist/pptxgen.bundled.js';
      s.onload = function() { resolve(window.PptxGenJS); };
      s.onerror = function() { _presPptxPromise = null; reject(new Error('PptxGenJS failed')); };
      document.head.appendChild(s);
      setTimeout(function() { if (!window.PptxGenJS) { _presPptxPromise = null; reject(new Error('PptxGenJS timeout')); } }, 8000);
    });
    return _presPptxPromise;
  }

  function mount(container, display) {
    if (!container || !display) return;
    const placements = display.placements || [];
    if (_presActiveIdx >= placements.length && placements.length > 0) _presActiveIdx = placements.length - 1;

    container.innerHTML = `<div class="pres-root">
      <div class="pres-toolbar">
        <span style="font-size:13px;font-weight:600;color:var(--text-main);flex:1">${_presEsc(display.label)}</span>
        <button class="tb-btn" id="pres-add-slide-tb">＋ Add Slide</button>
        <button class="tb-btn" id="pres-export-btn">↓ Export PPTX</button>
      </div>
      <div class="pres-body">
        <div class="pres-strip" id="pres-strip"></div>
        <div class="pres-canvas" id="pres-canvas"></div>
      </div>
    </div>`;

    container.querySelector('#pres-add-slide-tb').addEventListener('click', function() {
      _presAddSlide(display, container);
    });
    container.querySelector('#pres-export-btn').addEventListener('click', function() {
      _presExportPptx(display);
    });

    _presRenderStrip(display, container);
    _presRenderSlide(display, container);
  }

  function _presRenderStrip(display, container) {
    const strip = container.querySelector('#pres-strip');
    if (!strip) return;
    const placements = display.placements || [];

    strip.innerHTML = '';
    placements.forEach(function(p, idx) {
      const thumb = document.createElement('div');
      thumb.className = 'pres-slide-thumb' + (idx === _presActiveIdx ? ' active' : '');
      thumb.innerHTML = '<div class="pres-slide-num">Slide ' + (idx + 1) + '</div>' +
        '<div style="font-size:10px;font-weight:600">' + _presEsc(p.slideTitle || 'Untitled') + '</div>';
      thumb.addEventListener('click', function() {
        _presActiveIdx = idx;
        _presRenderStrip(display, container);
        _presRenderSlide(display, container);
      });
      strip.appendChild(thumb);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'pres-add-slide-btn';
    addBtn.textContent = '＋ Add Slide';
    addBtn.addEventListener('click', function() { _presAddSlide(display, container); });
    strip.appendChild(addBtn);
  }

  function _presRenderSlide(display, container) {
    const canvas = container.querySelector('#pres-canvas');
    if (!canvas) return;
    const placements = display.placements || [];

    if (placements.length === 0) {
      canvas.innerHTML = '<div class="empty-state"><div class="es-icon">🎭</div><div class="es-title">No slides yet</div><div class="es-desc">Add a slide to get started.</div></div>';
      return;
    }

    const p = placements[_presActiveIdx];
    if (!p) return;

    const state = window.DWBState;
    const snapshots = state.snapshots || {};
    const vizList = (state.flow && state.flow.visualizations) || [];
    const viz = vizList.find(function(v) { return v.id === p.vizId; });
    const rows = viz ? (snapshots[viz.snapshotName] || []) : [];

    canvas.innerHTML = `<div style="width:100%;max-width:900px">
      <div class="pres-slide">
        <div class="pres-slide-title-bar" contenteditable="true" id="pres-slide-title" spellcheck="false">${_presEsc(p.slideTitle || 'Slide ' + (_presActiveIdx+1))}</div>
        <div class="pres-slide-content" id="pres-slide-body"></div>
        ${p.notes ? '<div class="pres-slide-notes">Notes: ' + _presEsc(p.notes) + '</div>' : ''}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
        <button class="tb-btn" id="pres-del-slide">✕ Delete Slide</button>
        <button class="btn-primary" id="pres-bind-viz">📊 Bind Visualization</button>
        <input type="text" id="pres-notes-input" value="${_presEsc(p.notes||'')}" placeholder="Speaker notes…" style="flex:1">
      </div>
    </div>`;

    const titleEl = canvas.querySelector('#pres-slide-title');
    titleEl.addEventListener('input', function() {
      p.slideTitle = titleEl.textContent.trim();
      window.DWBShell.markDirty();
      _presRenderStrip(display, container);
    });

    canvas.querySelector('#pres-notes-input').addEventListener('input', function(e) {
      p.notes = e.target.value;
      window.DWBShell.markDirty();
    });

    canvas.querySelector('#pres-del-slide').addEventListener('click', function() {
      display.placements.splice(_presActiveIdx, 1);
      if (_presActiveIdx >= display.placements.length) _presActiveIdx = Math.max(0, display.placements.length - 1);
      window.DWBShell.markDirty();
      _presRenderStrip(display, container);
      _presRenderSlide(display, container);
    });

    canvas.querySelector('#pres-bind-viz').addEventListener('click', function() {
      _presBindViz(p, display, container);
    });

    const body = canvas.querySelector('#pres-slide-body');
    if (viz && body && window.DWBVizTab) {
      window.DWBVizTab.renderViz(viz, rows, body);
    } else if (body) {
      body.innerHTML = '<div class="empty-state"><div class="es-icon">📊</div><div class="es-desc">Bind a visualization to this slide.</div></div>';
    }
  }

  function _presAddSlide(display, container) {
    const placement = window.DWBSchema.createPlacement(null, 'PRESENTATION');
    placement.slideTitle = 'Slide ' + ((display.placements||[]).length + 1);
    display.placements = display.placements || [];
    display.placements.push(placement);
    _presActiveIdx = display.placements.length - 1;
    window.DWBShell.markDirty();
    _presRenderStrip(display, container);
    _presRenderSlide(display, container);
  }

  function _presBindViz(placement, display, container) {
    const state = window.DWBState;
    const vizList = (state.flow && state.flow.visualizations) || [];
    if (vizList.length === 0) { alert('No visualizations. Create some in the Viz tab first.'); return; }

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.style.zIndex = '600';
    overlay.innerHTML = `<div class="modal" style="width:360px">
      <div class="modal-header"><span>Bind Visualization</span><button class="modal-close" id="pres-bind-close">✕</button></div>
      <div style="padding:16px">
        <div class="form-row"><label>Visualization</label>
          <select id="pres-bind-sel" style="width:100%">
            <option value="">-- None --</option>
            ${vizList.map(function(v) { return '<option value="' + _presEsc(v.id) + '"' + (placement.vizId === v.id ? ' selected' : '') + '>' + _presEsc(v.label) + '</option>'; }).join('')}
          </select></div>
        <button class="btn-primary" id="pres-bind-ok" style="width:100%;margin-top:8px;padding:7px">OK</button>
      </div>
    </div>`;

    document.body.appendChild(overlay);
    overlay.querySelector('#pres-bind-close').addEventListener('click', function() { document.body.removeChild(overlay); });
    overlay.querySelector('#pres-bind-ok').addEventListener('click', function() {
      placement.vizId = overlay.querySelector('#pres-bind-sel').value || null;
      window.DWBShell.markDirty();
      document.body.removeChild(overlay);
      _presRenderSlide(display, container);
    });
  }

  function _presExportPptx(display) {
    _presLoadPptx().then(function(PptxGenJS) {
      const pptx = new PptxGenJS();
      const state = window.DWBState;
      const snapshots = state.snapshots || {};
      const vizList = (state.flow && state.flow.visualizations) || [];

      (display.placements || []).forEach(function(p) {
        const slide = pptx.addSlide();
        const title = p.slideTitle || '';
        if (title) {
          slide.addText(title, { x: 0.5, y: 0.3, fontSize: 24, bold: true, color: '002244' });
        }
        if (p.notes) slide.addNotes(p.notes);
      });

      pptx.writeFile({ fileName: (display.label || 'presentation') + '.pptx' });
      window.DWBShell && window.DWBShell.log('Exported PPTX: ' + display.label, 'success');
    }).catch(function(e) {
      alert('PPTX export failed: ' + e.message);
    });
  }

  function _presEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { mount: mount };
})();

/* --- src\v2\displays\report\report.js --- */
/* === DWBReport: paginated report display === */

window.DWBReport = (function() {
  let _rJsPDFPromise = null;

  function _rLoadJsPDF() {
    if (window.jspdf) return Promise.resolve(window.jspdf);
    if (_rJsPDFPromise) return _rJsPDFPromise;
    _rJsPDFPromise = new Promise(function(resolve, reject) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2/dist/jspdf.umd.min.js';
      s.onload = function() { resolve(window.jspdf); };
      s.onerror = function() { _rJsPDFPromise = null; reject(new Error('jsPDF load failed')); };
      document.head.appendChild(s);
      setTimeout(function() { if (!window.jspdf) { _rJsPDFPromise = null; reject(new Error('jsPDF timeout')); } }, 8000);
    });
    return _rJsPDFPromise;
  }

  function mount(container, display) {
    if (!container || !display) return;
    const cfg = display.config || {};

    container.innerHTML = `<div class="report-root">
      <div class="report-toolbar">
        <span style="font-size:13px;font-weight:600;color:var(--text-main);flex:1">${_rEsc(display.label)}</span>
        <button class="tb-btn" id="r-add-section">＋ Add Section</button>
        <button class="tb-btn" id="r-export-pdf">↓ Export PDF</button>
      </div>
      <div class="report-canvas" id="r-canvas"></div>
    </div>`;

    container.querySelector('#r-add-section').addEventListener('click', function() {
      _rAddPlacement(display, container);
    });
    container.querySelector('#r-export-pdf').addEventListener('click', function() {
      _rExportPDF(display, container);
    });

    _rRenderPages(display, container);
  }

  function _rRenderPages(display, container) {
    const canvas = container.querySelector('#r-canvas');
    if (!canvas) return;
    const state = window.DWBState;
    const snapshots = state.snapshots || {};
    const vizList = (state.flow && state.flow.visualizations) || [];
    const cfg = display.config || {};
    const placements = display.placements || [];

    canvas.innerHTML = '';

    // Cover page
    const cover = document.createElement('div');
    cover.className = 'report-page';
    cover.innerHTML = `<div class="report-cover">
      <div class="report-cover-title">${_rEsc(display.label)}</div>
      <div class="report-cover-sub">${new Date().toLocaleDateString()}</div>
    </div>`;
    canvas.appendChild(cover);

    // Content pages
    if (placements.length === 0) {
      const emptyPage = document.createElement('div');
      emptyPage.className = 'report-page';
      emptyPage.innerHTML = `<div class="report-page-header"><span>${_rEsc(display.label)}</span><span>${new Date().toLocaleDateString()}</span></div>
        <div class="empty-state"><div class="es-icon">📄</div><div class="es-desc">Click ＋ Add Section to add content.</div></div>
        <div class="report-page-footer"><span>${_rEsc(display.label)}</span><span>Page 2</span></div>
        <button class="report-add-btn" id="r-first-add">＋ Add first section</button>`;
      emptyPage.querySelector('#r-first-add').addEventListener('click', function() {
        _rAddPlacement(display, container);
      });
      canvas.appendChild(emptyPage);
      return;
    }

    let currentPage = null;
    let pageNum = 2;

    placements.forEach(function(placement) {
      if (!currentPage || placement.pageBreakBefore) {
        currentPage = document.createElement('div');
        currentPage.className = 'report-page';
        currentPage.innerHTML = `<div class="report-page-header"><span>${_rEsc(display.label)}</span><span>${new Date().toLocaleDateString()}</span></div>
          <div class="r-page-content" id="r-page-content-${pageNum}"></div>
          <div class="report-page-footer"><span>${_rEsc(display.label)}</span><span>Page ${pageNum}</span></div>`;
        canvas.appendChild(currentPage);
        pageNum++;
      }

      const pageContent = currentPage.querySelector('.r-page-content') || currentPage;
      const viz = vizList.find(function(v) { return v.id === placement.vizId; });
      const rows = viz ? (snapshots[viz.snapshotName] || []) : [];

      const section = document.createElement('div');
      section.className = 'report-section';
      section.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between">
        <div class="report-section-title">${viz ? _rEsc(viz.label) : 'Section'}</div>
        <button class="tb-btn" data-del-id="${placement.id}" style="font-size:10px;padding:2px 7px">✕</button>
      </div>
      <div class="r-section-body" id="r-sb-${placement.id}"></div>
      ${placement.caption ? '<div class="report-caption">' + _rEsc(placement.caption) + '</div>' : ''}`;

      section.querySelector('[data-del-id]').addEventListener('click', function() {
        display.placements = display.placements.filter(function(p) { return p.id !== placement.id; });
        window.DWBShell.markDirty();
        _rRenderPages(display, container);
      });

      pageContent.appendChild(section);

      const body = section.querySelector('#r-sb-' + placement.id);
      if (viz && body && window.DWBVizTab) {
        window.DWBVizTab.renderViz(viz, rows, body);
      } else if (body) {
        body.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:16px 0">No visualization bound.</div>';
      }
    });

    // Add section button at end
    const lastPage = canvas.lastElementChild;
    if (lastPage) {
      const addBtn = document.createElement('button');
      addBtn.className = 'report-add-btn';
      addBtn.textContent = '＋ Add Section';
      addBtn.addEventListener('click', function() { _rAddPlacement(display, container); });
      lastPage.querySelector('.r-page-content') ? lastPage.querySelector('.r-page-content').appendChild(addBtn) : lastPage.appendChild(addBtn);
    }
  }

  function _rAddPlacement(display, container) {
    const state = window.DWBState;
    const vizList = (state.flow && state.flow.visualizations) || [];
    if (vizList.length === 0) { alert('No visualizations exist. Create some in the Viz tab first.'); return; }

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.style.zIndex = '600';
    overlay.innerHTML = `<div class="modal" style="width:360px">
      <div class="modal-header"><span>Add Report Section</span><button class="modal-close" id="r-modal-close">✕</button></div>
      <div style="padding:16px">
        <div class="form-row"><label>Visualization</label>
          <select id="r-viz-sel" style="width:100%">
            <option value="">-- None --</option>
            ${vizList.map(function(v) { return '<option value="' + _rEsc(v.id) + '">' + _rEsc(v.label) + '</option>'; }).join('')}
          </select></div>
        <div class="form-row"><label>Caption (optional)</label>
          <input type="text" id="r-caption" style="width:100%" placeholder="Figure caption…"></div>
        <div class="form-row-inline form-row"><label><input type="checkbox" id="r-pagebreak"> Page break before</label></div>
        <button class="btn-primary" id="r-modal-ok" style="width:100%;margin-top:8px;padding:7px">Add</button>
      </div>
    </div>`;

    document.body.appendChild(overlay);
    overlay.querySelector('#r-modal-close').addEventListener('click', function() { document.body.removeChild(overlay); });
    overlay.querySelector('#r-modal-ok').addEventListener('click', function() {
      const vizId = overlay.querySelector('#r-viz-sel').value || null;
      const p = window.DWBSchema.createPlacement(vizId, 'REPORT');
      p.caption = overlay.querySelector('#r-caption').value;
      p.pageBreakBefore = overlay.querySelector('#r-pagebreak').checked;
      display.placements = display.placements || [];
      display.placements.push(p);
      window.DWBShell.markDirty();
      document.body.removeChild(overlay);
      _rRenderPages(display, container);
    });
  }

  function _rExportPDF(display, container) {
    const canvas = container.querySelector('#r-canvas');
    if (!canvas) return;

    Promise.all([
      _rLoadJsPDF(),
      new Promise(function(resolve, reject) {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1/dist/html2canvas.min.js';
        s.onload = resolve;
        s.onerror = reject;
        if (window.html2canvas) { resolve(); return; }
        document.head.appendChild(s);
        setTimeout(reject, 8000);
      })
    ]).then(function() {
      const jspdf = window.jspdf;
      if (!jspdf || !window.html2canvas) { alert('PDF dependencies not loaded.'); return; }
      const { jsPDF } = jspdf;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      const pages = canvas.querySelectorAll('.report-page');
      let promise = Promise.resolve();

      pages.forEach(function(page, idx) {
        promise = promise.then(function() {
          return window.html2canvas(page, { scale: 1.5, useCORS: true }).then(function(cvs) {
            if (idx > 0) pdf.addPage();
            const imgData = cvs.toDataURL('image/jpeg', 0.85);
            pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
          });
        });
      });

      promise.then(function() {
        pdf.save((display.label || 'report') + '.pdf');
        window.DWBShell && window.DWBShell.log('Exported PDF', 'success');
      });
    }).catch(function(e) {
      alert('PDF export failed. Make sure you are online to load dependencies.\n' + e.message);
    });
  }

  function _rEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { mount: mount };
})();

/* --- src\v2\displays\timeline\timeline.js --- */
/* === DWBTimelines: timeline viz renderers === */

window.DWBTimelines = (function() {
  function render(viz, rows, container) {
    switch (viz.type) {
      case 'TIMELINE_HORIZONTAL': _tlRenderHorizontal(viz, rows, container); break;
      case 'TIMELINE_GANTT':      _tlRenderGantt(viz, rows, container);      break;
      case 'TIMELINE_VERTICAL':   _tlRenderVertical(viz, rows, container);   break;
      default: container.innerHTML = '<div style="padding:16px;color:var(--text-muted)">Unknown timeline type</div>';
    }
  }

  function _tlGetField(cfg, rows, key, fallbackIdx) {
    if (cfg[key]) return cfg[key];
    if (!rows.length) return '';
    const cols = Object.keys(rows[0]);
    return cols[fallbackIdx] || cols[0] || '';
  }

  function _tlRenderHorizontal(viz, rows, container) {
    const cfg = viz.config || {};
    const dateField  = _tlGetField(cfg, rows, 'dateField', 0);
    const labelField = _tlGetField(cfg, rows, 'labelField', 1);

    if (!rows.length) {
      container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px">No data to display.</div>';
      return;
    }

    // Sort by date
    const events = rows.slice().sort(function(a, b) {
      return new Date(a[dateField]) - new Date(b[dateField]);
    });

    // Simple equal-spacing horizontal layout
    const totalWidth = Math.max(800, events.length * 120);
    const html = `<div class="tl-h-wrap" style="min-width:${totalWidth}px">
      <div class="tl-h-track">
        ${events.map(function(row, idx) {
          const pct = events.length === 1 ? 50 : (idx / (events.length - 1)) * 100;
          const label = _tlEsc(String(row[labelField] || ''));
          const date  = _tlEsc(String(row[dateField] || ''));
          return `<div class="tl-h-event" style="left:${pct}%">
            <div class="tl-h-dot"></div>
            <div class="tl-h-label">${label}</div>
            <div class="tl-h-date">${date}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

    container.innerHTML = html;
    _tlRenderConfigHint(viz, container, 'dateField, labelField');
  }

  function _tlRenderGantt(viz, rows, container) {
    const cfg = viz.config || {};
    const taskField  = _tlGetField(cfg, rows, 'taskField', 0);
    const startField = _tlGetField(cfg, rows, 'startField', 1);
    const endField   = _tlGetField(cfg, rows, 'endField', 2);

    if (!rows.length) {
      container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px">No data to display.</div>';
      return;
    }

    // Find min/max dates for scaling
    let minDate = Infinity, maxDate = -Infinity;
    rows.forEach(function(row) {
      const s = new Date(row[startField]).getTime();
      const e = new Date(row[endField]).getTime();
      if (!isNaN(s)) minDate = Math.min(minDate, s);
      if (!isNaN(e)) maxDate = Math.max(maxDate, e);
    });

    if (!isFinite(minDate)) {
      container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px">Could not parse date fields. Configure startField and endField in config.</div>';
      return;
    }

    const range = maxDate - minDate || 1;

    let html = '<div class="tl-gantt-wrap"><table class="tl-gantt-table">';
    html += '<thead><tr><th style="width:200px">Task</th><th>Start</th><th>End</th><th>Duration</th></tr></thead><tbody>';

    rows.forEach(function(row) {
      const task  = String(row[taskField] || '');
      const start = new Date(row[startField]);
      const end   = new Date(row[endField]);
      const sTs   = start.getTime();
      const eTs   = end.getTime();

      const left  = isNaN(sTs) ? 0 : ((sTs - minDate) / range) * 100;
      const width = isNaN(sTs) || isNaN(eTs) ? 20 : Math.max(2, ((eTs - sTs) / range) * 100);
      const days  = isNaN(sTs) || isNaN(eTs) ? '?' : Math.round((eTs - sTs) / 86400000) + 'd';

      html += `<tr class="tl-gantt-row">
        <td>${_tlEsc(task)}</td>
        <td>${isNaN(sTs) ? _tlEsc(String(row[startField]||'')) : start.toLocaleDateString()}</td>
        <td>${isNaN(eTs) ? _tlEsc(String(row[endField]||'')) : end.toLocaleDateString()}</td>
        <td class="tl-gantt-bar-cell">
          <div class="tl-gantt-bar-track">
            <div class="tl-gantt-bar" style="left:${left}%;width:${width}%">${_tlEsc(days)}</div>
          </div>
        </td>
      </tr>`;
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;
    _tlRenderConfigHint(viz, container, 'taskField, startField, endField');
  }

  function _tlRenderVertical(viz, rows, container) {
    const cfg = viz.config || {};
    const dateField  = _tlGetField(cfg, rows, 'dateField', 0);
    const titleField = _tlGetField(cfg, rows, 'titleField', 1);
    const descField  = _tlGetField(cfg, rows, 'descField', 2);

    if (!rows.length) {
      container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px">No data to display.</div>';
      return;
    }

    const sorted = rows.slice().sort(function(a, b) {
      return new Date(a[dateField]) - new Date(b[dateField]);
    });

    let html = '<div class="tl-v-wrap">';
    sorted.forEach(function(row) {
      const date  = String(row[dateField] || '');
      const title = String(row[titleField] || '');
      const desc  = descField ? String(row[descField] || '') : '';
      html += `<div class="tl-v-event">
        <div class="tl-v-dot-col"><div class="tl-v-dot"></div></div>
        <div class="tl-v-content">
          <div class="tl-v-title">${_tlEsc(title)}</div>
          <div class="tl-v-date">${_tlEsc(date)}</div>
          ${desc ? '<div class="tl-v-desc">' + _tlEsc(desc) + '</div>' : ''}
        </div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
    _tlRenderConfigHint(viz, container, 'dateField, titleField, descField');
  }

  function _tlRenderConfigHint(viz, container, fields) {
    const cfg = viz.config || {};
    const hasCfg = Object.values(cfg).some(function(v) { return v; });
    if (!hasCfg) {
      const hint = document.createElement('div');
      hint.style.cssText = 'padding:4px 8px;font-size:10px;color:var(--text-muted);background:var(--bg-raised);border-top:1px solid var(--border)';
      hint.textContent = 'Tip: Configure ' + fields + ' in the Viz tab config panel for accurate rendering.';
      container.appendChild(hint);
    }
  }

  function _tlEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { render: render };
})();

window.DWBNodes.FORMULA = {
  label: 'Formula Column',
  icon: '𝑓',
  category: 'Text Cleaning',
  defaultConfig: { outputColumn: 'result', expression: '' },

  run: function(rows, config) {
    const expr = (config.expression || '').trim();
    const out  = (config.outputColumn || 'result').trim();
    if (!expr) return rows;

    // Build a safe evaluator: expose row fields as variables
    return rows.map(function(row) {
      const nr = Object.assign({}, row);
      try {
        // Build variable declarations for each column
        const varDecls = Object.keys(row).map(function(k) {
          const v = row[k];
          const safe = k.replace(/[^a-zA-Z0-9_]/g, '_');
          const valStr = isNaN(Number(v)) ? JSON.stringify(String(v)) : String(Number(v));
          return 'var ' + safe + ' = ' + valStr + ';';
        }).join(' ');

        // Also expose row as _row
        const rowJson = JSON.stringify(row);

        /* jshint evil: true */
        nr[out] = (new Function(varDecls + ' var _row = ' + rowJson + '; return (' + expr + ');'))();
      } catch (e) {
        nr[out] = '#ERR:' + e.message;
      }
      return nr;
    });
  },

  validate: function(config) {
    if (!(config.outputColumn || '').trim()) return 'Output column name is required';

/* === DWBNodes.FUZZY_STANDARDIZE: map variants to canonical values === */
window.DWBNodes = window.DWBNodes || {};

window.DWBNodes.FUZZY_STANDARDIZE = {
  label: 'Fuzzy Standardize',
  icon: '🔤',
  category: 'Validation',
  defaultConfig: { column: '', mappings: [], threshold: 80, outputColumn: '', addScoreColumn: false },

  run: function(rows, config) {
    if (!config.column) return rows;
    const mappings = config.mappings || [];
    if (mappings.length === 0) return rows;
    const outCol = (config.outputColumn || '').trim() || config.column;
    const threshold = config.threshold !== undefined ? config.threshold : 80;

    return rows.map(function(row) {
      const nr = Object.assign({}, row);
      const val = String(row[config.column] !== undefined ? row[config.column] : '').toLowerCase().trim();
      let bestScore = 0;
      let bestCanonical = row[config.column];

      mappings.forEach(function(mapping) {
        const canonical = mapping.canonical || '';
        const variants = (mapping.variants || []);
        // Check exact match first
        if (val === canonical.toLowerCase()) { bestScore = 100; bestCanonical = canonical; return; }
        variants.forEach(function(variant) {
          if (val === variant.toLowerCase().trim()) { bestScore = 100; bestCanonical = canonical; return; }
          const score = _fsLevenshteinSim(val, variant.toLowerCase().trim());
          if (score > bestScore) { bestScore = score; bestCanonical = canonical; }
        });
        // Also check canonical itself with fuzzy
        const cScore = _fsLevenshteinSim(val, canonical.toLowerCase());
        if (cScore > bestScore) { bestScore = cScore; bestCanonical = canonical; }
      });

      nr[outCol] = bestScore >= threshold ? bestCanonical : row[config.column];
      if (config.addScoreColumn) nr[outCol + '_score'] = bestScore;
      return nr;
    });
  },

  validate: function(config) {
    if (!config.column) return 'Select a column';
    if (!config.mappings || config.mappings.length === 0) return 'Add at least one mapping';
    return null;
  },

  configUI: function(config, onChange, currentRows) {
    const div = document.createElement('div');
    const cols = currentRows && currentRows.length ? Object.keys(currentRows[0]) : [];
    const mappings = config.mappings || [];

    function renderMappings() {
      const container = div.querySelector('#fs-mappings');
      if (!container) return;
      if (mappings.length === 0) {
        container.innerHTML = '<div style="color:var(--text-faint);font-size:11px;padding:6px 0">No mappings yet.</div>';
        return;
      }
      container.innerHTML = mappings.map(function(m, idx) {
        return `<div style="border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:6px;font-size:11px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <strong style="flex:1">Canonical:</strong>
            <input type="text" class="fs-canonical" data-idx="${idx}" value="${_fsEsc(m.canonical||'')}" placeholder="Standard value" style="flex:2;padding:2px 6px;font-size:11px">
            <button class="fs-del-mapping" data-idx="${idx}" style="padding:1px 6px;font-size:11px;background:none;border:1px solid var(--border);border-radius:3px;color:var(--danger)">✕</button>
          </div>
          <div><label style="font-size:10px;color:var(--text-muted)">Variants (one per line):</label></div>
          <textarea class="fs-variants" data-idx="${idx}" style="width:100%;height:60px;font-size:11px;resize:vertical" placeholder="variant1&#10;variant2">${_fsEsc((m.variants||[]).join('\n'))}</textarea>
        </div>`;
      }).join('');

      container.querySelectorAll('.fs-canonical').forEach(function(inp) {
        inp.addEventListener('input', function() {
          mappings[parseInt(inp.dataset.idx,10)].canonical = inp.value;
          onChange('mappings', mappings.slice());
        });
      });
      container.querySelectorAll('.fs-variants').forEach(function(ta) {
        ta.addEventListener('input', function() {
          mappings[parseInt(ta.dataset.idx,10)].variants = ta.value.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
          onChange('mappings', mappings.slice());
        });
      });
      container.querySelectorAll('.fs-del-mapping').forEach(function(btn) {
        btn.addEventListener('click', function() {
          mappings.splice(parseInt(btn.dataset.idx,10), 1);
          onChange('mappings', mappings.slice());
          renderMappings();
        });
      });
    }

    div.innerHTML = `
      <div class="form-row"><label>Column</label>
        <select id="fs-col" style="width:100%"><option value="">-- select --</option>
        ${cols.map(function(c) { return '<option value="' + _fsEsc(c) + '"' + (config.column === c ? ' selected' : '') + '>' + _fsEsc(c) + '</option>'; }).join('')}
        </select></div>
      <div class="form-row"><label>Output column (blank = overwrite)</label>
        <input type="text" id="fs-out" value="${_fsEsc(config.outputColumn||'')}" style="width:100%"></div>
      <div class="form-row"><label>Match threshold (0–100)</label>
        <input type="number" id="fs-thresh" value="${config.threshold !== undefined ? config.threshold : 80}" min="0" max="100" style="width:100%"></div>
      <div class="form-row-inline form-row"><label><input type="checkbox" id="fs-score" ${config.addScoreColumn ? 'checked' : ''}> Add score column</label></div>
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin:8px 0 4px">Mappings</div>
      <div id="fs-mappings"></div>
      <button id="fs-add-mapping" style="padding:4px 10px;font-size:11px;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;color:var(--text-main);cursor:pointer">＋ Add Mapping</button>`;

    div.querySelector('#fs-col').addEventListener('change', function(e) { onChange('column', e.target.value); });
    div.querySelector('#fs-out').addEventListener('input', function(e) { onChange('outputColumn', e.target.value); });
    div.querySelector('#fs-thresh').addEventListener('input', function(e) { onChange('threshold', parseInt(e.target.value,10)||80); });
    div.querySelector('#fs-score').addEventListener('change', function(e) { onChange('addScoreColumn', e.target.checked); });
    div.querySelector('#fs-add-mapping').addEventListener('click', function() {
      mappings.push({ canonical: '', variants: [] });
      onChange('mappings', mappings.slice());
      renderMappings();
    });

    renderMappings();
    return div;
  }
};

function _fsLevenshteinSim(a, b) {
  if (a === b) return 100;
  const m = a.length, n = b.length;
  if (m === 0 || n === 0) return 0;
  const dp = [];
  for (let i = 0; i <= m; i++) { dp[i] = [i]; }
  for (let j = 0; j <= n; j++) { dp[0][j] = j; }
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  const dist = dp[m][n];
  return Math.round((1 - dist / Math.max(m, n)) * 100);
}

function _fsEsc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

      ? '<div style="font-size:12px;color:var(--success)">✓ Loaded: ' + (config.filename || node.config.filename) + '</div>'
      : '';

    div.innerHTML = `
      <div id="ingest-dz" style="border:2px dashed var(--border-strong);border-radius:6px;padding:20px;text-align:center;cursor:pointer;transition:all 0.15s">
        <div style="font-size:28px;margin-bottom:6px">📁</div>

          <input type="file" accept=".csv,.tsv,.txt" style="display:none" id="ingest-file-input">
        </label>
      </div>
      ${status}`;

    const input = div.querySelector('#ingest-file-input');
    const dz = div.querySelector('#ingest-dz');

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        // Parse CSV and store as sourceData
        const parsed = window.DWBPipeline.parseCSV(ev.target.result);
        const state = window.DWBState;
        const selectedId = state.selectedNodeId;
        const flowNode = state.flow.pipeline.nodes.find(function(n) { return n.id === selectedId; });
        if (!flowNode) return;

        // Find or create sourceData entry
        let sd = state.flow.pipeline.sourceData.find(function(s) { return s.id === flowNode.sourceId; });
        if (!sd) {
          sd = window.DWBSchema.createSourceData(file.name);
          state.flow.pipeline.sourceData.push(sd);
          flowNode.sourceId = sd.id;
        }
        sd.filename = file.name;
        sd.rows = parsed.rows;
        flowNode.label = file.name;
        window.DWBShell.markDirty();
        window.DWBPipeline.run().then(function() {
          window.DWBPipelineTab && window.DWBPipelineTab.refresh();
        });
      };
      reader.readAsText(file);
    }

    input.addEventListener('change', function(e) { handleFile(e.target.files[0]); });
    dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.style.borderColor = 'var(--accent)'; });
    dz.addEventListener('dragleave', function() { dz.style.borderColor = 'var(--border-strong)'; });
    dz.addEventListener('drop', function(e) {
      e.preventDefault(); dz.style.borderColor = 'var(--border-strong)';
      handleFile(e.dataTransfer.files[0]);
    });

    return div;
  }

window.DWBio = (function() {
  const AUTOSAVE_KEY = 'dwb2_autosave';

  function autoSave() {
    const state = window.DWBState;
    if (!state || !state.flow) return;
    try {
      const data = window.DWBSchema.serialize(state.flow);
      localStorage.setItem(AUTOSAVE_KEY, data);
    } catch (e) {
      // storage quota or serialization error - non-fatal
    }
  }

  function loadAutoSave() {
    try {
      const raw = localStorage.getItem(AUTOSAVE_KEY);
      if (!raw) return false;
      const flow = window.DWBSchema.deserialize(raw);
      window.DWBShell.loadFlow(flow);
      window.DWBShell.log('Resumed autosaved flow: ' + flow.meta.name, 'success');
      // Refresh pipeline tab if already mounted
      setTimeout(function() {
        if (window.DWBState.pipelineTabMounted) {
          window.DWBPipelineTab && window.DWBPipelineTab.refresh();
        }
      }, 0);
      return true;
    } catch (e) {
      return false;
    }
  }

  function newFlow() {
    window.DWBShell.initNewFlow();
    window.DWBState.pipelineTabMounted = false;
    window.DWBPipelineTab && window.DWBPipelineTab.mount();
    window.DWBShell.switchTab('pipeline');
    window.DWBShell.log('New flow started', 'info');
  }

  function openFile(file) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const flow = window.DWBSchema.deserialize(ev.target.result);
        window.DWBShell.loadFlow(flow);
        window.DWBState.pipelineTabMounted = false;
        window.DWBPipelineTab && window.DWBPipelineTab.mount();
        window.DWBShell.switchTab('pipeline');
        window.DWBShell.log('Opened: ' + flow.meta.name, 'success');
      } catch (e) {
        window.DWBShell && window.DWBShell.log('Failed to open file: ' + e.message, 'error');
        alert('Could not open file: ' + e.message);
      }
    };
    reader.readAsText(file);
  }

  function saveFlow() {
    const state = window.DWBState;
    if (!state || !state.flow) return;
    try {
      const data = window.DWBSchema.serialize(state.flow);
      const name = (state.flow.meta.name || 'flow').replace(/[^a-zA-Z0-9_-]/g, '_');
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name + '.dwbflow';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      state.dirty = false;
      window.DWBTopbar && window.DWBTopbar.setDirty(false);
      window.DWBShell.log('Saved: ' + a.download, 'success');
    } catch (e) {
      window.DWBShell && window.DWBShell.log('Save failed: ' + e.message, 'error');
    }
  }

  return { autoSave: autoSave, loadAutoSave: loadAutoSave, newFlow: newFlow, openFile: openFile, saveFlow: saveFlow };
})();

window.DWBPipeline = (function() {
  function _parseCSV(text) {
    const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    const rows = [];
    let headers = null;

    function parseLine(line) {
      const result = [];
      let cur = '';
      let inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuote) {
          if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
          else if (ch === '"') { inQuote = false; }
          else { cur += ch; }
        } else {
          if (ch === '"') { inQuote = true; }
          else if (ch === ',') { result.push(cur); cur = ''; }
          else { cur += ch; }
        }
      }
      result.push(cur);
      return result;
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const fields = parseLine(line);
      if (!headers) { headers = fields; continue; }
      if (fields.length === 0 || (fields.length === 1 && fields[0] === '')) continue;
      const row = {};
      headers.forEach(function(h, idx) { row[h] = fields[idx] !== undefined ? fields[idx] : ''; });
      rows.push(row);
    }
    return { headers: headers || [], rows };
  }

  function _peRunNodes(nodes, sourceData, stashes, snapshots, onLog) {
    let currentRows = [];
    const localStashes = Object.assign({}, stashes);
    const nodeResults = {};

    for (let i = 0; i < nodes.length; i++) {
      const node = nodes[i];
      const type = node.type;

      try {
        if (type === 'INGEST') {
          if (node.sourceId) {
            const sd = sourceData.find(function(s) { return s.id === node.sourceId; });
            if (sd) {
              if (typeof sd.rows === 'string') {
                const parsed = _parseCSV(sd.rows);
                sd._parsedRows = parsed.rows;
                currentRows = parsed.rows;
              } else {
                currentRows = Array.isArray(sd.rows) ? sd.rows : (sd._parsedRows || []);
              }
              onLog('Ingested ' + sd.filename + ': ' + currentRows.length + ' rows', 'success');
            }
          } else if (node.config && node.config.csvText) {
            const parsed = _parseCSV(node.config.csvText);
            currentRows = parsed.rows;
            onLog('Ingested inline CSV: ' + currentRows.length + ' rows', 'success');
          } else {
            currentRows = [];
          }
        } else if (type === 'STASH_SAVE') {
          const sname = (node.config && node.config.name) || ('stash_' + i);
          localStashes[sname] = currentRows.slice();
          onLog('Stashed "' + sname + '": ' + currentRows.length + ' rows', 'info');
        } else if (type === 'STASH_RESTORE') {
          const sname = (node.config && node.config.name) || '';
          if (localStashes[sname]) {
            currentRows = localStashes[sname].slice();
            onLog('Restored "' + sname + '": ' + currentRows.length + ' rows', 'info');
          } else {
            onLog('Stash "' + sname + '" not found', 'warn');
          }
        } else if (type === 'PUSH_TO_VIZ') {
          const sname = node.promotedAs || (node.config && node.config.name) || ('snapshot_' + i);
          if (sname) {
            snapshots[sname] = currentRows.slice();
            onLog('Pushed to viz as "' + sname + '": ' + currentRows.length + ' rows', 'success');
          }
          // pass-through: currentRows unchanged
        } else {
          const nodeImpl = window.DWBNodes && window.DWBNodes[type];
          if (nodeImpl && typeof nodeImpl.run === 'function') {
            const err = nodeImpl.validate ? nodeImpl.validate(node.config || {}) : null;
            if (err) {
              onLog(node.label + ': ' + err, 'warn');
            } else {
              currentRows = nodeImpl.run(currentRows, node.config || {});
            }
          } else {
            onLog('Unknown node type: ' + type + ' — passing through', 'warn');
          }
        }
        nodeResults[node.id] = { ok: true, rowCount: currentRows.length };
      } catch (e) {
        onLog(node.label + ' error: ' + e.message, 'error');
        nodeResults[node.id] = { ok: false, error: e.message, rowCount: currentRows.length };
      }
    }

    // copy local stashes back
    Object.assign(stashes, localStashes);
    return { rows: currentRows, nodeResults };
  }

  function run() {
    const state = window.DWBState;
    if (!state.flow) return Promise.resolve();
    state.snapshots = {};
    state.stashes = {};

    return new Promise(function(resolve) {
      try {
        const result = _peRunNodes(
          state.flow.pipeline.nodes,
          state.flow.pipeline.sourceData,
          state.stashes,
          state.snapshots,
          function(msg, level) { window.DWBShell && window.DWBShell.log(msg, level); }
        );
        resolve(result);
      } catch (e) {
        window.DWBShell && window.DWBShell.log('Pipeline error: ' + e.message, 'error');
        resolve({ rows: [], nodeResults: {} });
      }
    });
  }

  function runToNode(nodeId) {
    const state = window.DWBState;
    if (!state.flow) return Promise.resolve({ rows: [] });

    const nodes = state.flow.pipeline.nodes;
    const idx = nodes.findIndex(function(n) { return n.id === nodeId; });
    const subset = idx >= 0 ? nodes.slice(0, idx + 1) : nodes;
    const tmpSnaps = {};
    const tmpStashes = {};

    return new Promise(function(resolve) {
      try {
        const result = _peRunNodes(
          subset,
          state.flow.pipeline.sourceData,
          tmpStashes,
          tmpSnaps,
          function() {}
        );
        resolve(result);
      } catch (e) {
        resolve({ rows: [] });
      }
    });
  }

  return { run: run, runToNode: runToNode, parseCSV: _parseCSV };
})();

window.DWBPipelineTab = (function() {
  let _ptCurrentRows = [];
  let _ptPreviewRows = null; // null = show final output

  // Node categories for the picker
  const _ptNodeCats = [
    { cat: 'Input & Output', nodes: ['INGEST','PUSH_TO_VIZ','STASH_SAVE','STASH_RESTORE'] },
    { cat: 'Text Cleaning',  nodes: ['TRIM_WHITESPACE','CASE_NORMALIZE','FIND_REPLACE','FORMULA'] },
    { cat: 'Row Operations', nodes: ['FILTER','SORT','REMOVE_DUPS'] },
    { cat: 'Column Operations', nodes: ['REARRANGE_COLS','CONCAT_COLS'] },
    { cat: 'Validation',     nodes: ['REGEX_VALIDATE','REGEX_EXTRACT','FUZZY_STANDARDIZE'] }
  ];

  function _ptNodeIcon(type) {
    const n = window.DWBNodes && window.DWBNodes[type];
    return n ? n.icon : '⚙';
  }

  function mount() {

        <div id="pt-resize-divider"></div>
        <div id="pt-inspector">
          <div id="pt-inspector-meta">

      <div id="pt-sidebar">

        </div>

          <div id="pt-console-header">

    });

    // Wire console collapse
    document.getElementById('pt-console-header').addEventListener('click', function() {
      document.getElementById('pt-console').classList.toggle('collapsed');
    });

    // Wire console clear
    document.getElementById('pt-console-clear').addEventListener('click', function() {
      window.DWBState.consoleLogs = [];

      window.DWBState.consoleLogs.forEach(function(entry) { _ptAppendLogDOM(logEl, entry); });
