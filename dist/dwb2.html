      for(var li=0;li<scaleLabels.length;li++){if(scaleLabels[li].toLowerCase().trim()===rL){matched=scaleLabels[li];break;}}
      if(matched){var inc=1;if(cfg.countField&&row[cfg.countField]!==undefined) inc=parseInt(row[cfg.countField])||1;counts[q][matched]=(counts[q][matched]||0)+inc;}
    });
    var neutralLabel=hasNeutral?scaleLabels[midIdx]:''; var neutralColor=hasNeutral?(scaleColors[midIdx]||'#94a3b8'):'';
    var series=[];
    if(hasNeutral){series.push({type:'bar',name:'__nl_'+neutralLabel,stack:'likert',data:questions.map(function(q){return -Math.floor((counts[q][neutralLabel]||0)/2);}),itemStyle:{color:neutralColor},label:{show:false}});}
    for(var ni=0;ni<midIdx;ni++){(function(idx){var lbl=scaleLabels[idx];series.push({type:'bar',name:lbl,stack:'likert',data:questions.map(function(q){return -(counts[q][lbl]||0);}),itemStyle:{color:scaleColors[idx]||'#94a3b8'},emphasis:{focus:'series'}});})(ni);}
    if(hasNeutral){series.push({type:'bar',name:neutralLabel,stack:'likert',data:questions.map(function(q){return Math.ceil((counts[q][neutralLabel]||0)/2);}),itemStyle:{color:neutralColor},emphasis:{focus:'series'}});}
    var posStart=midIdx+(hasNeutral?1:0);
    for(var pi=posStart;pi<n;pi++){(function(idx){var lbl=scaleLabels[idx];series.push({type:'bar',name:lbl,stack:'likert',data:questions.map(function(q){return counts[q][lbl]||0;}),itemStyle:{color:scaleColors[idx]||'#94a3b8'},emphasis:{focus:'series'}});})(pi);}
    var legendData=[]; var legendSeen={};

  function computeStatVar(variable, allRows, filteredRows) {
    var rows=variable.scope==='unfiltered'?allRows:filteredRows;
    if(variable.aggregation==='count') return rows.length;
    if(!variable.field) return 0;
    var vals=rows.map(function(r){return r[variable.field];}).filter(function(v){return v!==undefined&&v!==null&&v!=='';});
    if(variable.aggregation==='sum') return vals.reduce(function(s,v){return s+(parseFloat(v)||0);},0);
    if(variable.aggregation==='average'){if(!vals.length)return 0;return +(vals.reduce(function(s,v){return s+(parseFloat(v)||0);},0)/vals.length).toFixed(2);}
    if(variable.aggregation==='mode'){var freq={};vals.forEach(function(v){freq[v]=(freq[v]||0)+1;});var best=null,bestC=-1;Object.keys(freq).forEach(function(k){if(freq[k]>bestC){best=k;bestC=freq[k];}});return best;}
    return 0;
  }

  function renderStatCard(container, viz, allRows, filteredRows) {

      div.textContent=(line.text||'').replace(/\\{\\{(\\w+)\\}\\}/g,function(m,n){return varMap.hasOwnProperty(n)?String(varMap[n]):m;});
      cardEl.appendChild(div);

    container.innerHTML=''; container.appendChild(cardEl);

  function renderKpiStat(container, viz, rows) {

    var value=rows.length;

  function renderQuotesBoard(container, viz, rows) {

  function _dBuildExportHtml(exportState, ecSource, wcSource) {
    var flowName = (exportState.flow && exportState.flow.name) || 'Export';
    var displayLabel = exportState.display.label || 'Dashboard';
    var hasFilters = Object.keys(exportState.initialFilters || {}).length > 0;

    var safeScript = function(src) { return src.replace(/<\/script>/gi, '<\\/script>'); };
    var stateJson = safeScript(JSON.stringify(exportState));
    var runtime = safeScript(_dBuildExportRuntime());

    var wcTag = wcSource ? '<script>' + safeScript(wcSource) + '<\/script>' : '';

    return '<!DOCTYPE html>\n<html lang="en">\n<head>\n' +
      '<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">\n' +
      '<title>' + _dEsc(flowName) + ' — ' + _dEsc(displayLabel) + '</title>\n' +
      '<style>\n' + _dExportCSS + '\n</style>\n' +
      '<script>' + safeScript(ecSource) + '<\/script>\n' +
      wcTag + '\n' +
      '</head>\n<body>\n' +
      '<div id="filter-banner" style="display:' + (hasFilters ? 'flex' : 'none') + '">' +
        '<span id="filter-banner-text"></span>' +
        '<button id="reset-filters-btn">↺ Reset filters</button>' +
        '<button id="dismiss-banner-btn">✕</button>' +
      '</div>\n' +
      '<div id="filter-chips"></div>\n' +
      '<div id="dashboard-canvas"></div>\n' +
      '<script>\nvar EXPORT_STATE = ' + stateJson + ';\n' + runtime + '\n<\/script>\n' +
      '</body>\n</html>';
  }

  function _dExportHtml(display, btn) {
    var originalText = btn.textContent;
    btn.textContent = 'Building export…';
    btn.disabled = true;

    var state = window.DWBState;
    var vizList = (state.flow && state.flow.visualizations) || [];

    var neededSnaps = {};
    (display.placements || []).forEach(function(p) {
      var viz = vizList.find(function(v) { return v.id === p.vizId; });
      if (viz && viz.snapshotName) neededSnaps[viz.snapshotName] = (state.snapshots || {})[viz.snapshotName] || [];
    });

    var placedVizs = vizList.filter(function(v) {
      return (display.placements || []).some(function(p) { return p.vizId === v.id; });
    });

    var needsWc = _dNeedsWordCloud(display, vizList);

    var wcPromise = needsWc
      ? fetch('https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js')
          .then(function(r) { return r.ok ? r.text() : null; }).catch(function() { return null; })
      : Promise.resolve(null);

    _dGetEChartsSource().then(function(ecSource) {
      return wcPromise.then(function(wcSource) {
        var exportState = {
          flow: (state.flow && state.flow.meta) ? state.flow.meta : {},
          display: display,
          snapshots: neededSnaps,
          visualizations: placedVizs,
          initialFilters: JSON.parse(JSON.stringify(_dActiveFilters(display)))
        };

        var html = _dBuildExportHtml(exportState, ecSource, wcSource);
        var flowName = (exportState.flow && exportState.flow.name) || 'Export';
        var filename = (flowName + ' - ' + (display.label || 'Dashboard')).replace(/[\\/:*?"<>|]/g, '-') + '.html';

        var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);

        btn.textContent = '✓ Downloaded';
        setTimeout(function() { btn.textContent = originalText; btn.disabled = false; }, 2000);
      });
    }).catch(function() {
      alert('⚠️ Could not embed ECharts — ensure you have internet access when exporting, or load ECharts before going offline.');
      btn.textContent = originalText;
      btn.disabled = false;
    });
  }

  function _dEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return {
    mount: mount,
    renderBarVertical: _dRenderBarVertical,
    renderLine: _dRenderLine,
    renderPie: _dRenderPie,
    renderStackedDivergingBar: _dRenderStackedDivergingBar,
    renderWordCloud: _dRenderWordCloud,
    renderStatCard: _dRenderStatCard,
    renderQuotesBoard: _dRenderQuotesBoard,
    renderRichText: _dRenderRichText,
    renderAiAssist: _dRenderAiAssist,
    aggregateRows: _dAggregateRows,
    exportHtml: _dExportHtml
  };
})();

/* === DWBDisplaysTab: displays management and canvas === */

window.DWBDisplaysTab = (function() {
  const _dtTypeIcons  = { DASHBOARD: '🖥', REPORT: '📄', PRESENTATION: '🎭', MERGE: '🔖' };
  const _dtTypeLabels = { DASHBOARD: 'Dashboard', REPORT: 'Report', PRESENTATION: 'Presentation', MERGE: 'Certificates' };
  const _dtTypeDescs  = {
    DASHBOARD:    'Interactive charts and filters on a single canvas.',
    REPORT:       'Multi-page printable report with paginated sections.',
    PRESENTATION: 'Slide deck with one visualization per slide.',
    MERGE:        'Generate one document per data row from a Designer template.'
  };

  function _dtFlow() {
    return window.DWBState.flow;
  }

  function _dtActiveDisplay() {
    const state = window.DWBState;
    if (!state.flow || !state.activeDisplayId) return null;
    return state.flow.displays.find(function(d) { return d.id === state.activeDisplayId; }) || null;
  }

  function mount() {
    const panel = document.getElementById('panel-displays');
    if (!panel) return;

    panel.innerHTML = `
      <div id="dt-rail">
        <div id="dt-rail-header">
          <span>Displays</span>
          <span style="margin-left:auto;font-size:10px;color:var(--text-faint)" id="dt-count"></span>
        </div>
        <div id="dt-display-list"></div>
        <button class="dt-add-btn" id="dt-add-display-btn">＋ Add Display</button>
      </div>
      <div id="dt-canvas-area" id="dt-canvas-area"></div>`;

    document.getElementById('dt-add-display-btn').addEventListener('click', _dtShowAddModal);
    _dtRenderRail();
    _dtRenderCanvas();
  }

  function _dtRenderRail() {
    const list = document.getElementById('dt-display-list');
    if (!list) return;
    const state = window.DWBState;
    const displays = (state.flow && state.flow.displays) || [];
    const countEl = document.getElementById('dt-count');
    if (countEl) countEl.textContent = displays.length;

    if (displays.length === 0) {
      list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-faint);font-size:11px">No displays yet.</div>';
      return;
    }

    list.innerHTML = displays.map(function(d) {
      const icon = _dtTypeIcons[d.type] || '📊';
      const isSelected = d.id === state.activeDisplayId;
      return `<div class="dt-display-item${isSelected ? ' selected' : ''}" data-disp-id="${d.id}">
        <span class="dt-display-icon">${icon}</span>
        <div class="dt-display-info">
          <div class="dt-display-label" title="${_dtEsc(d.label)}">${_dtEsc(d.label)}</div>
          <div class="dt-display-type">${d.type}</div>
        </div>
        <button class="dt-display-del" data-del-id="${d.id}" title="Delete">✕</button>
      </div>`;
    }).join('');

    list.querySelectorAll('.dt-display-item').forEach(function(item) {
      item.addEventListener('click', function(e) {
        if (e.target.closest('.dt-display-del')) return;
        window.DWBState.activeDisplayId = item.dataset.dispId;
        _dtRenderRail();
        _dtRenderCanvas();
      });
    });

    list.querySelectorAll('.dt-display-del').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        _dtDeleteDisplay(btn.dataset.delId);
      });
    });
  }

  function _dtRenderCanvas() {
    const area = document.getElementById('dt-canvas-area');
    if (!area) return;

    const display = _dtActiveDisplay();
    if (!display) {
      area.innerHTML = '<div class="empty-state"><div class="es-icon">🖥</div><div class="es-title">No display selected</div><div class="es-desc">Select or create a display from the rail.</div></div>';
      return;
    }

    switch (display.type) {
      case 'DASHBOARD':     window.DWBDashboard    && window.DWBDashboard.mount(area, display);                     break;
      case 'REPORT':        window.DWBReport       && window.DWBReport.mount(area, display);                        break;
      case 'PRESENTATION':  window.DWBPresentation && window.DWBPresentation.mount(area, display);                  break;
      case 'MERGE':         window.DWBMerge        && window.DWBMerge.render(area, display, _dtFlow());             break;
      default:
        area.innerHTML = '<div class="empty-state"><div class="es-icon">🔧</div><div class="es-title">' + _dtEsc(display.type) + '</div><div class="es-desc">Coming soon</div></div>';
    }
  }

  function _dtDeleteDisplay(dispId) {
    const state = window.DWBState;
    if (!state.flow) return;
    if (state.flow.displays.length <= 1) { alert('Cannot delete the only display.'); return; }
    state.flow.displays = state.flow.displays.filter(function(d) { return d.id !== dispId; });
    if (state.activeDisplayId === dispId) {
      state.activeDisplayId = state.flow.displays[0] ? state.flow.displays[0].id : null;
    }
    window.DWBShell.markDirty();
    mount();
  }

  function _dtShowAddModal() {
    const overlay = document.createElement('div');

    const types = ['DASHBOARD', 'REPORT', 'PRESENTATION', 'MERGE'];
    overlay.innerHTML = `<div class="modal" style="width:440px">
      <div class="modal-header">

              '<div style="font-size:26px;margin-bottom:5px">' + _dtTypeIcons[t] + '</div>' +
              '<div style="font-weight:700;font-size:13px">' + _dtTypeLabels[t] + '</div>' +
              '<div style="font-size:10px;color:var(--text-muted);margin-top:4px;line-height:1.3">' + _dtTypeDescs[t] + '</div>' +
              '</button>';
          }).join('')}
        </div>
        <div class="form-row"><label>Display name</label><input type="text" id="dt-new-name" value="New Display" style="width:100%"></div>
        <button class="btn-primary" id="dt-create-btn" style="width:100%;padding:8px;margin-top:8px">Create</button>
      </div>
    </div>`;

    let selectedType = 'DASHBOARD';
    document.body.appendChild(overlay);

    overlay.querySelector('#dt-modal-close').addEventListener('click', function() { document.body.removeChild(overlay); });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) document.body.removeChild(overlay); });

    overlay.querySelectorAll('.dt-type-card').forEach(function(card) {
      card.addEventListener('click', function() {
        selectedType = card.dataset.type;

          c.style.background  = c.dataset.type === selectedType ? 'var(--accent-light)' : 'var(--bg-raised)';

    overlay.querySelector('#dt-create-btn').addEventListener('click', function() {

  function _dtAddDisplay(type, label) {
    const state = window.DWBState;
    if (!state.flow) return;

  function _dtEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { mount: mount };
})();

/* === DWBMerge: certificate/document merge display === */

window.DWBMerge = (function() {
  'use strict';

  var _mgPreviewRow = 0;
  var _mgPdfPromise = null;

  // ================================================================
  // Public API
  // ================================================================

  function render(container, display, flow) {
    if (!container || !display) return;
    display.config = display.config || {};
    if (!display.config.bindings) display.config.bindings = {};
    if (display.config.snapshotName === undefined) display.config.snapshotName = '';

    var rows = _mgGetRows(display);
    if (rows.length === 0) _mgPreviewRow = 0;
    else if (_mgPreviewRow >= rows.length) _mgPreviewRow = rows.length - 1;

    container.innerHTML =
      '<div class="mg-root">' +
        '<div class="mg-left">' +
          _mgBuildLeftCol(display) +
        '</div>' +
        '<div class="mg-right">' +
          '<div class="mg-preview-hdr" id="mg-preview-hdr">' +
            _mgBuildPreviewHdr(display, rows) +
          '</div>' +
          '<div class="mg-preview-body" id="mg-preview-body">' +
            _mgBuildPreviewBody(display, rows) +
          '</div>' +
        '</div>' +
      '</div>';

    _mgWire(container, display, flow);
  }

  // ================================================================
  // Left column
  // ================================================================

  function _mgBuildLeftCol(display) {
    var cfg = display.config;
    var parts = [
      _mgBuildTemplateSection(cfg),
      _mgBuildDataSourceSection(cfg)
    ];

    if (cfg.template && cfg.template.meta && cfg.snapshotName) {
      var rows = _mgGetRows(display);
      parts.push(_mgBuildBindingsSection(cfg, rows));
      parts.push(
        '<div class="mg-gen-pad">' +
          '<button class="btn-primary" id="mg-gen-left" style="width:100%;padding:8px">Generate PDFs</button>' +
        '</div>'
      );
    }

    return parts.join('');
  }

  function _mgBuildTemplateSection(cfg) {
    var template = cfg.template;
    var body;

    if (!template || !template.meta) {
      body =
        '<div class="mg-empty-state">' +
          '<div class="mg-empty-icon">🔖</div>' +
          '<div class="mg-empty-title">No template attached</div>' +
          '<div class="mg-empty-desc">Attach a template from the Designer to get started</div>' +
          '<button class="btn-primary" id="mg-attach-btn" style="margin-top:10px;padding:6px 14px">Attach Template</button>' +
        '</div>';
    } else {
      var meta = template.meta;
      body =
        '<div class="mg-template-name">' + _mgEh(meta.name || 'Untitled Template') + '</div>' +
        '<div class="mg-template-meta">' + _mgEh(_mgPageSizeLabel(meta)) + '</div>' +
        '<div class="mg-btn-row">' +
          '<button class="tb-btn" id="mg-replace-btn">Replace Template</button>' +
          '<button class="mg-remove-btn" id="mg-remove-btn">Remove Template</button>' +
        '</div>';
    }

    return '<div class="mg-section"><div class="mg-section-title">TEMPLATE</div><div class="mg-section-body">' + body + '</div></div>';
  }

  function _mgBuildDataSourceSection(cfg) {
    var snapshots = (window.DWBState && window.DWBState.snapshots) || {};
    var names = Object.keys(snapshots);
    var selected = cfg.snapshotName || '';

    var opts = '<option value="">— select snapshot —</option>' +
      names.map(function(n) {
        return '<option value="' + _mgEa(n) + '"' + (n === selected ? ' selected' : '') + '>' + _mgEh(n) + '</option>';
      }).join('');

    var rowCount = '';
    if (selected && snapshots[selected]) {
      var n = (snapshots[selected] || []).length;
      rowCount = '<div class="mg-row-count">' + n + ' row' + (n !== 1 ? 's' : '') + ' — ' + n + ' PDF' + (n !== 1 ? 's' : '') + ' will be generated</div>';
    }

    return '<div class="mg-section"><div class="mg-section-title">DATA SOURCE</div><div class="mg-section-body">' +
      '<select id="mg-snapshot-sel" style="width:100%">' + opts + '</select>' +
      rowCount +
      '</div></div>';
  }

  function _mgBuildBindingsSection(cfg, rows) {
    var template = cfg.template;
    var fields = (template && template.fields) || [];
    var bindings = cfg.bindings || {};
    var columns = (rows.length > 0) ? Object.keys(rows[0]) : [];

    if (fields.length === 0) {
      return '<div class="mg-section"><div class="mg-section-title">FIELD BINDINGS</div>' +
        '<div class="mg-section-body"><div class="mg-hint">This template has no fields.</div></div></div>';
    }

    var colOpts = function(bound) {
      return '<option value="">— not mapped —</option>' +
        columns.map(function(c) {
          return '<option value="' + _mgEa(c) + '"' + (c === bound ? ' selected' : '') + '>' + _mgEh(c) + '</option>';
        }).join('');
    };

    var fieldRows = fields.map(function(field) {
      var bound = bindings[field.id] || '';
      return '<div class="mg-binding-row">' +
        '<span class="mg-binding-label" title="' + _mgEa(field.label || field.id) + '">' + _mgEh(field.label || field.id) + '</span>' +
        '<select class="mg-binding-sel" data-field-id="' + _mgEa(field.id) + '">' + colOpts(bound) + '</select>' +
        '</div>';
    }).join('');

    return '<div class="mg-section"><div class="mg-section-title">FIELD BINDINGS</div>' +
      '<div class="mg-section-body">' + fieldRows + '</div></div>';
  }

  // ================================================================
  // Right column
  // ================================================================

  function _mgBuildPreviewHdr(display, rows) {
    var n = rows.length;
    var hasTpl = !!(display.config.template && display.config.template.meta);
    var label = (hasTpl && n > 0)
      ? 'PREVIEW — Row ' + (_mgPreviewRow + 1) + ' of ' + n
      : 'PREVIEW';

    return '<div class="mg-prev-nav">' +
        '<button class="tb-btn" id="mg-prev-row"' + (_mgPreviewRow > 0 ? '' : ' disabled') + '>←</button>' +
        '<span class="mg-prev-label">' + label + '</span>' +
        '<button class="tb-btn" id="mg-next-row"' + (_mgPreviewRow < n - 1 ? '' : ' disabled') + '>→</button>' +
      '</div>' +
      '<button class="btn-primary" id="mg-gen-right" style="padding:5px 14px;margin-left:auto">Generate PDFs</button>';
  }

  function _mgBuildPreviewBody(display, rows) {
    var cfg = display.config;
    var template = cfg.template;

    if (!template || !template.meta) {
      return '<div class="mg-preview-placeholder">' +
        '<div style="font-size:36px">🔖</div>' +
        '<div style="color:var(--text-muted);font-size:13px;margin-top:8px">Configure a template and data source to see a preview.</div>' +
        '</div>';
    }

    if (rows.length === 0) {
      return '<div class="mg-preview-placeholder">' +
        '<div style="font-size:36px">📊</div>' +
        '<div style="color:var(--text-muted);font-size:13px;margin-top:8px">Select a data source with rows to see a preview.</div>' +
        '</div>';
    }

    var row = rows[_mgPreviewRow] || rows[0];
    var svgStr = _mgRenderTemplateSVG(template, cfg.bindings || {}, row);

    return '<div class="mg-svg-wrap"><div class="mg-svg-inner">' + svgStr + '</div></div>';
  }

  // ================================================================
  // Event wiring
  // ================================================================

  function _mgWire(container, display, flow) {
    // Attach template
    var attachBtn = container.querySelector('#mg-attach-btn');
    if (attachBtn) {
      attachBtn.addEventListener('click', function() { _mgPickTemplate(container, display, flow); });
    }

    // Replace template
    var replaceBtn = container.querySelector('#mg-replace-btn');
    if (replaceBtn) {
      replaceBtn.addEventListener('click', function() { _mgPickTemplate(container, display, flow); });
    }

    // Remove template — inline two-click confirmation
    var removeBtn = container.querySelector('#mg-remove-btn');
    if (removeBtn) {
      removeBtn.addEventListener('click', function() {
        if (removeBtn.dataset.confirm) {
          display.config.template = null;
          display.config.bindings = {};
          _mgMarkDirty();
          _mgPreviewRow = 0;
          render(container, display, flow);
        } else {
          removeBtn.dataset.confirm = '1';
          removeBtn.textContent = 'Confirm remove?';
          removeBtn.classList.add('mg-confirm');
          setTimeout(function() {
            if (removeBtn.dataset.confirm) {
              delete removeBtn.dataset.confirm;
              removeBtn.textContent = 'Remove Template';
              removeBtn.classList.remove('mg-confirm');
            }
          }, 3000);
        }
      });
    }

    // Snapshot selector
    var snapSel = container.querySelector('#mg-snapshot-sel');
    if (snapSel) {
      snapSel.addEventListener('change', function() {
        display.config.snapshotName = snapSel.value || '';
        _mgMarkDirty();
        _mgPreviewRow = 0;
        render(container, display, flow);
      });
    }

    // Binding selects — partial re-render on change
    container.querySelectorAll('.mg-binding-sel').forEach(function(sel) {
      sel.addEventListener('change', function() {
        var fieldId = sel.dataset.fieldId;
        if (sel.value) {
          display.config.bindings[fieldId] = sel.value;
        } else {
          delete display.config.bindings[fieldId];
        }
        _mgMarkDirty();
        _mgRefreshPreview(container, display);
      });
    });

    // Preview navigation
    _mgWireNavAndGen(container, display, flow);
  }

  function _mgWireNavAndGen(container, display, flow) {
    var prevBtn = container.querySelector('#mg-prev-row');
    var nextBtn = container.querySelector('#mg-next-row');

    if (prevBtn) {
      prevBtn.addEventListener('click', function() {
        if (_mgPreviewRow > 0) {
          _mgPreviewRow--;
          _mgRefreshPreviewAndHdr(container, display, flow);
        }
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener('click', function() {
        var rows = _mgGetRows(display);
        if (_mgPreviewRow < rows.length - 1) {
          _mgPreviewRow++;
          _mgRefreshPreviewAndHdr(container, display, flow);
        }
      });
    }

    ['#mg-gen-left', '#mg-gen-right'].forEach(function(sel) {
      var btn = container.querySelector(sel);
      if (btn) btn.addEventListener('click', function() { _mgGenerate(display); });
    });
  }

  function _mgRefreshPreview(container, display) {
    var body = container.querySelector('#mg-preview-body');
    if (body) body.innerHTML = _mgBuildPreviewBody(display, _mgGetRows(display));
  }

  function _mgRefreshPreviewAndHdr(container, display, flow) {
    var rows = _mgGetRows(display);
    var hdr = container.querySelector('#mg-preview-hdr');
    if (hdr) {
      hdr.innerHTML = _mgBuildPreviewHdr(display, rows);
      _mgWireNavAndGen(hdr, display, flow);
    }
    var body = container.querySelector('#mg-preview-body');
    if (body) body.innerHTML = _mgBuildPreviewBody(display, rows);
  }

  // ================================================================
  // Template file picker
  // ================================================================

  function _mgPickTemplate(container, display, flow) {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function() {
      var f = this.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var tpl = JSON.parse(e.target.result);
          if (!tpl.meta) throw new Error('Missing required field: meta.');
          if (!Array.isArray(tpl.elements)) throw new Error('Missing required field: elements (must be array).');
          display.config.template = tpl;
          display.config.bindings = {};
          _mgMarkDirty();
          _mgPreviewRow = 0;
          render(container, display, flow);
        } catch (err) {
          _mgToast('Template error: ' + err.message, true);
        }
      };
      reader.readAsText(f);
    };
    input.click();
  }

  // ================================================================
  // SVG renderer — ported faithfully from src/merge/merge.js
  // ================================================================

  function _mgRenderTemplateSVG(template, bindings, row) {
    var meta = template.meta || {};
    var w = meta.width || meta.pageWidth || 792;
    var h = meta.height || meta.pageHeight || 612;
    var elements = template.elements || [];
    var assets = template.assets || {};
    bindings = bindings || {};
    row = row || {};

    // Resolve bound-text elements with actual row values
    var resolved = elements.map(function(el) {
      if (el.type !== 'bound-text') return el;
      var col = bindings[el.fieldId] || null;
      var val = (col && row[col] !== undefined) ? row[col] : '';
      return Object.assign({}, el, { content: String(val) });
    });

    var parts = [
      '<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"' +
      ' width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">'
    ];

    // Background asset
    if (meta.background && meta.background.assetId && assets[meta.background.assetId]) {
      parts.push(
        '<image href="' + assets[meta.background.assetId] + '" x="0" y="0" width="' + w + '" height="' + h + '"/>'
      );
    }

    for (var i = 0; i < resolved.length; i++) {
      var el = resolved[i];
      switch (el.type) {
        case 'rect': {
          var s = el.style || {};
          var rx = s.cornerRadius || 0;
          var fill   = (s.fill   === 'none' || s.fill   == null) ? 'none' : s.fill;
          var stroke = (s.stroke === 'none' || s.stroke == null) ? 'none' : s.stroke;
          var sw = s.strokeWidth || 0;
          parts.push(
            '<rect x="' + el.x + '" y="' + el.y + '"' +
            ' width="' + el.width + '" height="' + el.height + '"' +
            ' rx="' + rx + '" ry="' + rx + '"' +
            ' fill="' + fill + '"' +
            (stroke !== 'none' ? ' stroke="' + stroke + '" stroke-width="' + sw + '"' : '') +
            '/>'
          );
          break;
        }
        case 'static-text':
        case 'bound-text': {
          var ts = el.style || {};
          var anchor = ts.textAnchor || 'start';
          var tx;
          if (anchor === 'middle') tx = el.x + el.width / 2;
          else if (anchor === 'end') tx = el.x + el.width;
          else tx = el.x;
          var ty = el.y + el.height;
          var content = _mgEx(el.content || '');
          parts.push(
            '<text x="' + tx + '" y="' + ty + '"' +
            ' font-family="' + (ts.fontFamily || 'sans-serif') + '"' +
            ' font-size="' + (ts.fontSize || 14) + '"' +
            ' font-weight="' + (ts.fontWeight || 'normal') + '"' +
            ' font-style="' + (ts.fontStyle || 'normal') + '"' +
            ' text-anchor="' + anchor + '"' +
            ' fill="' + (ts.fill || '#000000') + '"' +
            (ts.letterSpacing ? ' letter-spacing="' + ts.letterSpacing + '"' : '') +
            '>' + content + '</text>'
          );
          break;
        }
        case 'image':
          // Skipped in SVG string — image elements drawn via canvas overlay in _mgSvgToCanvas
          // because Chrome's SVG-as-image blob URL sandbox blocks embedded <image> refs.
          break;
      }
    }

    parts.push('</svg>');
    return parts.join('');
  }

  // ================================================================
  // SVG → canvas — ported faithfully from src/merge/merge.js
  // ================================================================

  function _mgSvgToCanvas(svgString, width, height, elements, assets) {
    return new Promise(function(resolve, reject) {
      var scale  = 2;
      var canvas = document.createElement('canvas');
      canvas.width  = width  * scale;
      canvas.height = height * scale;
      var ctx = canvas.getContext('2d');

      var blob = new Blob([svgString], { type: 'image/svg+xml' });
      var url  = URL.createObjectURL(blob);
      var img  = new Image();

      img.onload = function() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(url);

        // Draw image-type elements on top of the SVG render.
        // Chrome's blob-URL sandbox prevents <image> inside SVG from loading,
        // so we draw them directly onto the canvas using data URIs.
        var imageEls = (elements || []).filter(function(el) { return el.type === 'image'; });
        var proms = imageEls.map(function(el) {
          return new Promise(function(res) {
            var asset = assets && assets[el.assetId];
            if (!asset) { res(); return; }
            var uri = 'data:' + asset.type + ';base64,' + asset.data;
            var imgEl = new Image();
            imgEl.onload  = function() {
              ctx.drawImage(imgEl, el.x * scale, el.y * scale, el.width * scale, el.height * scale);
              res();
            };
            imgEl.onerror = function() { res(); };
            imgEl.src = uri;
          });
        });

        Promise.all(proms).then(function() { resolve(canvas); });
      };

      img.onerror = function() {
        URL.revokeObjectURL(url);
        reject(new Error('SVG render failed'));
      };

      img.src = url;
    });
  }

  // ================================================================
  // PDF generation
  // ================================================================

  function _mgLoadJsPDF() {
    if (window.jspdf) return Promise.resolve(window.jspdf);
    if (_mgPdfPromise) return _mgPdfPromise;
    _mgPdfPromise = new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2/dist/jspdf.umd.min.js';
      s.onload  = function() { resolve(window.jspdf); };
      s.onerror = function() { _mgPdfPromise = null; reject(new Error('jsPDF load failed')); };
      document.head.appendChild(s);
      setTimeout(function() {
        if (!window.jspdf) { _mgPdfPromise = null; reject(new Error('jsPDF timeout')); }
      }, 8000);
    });
    return _mgPdfPromise;
  }

  function _mgSetBtns(text, disabled) {
    ['mg-gen-left', 'mg-gen-right'].forEach(function(id) {
      var btn = document.getElementById(id);
      if (btn) { btn.textContent = text; btn.disabled = disabled; }
    });
  }

  function _mgGenerate(display) {
    var cfg = display.config || {};
    var template = cfg.template;
    var rows = _mgGetRows(display);

    if (!template || !template.meta) {
      _mgToast('No template attached. Attach a template before generating.', true);
      return;
    }
    if (rows.length === 0) {
      _mgToast('No data rows. Select a snapshot with data.', true);
      return;
    }

    _mgSetBtns('Generating...', true);

    _mgLoadJsPDF().then(function(jspdf) {
      var meta = template.meta;
      var w = meta.width || meta.pageWidth || 792;
      var h = meta.height || meta.pageHeight || 612;
      var elements = template.elements || [];
      var assets   = template.assets   || {};
      var bindings = cfg.bindings || {};

      var pdf = new jspdf.jsPDF({
        orientation: meta.orientation || 'landscape',
        unit: 'pt',
        format: [w, h]
      });
      var pdfW = pdf.internal.pageSize.getWidth();
      var pdfH = pdf.internal.pageSize.getHeight();

      var chain = Promise.resolve();

      rows.forEach(function(row, idx) {
        chain = chain.then(function() {
          _mgSetBtns('Generating page ' + (idx + 1) + ' of ' + rows.length + '…', true);

          var svgStr = _mgRenderTemplateSVG(template, bindings, row);
          return _mgSvgToCanvas(svgStr, w, h, elements, assets).then(function(canvas) {
            var imgData = canvas.toDataURL('image/jpeg', 0.95);
            if (idx > 0) pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
            if (idx % 5 === 4) return new Promise(function(r) { setTimeout(r, 0); });
          });
        });
      });

      chain.then(function() {
        var tplName  = (meta.name       || 'certificates').replace(/[^\w\-_.]/g, '_');
        var dispName = (display.label   || 'merge').replace(/[^\w\-_.]/g, '_');
        pdf.save(tplName + ' - ' + dispName + '.pdf');
        _mgSetBtns('✓ Downloaded', true);
        setTimeout(function() { _mgSetBtns('Generate PDFs', false); }, 2000);
      }).catch(function(err) {
        _mgSetBtns('⚠ Export failed', false);
        setTimeout(function() { _mgSetBtns('Generate PDFs', false); }, 3000);
        _mgToast('PDF export failed: ' + err.message, true);
      });

    }).catch(function(err) {
      _mgSetBtns('⚠ Export failed', false);
      setTimeout(function() { _mgSetBtns('Generate PDFs', false); }, 3000);
      _mgToast('Failed to load jsPDF: ' + err.message, true);
    });
  }

  // ================================================================
  // Utilities
  // ================================================================

  function _mgGetRows(display) {
    var cfg = display.config || {};
    var name = cfg.snapshotName;
    if (!name) return [];
    return ((window.DWBState && window.DWBState.snapshots) || {})[name] || [];
  }

  function _mgPageSizeLabel(meta) {
    if (meta.pageSize && meta.orientation) {
      return meta.pageSize.charAt(0).toUpperCase() + meta.pageSize.slice(1) + ' ' + meta.orientation;
    }
    var w = meta.width || meta.pageWidth || 0;
    var h = meta.height || meta.pageHeight || 0;
    return w + ' × ' + h + ' pt';
  }

  function _mgMarkDirty() {
    if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
  }

  function _mgToast(msg, isError) {
    var existing = document.getElementById('mg-toast');
    if (existing) existing.remove();
    var toast = document.createElement('div');
    toast.id = 'mg-toast';
    toast.className = 'mg-toast' + (isError ? ' mg-toast-error' : '');
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() { if (toast.parentNode) toast.remove(); }, isError ? 4000 : 2500);
  }

  function _mgEh(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function _mgEa(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function _mgEx(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  return { render: render };
})();

/* --- src\v2\displays\presentation\presentation.js --- */
/* === DWBPresentation: slide-based presentation display === */

window.DWBPresentation = (function() {
  let _presActiveIdx = 0;
  let _presPptxPromise = null;

  function _presLoadPptx() {
    if (window.PptxGenJS) return Promise.resolve(window.PptxGenJS);
    if (_presPptxPromise) return _presPptxPromise;
    _presPptxPromise = new Promise(function(resolve, reject) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/pptxgenjs@3/dist/pptxgen.bundled.js';
      s.onload = function() { resolve(window.PptxGenJS); };
      s.onerror = function() { _presPptxPromise = null; reject(new Error('PptxGenJS failed')); };
      document.head.appendChild(s);
      setTimeout(function() { if (!window.PptxGenJS) { _presPptxPromise = null; reject(new Error('PptxGenJS timeout')); } }, 8000);
    });
    return _presPptxPromise;
  }

  function mount(container, display) {
    if (!container || !display) return;
    const placements = display.placements || [];
    if (_presActiveIdx >= placements.length && placements.length > 0) _presActiveIdx = placements.length - 1;

    container.innerHTML = `<div class="pres-root">
      <div class="pres-toolbar">
        <span style="font-size:13px;font-weight:600;color:var(--text-main);flex:1">${_presEsc(display.label)}</span>
        <button class="tb-btn" id="pres-add-slide-tb">＋ Add Slide</button>
        <button class="tb-btn" id="pres-export-btn">↓ Export PPTX</button>
      </div>
      <div class="pres-body">
        <div class="pres-strip" id="pres-strip"></div>
        <div class="pres-canvas" id="pres-canvas"></div>
      </div>
    </div>`;

    container.querySelector('#pres-add-slide-tb').addEventListener('click', function() {
      _presAddSlide(display, container);
    });
    container.querySelector('#pres-export-btn').addEventListener('click', function() {
      _presExportPptx(display);
    });

    _presRenderStrip(display, container);
    _presRenderSlide(display, container);
  }

  function _presRenderStrip(display, container) {
    const strip = container.querySelector('#pres-strip');
    if (!strip) return;
    const placements = display.placements || [];

    strip.innerHTML = '';
    placements.forEach(function(p, idx) {
      const thumb = document.createElement('div');
      thumb.className = 'pres-slide-thumb' + (idx === _presActiveIdx ? ' active' : '');
      thumb.innerHTML = '<div class="pres-slide-num">Slide ' + (idx + 1) + '</div>' +
        '<div style="font-size:10px;font-weight:600">' + _presEsc(p.slideTitle || 'Untitled') + '</div>';
      thumb.addEventListener('click', function() {
        _presActiveIdx = idx;
        _presRenderStrip(display, container);
        _presRenderSlide(display, container);
      });
      strip.appendChild(thumb);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'pres-add-slide-btn';
    addBtn.textContent = '＋ Add Slide';
    addBtn.addEventListener('click', function() { _presAddSlide(display, container); });
    strip.appendChild(addBtn);
  }

  function _presRenderSlide(display, container) {
    const canvas = container.querySelector('#pres-canvas');
    if (!canvas) return;
    const placements = display.placements || [];

    if (placements.length === 0) {
      canvas.innerHTML = '<div class="empty-state"><div class="es-icon">🎭</div><div class="es-title">No slides yet</div><div class="es-desc">Add a slide to get started.</div></div>';
      return;
    }

    const p = placements[_presActiveIdx];
    if (!p) return;

    const state = window.DWBState;
    const snapshots = state.snapshots || {};
    const vizList = (state.flow && state.flow.visualizations) || [];
    const viz = vizList.find(function(v) { return v.id === p.vizId; });
    const rows = viz ? (snapshots[viz.snapshotName] || []) : [];

    canvas.innerHTML = `<div style="width:100%;max-width:900px">
      <div class="pres-slide">
        <div class="pres-slide-title-bar" contenteditable="true" id="pres-slide-title" spellcheck="false">${_presEsc(p.slideTitle || 'Slide ' + (_presActiveIdx+1))}</div>
        <div class="pres-slide-content" id="pres-slide-body"></div>
        ${p.notes ? '<div class="pres-slide-notes">Notes: ' + _presEsc(p.notes) + '</div>' : ''}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
        <button class="tb-btn" id="pres-del-slide">✕ Delete Slide</button>
        <button class="btn-primary" id="pres-bind-viz">📊 Bind Visualization</button>
        <input type="text" id="pres-notes-input" value="${_presEsc(p.notes||'')}" placeholder="Speaker notes…" style="flex:1">
      </div>
    </div>`;

    const titleEl = canvas.querySelector('#pres-slide-title');
    titleEl.addEventListener('input', function() {
      p.slideTitle = titleEl.textContent.trim();
      if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
      _presRenderStrip(display, container);
    });

    canvas.querySelector('#pres-notes-input').addEventListener('input', function(e) {
      p.notes = e.target.value;
      if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
    });

    canvas.querySelector('#pres-del-slide').addEventListener('click', function() {
      display.placements.splice(_presActiveIdx, 1);
      if (_presActiveIdx >= display.placements.length) _presActiveIdx = Math.max(0, display.placements.length - 1);
      if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
      _presRenderStrip(display, container);
      _presRenderSlide(display, container);
    });

    canvas.querySelector('#pres-bind-viz').addEventListener('click', function() {
      _presBindViz(p, display, container);
    });

    const body = canvas.querySelector('#pres-slide-body');
    if (viz && body && window.DWBVizTab) {
      window.DWBVizTab.renderViz(viz, rows, body);
    } else if (body) {
      body.innerHTML = '<div class="empty-state"><div class="es-icon">📊</div><div class="es-desc">Bind a visualization to this slide.</div></div>';
    }
  }

  function _presAddSlide(display, container) {
    const placement = window.DWBSchema.createPlacement(null, 'PRESENTATION');
    placement.slideTitle = 'Slide ' + ((display.placements||[]).length + 1);
    display.placements = display.placements || [];
    display.placements.push(placement);
    _presActiveIdx = display.placements.length - 1;
    if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
    _presRenderStrip(display, container);
    _presRenderSlide(display, container);
  }

  function _presBindViz(placement, display, container) {
    const state = window.DWBState;
    const vizList = (state.flow && state.flow.visualizations) || [];
    if (vizList.length === 0) { alert('No visualizations. Create some in the Viz tab first.'); return; }

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.style.zIndex = '600';
    overlay.innerHTML = `<div class="modal" style="width:360px">
      <div class="modal-header"><span>Bind Visualization</span><button class="modal-close" id="pres-bind-close">✕</button></div>
      <div style="padding:16px">
        <div class="form-row"><label>Visualization</label>
          <select id="pres-bind-sel" style="width:100%">
            <option value="">-- None --</option>
            ${vizList.map(function(v) { return '<option value="' + _presEsc(v.id) + '"' + (placement.vizId === v.id ? ' selected' : '') + '>' + _presEsc(v.label) + '</option>'; }).join('')}
          </select></div>
        <button class="btn-primary" id="pres-bind-ok" style="width:100%;margin-top:8px;padding:7px">OK</button>
      </div>
    </div>`;

    document.body.appendChild(overlay);
    overlay.querySelector('#pres-bind-close').addEventListener('click', function() { document.body.removeChild(overlay); });
    overlay.querySelector('#pres-bind-ok').addEventListener('click', function() {
      placement.vizId = overlay.querySelector('#pres-bind-sel').value || null;
      if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
      document.body.removeChild(overlay);
      _presRenderSlide(display, container);
    });
  }

  function _presExportPptx(display) {
    _presLoadPptx().then(function(PptxGenJS) {
      const pptx = new PptxGenJS();
      const state = window.DWBState;
      const snapshots = state.snapshots || {};
      const vizList = (state.flow && state.flow.visualizations) || [];

      (display.placements || []).forEach(function(p) {
        const slide = pptx.addSlide();
        const title = p.slideTitle || '';
        if (title) {
          slide.addText(title, { x: 0.5, y: 0.3, fontSize: 24, bold: true, color: '002244' });
        }
        if (p.notes) slide.addNotes(p.notes);
      });

      pptx.writeFile({ fileName: (display.label || 'presentation') + '.pptx' });
      window.DWBShell && window.DWBShell.log('Exported PPTX: ' + display.label, 'success');
    }).catch(function(e) {
      alert('PPTX export failed: ' + e.message);
    });
  }

  function _presEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { mount: mount };
})();

window.DWBReport = (function() {
  let _rJsPDFPromise = null;

  function _rLoadJsPDF() {
    if (window.jspdf) return Promise.resolve(window.jspdf);
    if (_rJsPDFPromise) return _rJsPDFPromise;
    _rJsPDFPromise = new Promise(function(resolve, reject) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2/dist/jspdf.umd.min.js';
      s.onload = function() { resolve(window.jspdf); };
      s.onerror = function() { _rJsPDFPromise = null; reject(new Error('jsPDF load failed')); };
      document.head.appendChild(s);
      setTimeout(function() { if (!window.jspdf) { _rJsPDFPromise = null; reject(new Error('jsPDF timeout')); } }, 8000);
    });
    return _rJsPDFPromise;
  }

  function mount(container, display) {
    if (!container || !display) return;
    const cfg = display.config || {};

    container.innerHTML = `<div class="report-root">
      <div class="report-toolbar">
        <span style="font-size:13px;font-weight:600;color:var(--text-main);flex:1">${_rEsc(display.label)}</span>
        <button class="tb-btn" id="r-add-section">＋ Add Section</button>
        <button class="tb-btn" id="r-export-pdf">↓ Export PDF</button>
      </div>
      <div class="report-canvas" id="r-canvas"></div>
    </div>`;

    container.querySelector('#r-add-section').addEventListener('click', function() {
      _rAddPlacement(display, container);
    });
    container.querySelector('#r-export-pdf').addEventListener('click', function() {
      _rExportPDF(display, container);
    });

    _rRenderPages(display, container);
  }

  function _rRenderPages(display, container) {
    const canvas = container.querySelector('#r-canvas');
    if (!canvas) return;
    const state = window.DWBState;
    const snapshots = state.snapshots || {};
    const vizList = (state.flow && state.flow.visualizations) || [];
    const cfg = display.config || {};
    const placements = display.placements || [];

    canvas.innerHTML = '';

    // Cover page
    const cover = document.createElement('div');
    cover.className = 'report-page';
    cover.innerHTML = `<div class="report-cover">
      <div class="report-cover-title">${_rEsc(display.label)}</div>
      <div class="report-cover-sub">${new Date().toLocaleDateString()}</div>
    </div>`;
    canvas.appendChild(cover);

    // Content pages
    if (placements.length === 0) {
      const emptyPage = document.createElement('div');
      emptyPage.className = 'report-page';
      emptyPage.innerHTML = `<div class="report-page-header"><span>${_rEsc(display.label)}</span><span>${new Date().toLocaleDateString()}</span></div>
        <div class="empty-state"><div class="es-icon">📄</div><div class="es-desc">Click ＋ Add Section to add content.</div></div>
        <div class="report-page-footer"><span>${_rEsc(display.label)}</span><span>Page 2</span></div>
        <button class="report-add-btn" id="r-first-add">＋ Add first section</button>`;
      emptyPage.querySelector('#r-first-add').addEventListener('click', function() {
        _rAddPlacement(display, container);
      });
      canvas.appendChild(emptyPage);
      return;
    }

    let currentPage = null;
    let pageNum = 2;

    placements.forEach(function(placement) {
      if (!currentPage || placement.pageBreakBefore) {
        currentPage = document.createElement('div');
        currentPage.className = 'report-page';
        currentPage.innerHTML = `<div class="report-page-header"><span>${_rEsc(display.label)}</span><span>${new Date().toLocaleDateString()}</span></div>
          <div class="r-page-content" id="r-page-content-${pageNum}"></div>
          <div class="report-page-footer"><span>${_rEsc(display.label)}</span><span>Page ${pageNum}</span></div>`;
        canvas.appendChild(currentPage);
        pageNum++;
      }

      const pageContent = currentPage.querySelector('.r-page-content') || currentPage;
      const viz = vizList.find(function(v) { return v.id === placement.vizId; });
      const rows = viz ? (snapshots[viz.snapshotName] || []) : [];

      const section = document.createElement('div');
      section.className = 'report-section';
      section.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between">
        <div class="report-section-title">${viz ? _rEsc(viz.label) : 'Section'}</div>
        <button class="tb-btn" data-del-id="${placement.id}" style="font-size:10px;padding:2px 7px">✕</button>
      </div>
      <div class="r-section-body" id="r-sb-${placement.id}"></div>
      ${placement.caption ? '<div class="report-caption">' + _rEsc(placement.caption) + '</div>' : ''}`;

      section.querySelector('[data-del-id]').addEventListener('click', function() {
        display.placements = display.placements.filter(function(p) { return p.id !== placement.id; });
        if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
        _rRenderPages(display, container);
      });

      pageContent.appendChild(section);

      const body = section.querySelector('#r-sb-' + placement.id);
      if (viz && body && window.DWBVizTab) {
        window.DWBVizTab.renderViz(viz, rows, body);
      } else if (body) {
        body.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:16px 0">No visualization bound.</div>';
      }
    });

    // Add section button at end
    const lastPage = canvas.lastElementChild;
    if (lastPage) {
      const addBtn = document.createElement('button');
      addBtn.className = 'report-add-btn';
      addBtn.textContent = '＋ Add Section';
      addBtn.addEventListener('click', function() { _rAddPlacement(display, container); });
      lastPage.querySelector('.r-page-content') ? lastPage.querySelector('.r-page-content').appendChild(addBtn) : lastPage.appendChild(addBtn);
    }
  }

  function _rAddPlacement(display, container) {
    const state = window.DWBState;
    const vizList = (state.flow && state.flow.visualizations) || [];
    if (vizList.length === 0) { alert('No visualizations exist. Create some in the Viz tab first.'); return; }

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.style.zIndex = '600';
    overlay.innerHTML = `<div class="modal" style="width:360px">
      <div class="modal-header"><span>Add Report Section</span><button class="modal-close" id="r-modal-close">✕</button></div>
      <div style="padding:16px">
        <div class="form-row"><label>Visualization</label>
          <select id="r-viz-sel" style="width:100%">
            <option value="">-- None --</option>
            ${vizList.map(function(v) { return '<option value="' + _rEsc(v.id) + '">' + _rEsc(v.label) + '</option>'; }).join('')}
          </select></div>
        <div class="form-row"><label>Caption (optional)</label>
          <input type="text" id="r-caption" style="width:100%" placeholder="Figure caption…"></div>
        <div class="form-row-inline form-row"><label><input type="checkbox" id="r-pagebreak"> Page break before</label></div>
        <button class="btn-primary" id="r-modal-ok" style="width:100%;margin-top:8px;padding:7px">Add</button>
      </div>
    </div>`;

    document.body.appendChild(overlay);
    overlay.querySelector('#r-modal-close').addEventListener('click', function() { document.body.removeChild(overlay); });
    overlay.querySelector('#r-modal-ok').addEventListener('click', function() {
      const vizId = overlay.querySelector('#r-viz-sel').value || null;
      const p = window.DWBSchema.createPlacement(vizId, 'REPORT');
      p.caption = overlay.querySelector('#r-caption').value;
      p.pageBreakBefore = overlay.querySelector('#r-pagebreak').checked;
      display.placements = display.placements || [];
      display.placements.push(p);
      if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
      document.body.removeChild(overlay);
      _rRenderPages(display, container);
    });
  }

  function _rExportPDF(display, container) {
    const canvas = container.querySelector('#r-canvas');
    if (!canvas) return;

    Promise.all([
      _rLoadJsPDF(),
      new Promise(function(resolve, reject) {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1/dist/html2canvas.min.js';
        s.onload = resolve;
        s.onerror = reject;
        if (window.html2canvas) { resolve(); return; }
        document.head.appendChild(s);
        setTimeout(reject, 8000);
      })
    ]).then(function() {
      const jspdf = window.jspdf;
      if (!jspdf || !window.html2canvas) { alert('PDF dependencies not loaded.'); return; }
      const { jsPDF } = jspdf;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      const pages = canvas.querySelectorAll('.report-page');
      let promise = Promise.resolve();

      pages.forEach(function(page, idx) {
        promise = promise.then(function() {
          return window.html2canvas(page, { scale: 1.5, useCORS: true }).then(function(cvs) {
            if (idx > 0) pdf.addPage();
            const imgData = cvs.toDataURL('image/jpeg', 0.85);
            pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
          });
        });
      });

      promise.then(function() {
        pdf.save((display.label || 'report') + '.pdf');
        window.DWBShell && window.DWBShell.log('Exported PDF', 'success');
      });
    }).catch(function(e) {
      alert('PDF export failed. Make sure you are online to load dependencies.\n' + e.message);
    });
  }

  function _rEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { mount: mount };
})();

/* --- src\v2\displays\timeline\timeline.js --- */
/* === DWBTimelines: timeline viz renderers === */

window.DWBTimelines = (function() {
  function render(viz, rows, container) {
    switch (viz.type) {
      case 'TIMELINE_HORIZONTAL': _tlRenderHorizontal(viz, rows, container); break;
      case 'TIMELINE_GANTT':      _tlRenderGantt(viz, rows, container);      break;
      case 'TIMELINE_VERTICAL':   _tlRenderVertical(viz, rows, container);   break;
      default: container.innerHTML = '<div style="padding:16px;color:var(--text-muted)">Unknown timeline type</div>';
    }
  }

  function _tlGetField(cfg, rows, key, fallbackIdx) {
    if (cfg[key]) return cfg[key];
    if (!rows.length) return '';
    const cols = Object.keys(rows[0]);
    return cols[fallbackIdx] || cols[0] || '';
  }

  function _tlRenderHorizontal(viz, rows, container) {
    const cfg = viz.config || {};
    const dateField  = _tlGetField(cfg, rows, 'dateField', 0);
    const labelField = _tlGetField(cfg, rows, 'labelField', 1);

    if (!rows.length) {
      container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px">No data to display.</div>';
      return;
    }

    // Sort by date
    const events = rows.slice().sort(function(a, b) {
      return new Date(a[dateField]) - new Date(b[dateField]);
    });

    // Simple equal-spacing horizontal layout
    const totalWidth = Math.max(800, events.length * 120);
    const html = `<div class="tl-h-wrap" style="min-width:${totalWidth}px">
      <div class="tl-h-track">
        ${events.map(function(row, idx) {
          const pct = events.length === 1 ? 50 : (idx / (events.length - 1)) * 100;
          const label = _tlEsc(String(row[labelField] || ''));
          const date  = _tlEsc(String(row[dateField] || ''));
          return `<div class="tl-h-event" style="left:${pct}%">
            <div class="tl-h-dot"></div>
            <div class="tl-h-label">${label}</div>
            <div class="tl-h-date">${date}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

    container.innerHTML = html;
    _tlRenderConfigHint(viz, container, 'dateField, labelField');
  }

  function _tlRenderGantt(viz, rows, container) {
    const cfg = viz.config || {};
    const taskField  = _tlGetField(cfg, rows, 'taskField', 0);
    const startField = _tlGetField(cfg, rows, 'startField', 1);
    const endField   = _tlGetField(cfg, rows, 'endField', 2);

    if (!rows.length) {
      container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px">No data to display.</div>';
      return;
    }

    // Find min/max dates for scaling
    let minDate = Infinity, maxDate = -Infinity;
    rows.forEach(function(row) {
      const s = new Date(row[startField]).getTime();
      const e = new Date(row[endField]).getTime();
      if (!isNaN(s)) minDate = Math.min(minDate, s);
      if (!isNaN(e)) maxDate = Math.max(maxDate, e);
    });

    if (!isFinite(minDate)) {
      container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px">Could not parse date fields. Configure startField and endField in config.</div>';
      return;
    }

    const range = maxDate - minDate || 1;

    let html = '<div class="tl-gantt-wrap"><table class="tl-gantt-table">';
    html += '<thead><tr><th style="width:200px">Task</th><th>Start</th><th>End</th><th>Duration</th></tr></thead><tbody>';

    rows.forEach(function(row) {
      const task  = String(row[taskField] || '');
      const start = new Date(row[startField]);
      const end   = new Date(row[endField]);
      const sTs   = start.getTime();
      const eTs   = end.getTime();

      const left  = isNaN(sTs) ? 0 : ((sTs - minDate) / range) * 100;
      const width = isNaN(sTs) || isNaN(eTs) ? 20 : Math.max(2, ((eTs - sTs) / range) * 100);
      const days  = isNaN(sTs) || isNaN(eTs) ? '?' : Math.round((eTs - sTs) / 86400000) + 'd';

      html += `<tr class="tl-gantt-row">
        <td>${_tlEsc(task)}</td>
        <td>${isNaN(sTs) ? _tlEsc(String(row[startField]||'')) : start.toLocaleDateString()}</td>
        <td>${isNaN(eTs) ? _tlEsc(String(row[endField]||'')) : end.toLocaleDateString()}</td>
        <td class="tl-gantt-bar-cell">
          <div class="tl-gantt-bar-track">
            <div class="tl-gantt-bar" style="left:${left}%;width:${width}%">${_tlEsc(days)}</div>
          </div>
        </td>
      </tr>`;
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;
    _tlRenderConfigHint(viz, container, 'taskField, startField, endField');
  }

  function _tlRenderVertical(viz, rows, container) {
    const cfg = viz.config || {};
    const dateField  = _tlGetField(cfg, rows, 'dateField', 0);
    const titleField = _tlGetField(cfg, rows, 'titleField', 1);
    const descField  = _tlGetField(cfg, rows, 'descField', 2);

    if (!rows.length) {
      container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:12px">No data to display.</div>';
      return;
    }

    const sorted = rows.slice().sort(function(a, b) {
      return new Date(a[dateField]) - new Date(b[dateField]);
    });

    let html = '<div class="tl-v-wrap">';
    sorted.forEach(function(row) {
      const date  = String(row[dateField] || '');
      const title = String(row[titleField] || '');
      const desc  = descField ? String(row[descField] || '') : '';
      html += `<div class="tl-v-event">
        <div class="tl-v-dot-col"><div class="tl-v-dot"></div></div>
        <div class="tl-v-content">
          <div class="tl-v-title">${_tlEsc(title)}</div>
          <div class="tl-v-date">${_tlEsc(date)}</div>
          ${desc ? '<div class="tl-v-desc">' + _tlEsc(desc) + '</div>' : ''}
        </div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
    _tlRenderConfigHint(viz, container, 'dateField, titleField, descField');
  }

  function _tlRenderConfigHint(viz, container, fields) {
    const cfg = viz.config || {};
    const hasCfg = Object.values(cfg).some(function(v) { return v; });
    if (!hasCfg) {
      const hint = document.createElement('div');
      hint.style.cssText = 'padding:4px 8px;font-size:10px;color:var(--text-muted);background:var(--bg-raised);border-top:1px solid var(--border)';
      hint.textContent = 'Tip: Configure ' + fields + ' in the Viz tab config panel for accurate rendering.';
      container.appendChild(hint);
    }
  }

  function _tlEsc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { render: render };
})();

/* ── Shared helpers (_ao prefix) ── */

function _aoEsc(s) {

    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');

/* ── Sentiment lexicon (ported verbatim from src/plugins/data-analysis/sentiment-analysis.js) ── */

var _aoLexicon = {
  // Strong positive (+3)
  outstanding: 3, excellent: 3, exceptional: 3, fantastic: 3,
  perfect: 3, brilliant: 3, superb: 3, loved: 3,
  // Positive (+2)
  great: 2, awesome: 2, amazing: 2, wonderful: 2, best: 2,
  valuable: 2, happy: 2, engaging: 2, enjoyed: 2, love: 2,
  informative: 2, inspiring: 2, thorough: 2, comprehensive: 2,
  // Mildly positive (+1)
  good: 1, nice: 1, helpful: 1, useful: 1, effective: 1,
  clear: 1, solid: 1, improving: 1, like: 1, relevant: 1,
  applicable: 1, practical: 1, organized: 1, prepared: 1,
  knowledgeable: 1, professional: 1, interactive: 1,
  // Mildly negative (-1)
  bad: -1, unclear: -1, confusing: -1, hard: -1,
  difficult: -1, slow: -1, issue: -1, lacking: -1,
  boring: -1, outdated: -1, rushed: -1, repetitive: -1,
  vague: -1, disorganized: -1, monotonous: -1,
  // Negative (-2)
  poor: -2, terrible: -2, awful: -2, horrible: -2,
  worst: -2, failed: -2, useless: -2, waste: -2,
  broken: -2, disappointing: -2, frustrating: -2,
  inadequate: -2, unacceptable: -2, irrelevant: -2,
  unprepared: -2, ineffective: -2,
  // Strongly negative (-3)
  hate: -3, disgusting: -3, pathetic: -3, abysmal: -3,
  deplorable: -3
};

function _aoScoreText(text) {
  var words = text.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/);
  var score = 0;
  for (var i = 0; i < words.length; i++) {
    var w = words[i];
    if (!w || w.length < 2) continue;
    if (Object.prototype.hasOwnProperty.call(_aoLexicon, w)) score += _aoLexicon[w];
  }
  return score;
}

/* ── Date helpers ── */

function _aoParseDate(value) {
  var s = String(value == null ? '' : value).trim();
  if (!s) return null;
  var m;
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return new Date(+m[3], +m[1] - 1, +m[2]);
  m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})/);
  if (m) return new Date(+m[3], +m[1] - 1, +m[2]);
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function _aoIsoDate(d) {
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}

function _aoAddUnit(date, amount, unit) {
  var d = new Date(date.getTime());
  if (unit === 'days')        d.setDate(d.getDate() + amount);
  else if (unit === 'months') d.setMonth(d.getMonth() + amount);
  else if (unit === 'years')  d.setFullYear(d.getFullYear() + amount);
  return d;
}

function _aoDiffUnit(d1, d2, unit) {
  if (unit === 'days')   return Math.round((d2.getTime() - d1.getTime()) / 86400000);
  if (unit === 'months') return (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
  if (unit === 'years')  return d2.getFullYear() - d1.getFullYear();
  return 0;
}

/* ── CSV serializer ── */

function _aoRowsToCSV(rows) {
  if (!rows.length) return '';
  var headers = Object.keys(rows[0]);
  var esc = function(v) {
    var s = String(v == null ? '' : v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  var lines = [headers.map(esc).join(',')];
  rows.forEach(function(row) {
    lines.push(headers.map(function(h) { return esc(row[h]); }).join(','));
  });
  return lines.join('\n');
}

function _aoTriggerDownload(rows, filename) {
  var csv = _aoRowsToCSV(rows);
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var fname = (filename || 'export').replace(/\.csv$/i, '') + '.csv';
  var a = Object.assign(document.createElement('a'), { href: url, download: fname });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

   Lexicon-based per-row text scoring. Outputs the string
   'positive', 'neutral', or 'negative' to outputColumn.

window.DWBNodes.ARBITRARY_DATE = {
  label: 'Date Arithmetic',
  icon: '📆',
  category: 'Advanced',
  defaultConfig: { column: '', mode: 'add', amount: 0, unit: 'days', outputColumn: '', compareColumn: '' },

  run: function(rows, config) {
    var col    = config.column;
    var mode   = config.mode || 'add';
    var amount = parseInt(config.amount, 10) || 0;
    var unit   = config.unit || 'days';
    var outCol = (config.outputColumn || '').trim() || col;
    var cmpCol = config.compareColumn || '';
    var today  = new Date(); today.setHours(0, 0, 0, 0);

    return rows.map(function(row) {
      var nr = Object.assign({}, row);
      try {
        var d = _aoParseDate(row[col]);

        if (mode === 'add') {
          nr[outCol] = _aoIsoDate(_aoAddUnit(d, amount, unit));
        } else if (mode === 'diff_from_today') {
          nr[outCol] = _aoDiffUnit(d, today, unit);
        } else if (mode === 'diff_from_column') {
          var d2 = _aoParseDate(row[cmpCol]);
          nr[outCol] = d2 != null ? _aoDiffUnit(d, d2, unit) : '';

        nr[outCol] = '';

      return nr;
    });

  validate: function(config) {

/* ───────────────────────────────────────────────────────────
   SET_TYPES
   Coerces column values to a target type (string, number,
   boolean, date). Writes a dynamic column→type mapping.
─────────────────────────────────────────────────────────── */

window.DWBNodes.SET_TYPES = {
  label: 'Set Types',
  icon: '🔢',
  category: 'Advanced',
  defaultConfig: { typeMap: {} },

  run: function(rows, config) {
    var typeMap = config.typeMap || {};
    if (!Object.keys(typeMap).length) return rows;

    return rows.map(function(row) {
      var nr = Object.assign({}, row);
      Object.keys(typeMap).forEach(function(col) {
        var targetType = typeMap[col];
        var val = row[col];
        try {
          if (targetType === 'number') {
            nr[col] = parseFloat(val);
            if (isNaN(nr[col])) nr[col] = 0;
          } else if (targetType === 'string') {
            nr[col] = String(val == null ? '' : val);
          } else if (targetType === 'boolean') {
            if (typeof val === 'boolean') { nr[col] = val; }
            else {
              var s = String(val == null ? '' : val).toLowerCase().trim();
              nr[col] = s === 'true' || s === '1' || s === 'yes';
            }
          } else if (targetType === 'date') {
            var d = _aoParseDate(val);
            nr[col] = d ? _aoIsoDate(d) : '';
          }
        } catch (e) {
          nr[col] = val;
        }
      });
      return nr;
    });
  },

  validate: function(config) {
    if (!config.typeMap || !Object.keys(config.typeMap).length) return 'Add at least one column mapping';
    return null;
  },

  configUI: function(config, onChange, currentRows) {
    var typeMap = config.typeMap || {};
    var allCols = _aoCols(currentRows);

    var div = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;gap:6px';

    function renderRows() {
      div.innerHTML = '';

      var mappedCols = Object.keys(typeMap);

      if (!mappedCols.length) {
        var empty = document.createElement('div');
        empty.style.cssText = 'font-size:12px;color:var(--text-faint);padding:4px 0';
        empty.textContent = 'No columns mapped yet.';
        div.appendChild(empty);
      }

      mappedCols.forEach(function(col) {
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:6px;align-items:center';

        // Column selector (exclude columns already in other rows)
        var otherMapped = mappedCols.filter(function(c) { return c !== col; });
        var availCols = allCols.filter(function(c) { return c === col || !otherMapped.includes(c); });
        var colSel = document.createElement('select');
        colSel.style.cssText = 'flex:1;font-size:12px';
        colSel.innerHTML = _aoColOptHtml(availCols, col);
        colSel.addEventListener('change', function(e) {
          var newCol = e.target.value;
          if (!newCol || newCol === col) return;
          var savedType = typeMap[col];
          delete typeMap[col];
          typeMap[newCol] = savedType;
          onChange('typeMap', Object.assign({}, typeMap));
          renderRows();
        });

        // Type selector
        var typeSel = document.createElement('select');
        typeSel.style.cssText = 'flex:1;font-size:12px';
        typeSel.innerHTML = ['string', 'number', 'boolean', 'date'].map(function(t) {
          return '<option value="' + t + '"' + (typeMap[col] === t ? ' selected' : '') + '>' +
            t.charAt(0).toUpperCase() + t.slice(1) + '</option>';
        }).join('');
        typeSel.addEventListener('change', function(e) {
          typeMap[col] = e.target.value;
          onChange('typeMap', Object.assign({}, typeMap));
        });

        // Delete button
        var del = document.createElement('button');
        del.style.cssText = 'background:transparent;border:none;cursor:pointer;font-size:14px;color:var(--text-muted);padding:0 4px;flex-shrink:0';
        del.textContent = '✕';
        del.title = 'Remove';
        del.addEventListener('click', function() {
          delete typeMap[col];
          onChange('typeMap', Object.assign({}, typeMap));
          renderRows();
        });

        row.appendChild(colSel);
        row.appendChild(typeSel);
        row.appendChild(del);
        div.appendChild(row);
      });

      // "+ Add column" button
      var addBtn = document.createElement('button');
      addBtn.style.cssText = 'margin-top:4px;padding:4px 10px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:4px;font-size:12px;cursor:pointer';
      addBtn.textContent = '+ Add column';
      var unmapped = allCols.filter(function(c) { return !mappedCols.includes(c); });
      if (!unmapped.length) addBtn.disabled = true;
      addBtn.addEventListener('click', function() {
        var next = unmapped[0];
        if (!next) return;
        typeMap[next] = 'string';
        onChange('typeMap', Object.assign({}, typeMap));
        renderRows();
      });
      div.appendChild(addBtn);
    }

    renderRows();
    return div;
  }
};

window.DWBNodes.FORMULA = {
  label: 'Formula Column',
  icon: '𝑓',
  category: 'Text Cleaning',
  defaultConfig: { outputColumn: 'result', expression: '' },

  run: function(rows, config) {
    const expr = (config.expression || '').trim();
    const out  = (config.outputColumn || 'result').trim();
    if (!expr) return rows;

    // Build a safe evaluator: expose row fields as variables
    return rows.map(function(row) {
      const nr = Object.assign({}, row);
      try {
        // Build variable declarations for each column
        const varDecls = Object.keys(row).map(function(k) {
          const v = row[k];
          const safe = k.replace(/[^a-zA-Z0-9_]/g, '_');
          const valStr = isNaN(Number(v)) ? JSON.stringify(String(v)) : String(Number(v));
          return 'var ' + safe + ' = ' + valStr + ';';
        }).join(' ');

        // Also expose row as _row
        const rowJson = JSON.stringify(row);

        /* jshint evil: true */
        nr[out] = (new Function(varDecls + ' var _row = ' + rowJson + '; return (' + expr + ');'))();
      } catch (e) {
        nr[out] = '#ERR:' + e.message;
      }
      return nr;
    });
  },

  validate: function(config) {
    if (!(config.outputColumn || '').trim()) return 'Output column name is required';
    if (!(config.expression || '').trim()) return 'Expression is required';
    return null;
  },

  configUI: function(config, onChange, currentRows) {
    const div = document.createElement('div');
    const cols = currentRows && currentRows.length ? Object.keys(currentRows[0]) : [];

    div.innerHTML = `
      <div class="form-row">
        <label>Output Column Name</label>
        <input type="text" id="fm-out" value="${_fmEsc(config.outputColumn||'result')}" style="width:100%" placeholder="result">
      </div>
      <div class="form-row">
        <label>Expression</label>
        <textarea id="fm-expr" style="width:100%;height:80px;font-family:monospace;font-size:12px;resize:vertical" placeholder="e.g. col1 + ' ' + col2">${_fmEsc(config.expression||'')}</textarea>
      </div>
      ${cols.length ? '<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">Available columns: ' + cols.map(_fmEsc).join(', ') + '</div>' : ''}
      <div style="font-size:11px;color:var(--text-muted);line-height:1.5">
        Use column names as variables. Examples:<br>
        <code>price * quantity</code><br>
        <code>firstName + ' ' + lastName</code><br>
        <code>parseFloat(score) > 90 ? 'Pass' : 'Fail'</code>
      </div>`;

    div.querySelector('#fm-out').addEventListener('input', function(e) { onChange('outputColumn', e.target.value); });
    div.querySelector('#fm-expr').addEventListener('input', function(e) { onChange('expression', e.target.value); });
    return div;
  }
};

function _fmEsc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
