  display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
}

/* Filter widget wrapper */
.dash-fw-wrap {
  position: relative; display: flex; align-items: center; gap: 2px;
}
.dash-fw-gear-btn {
  opacity: 0; transition: opacity 0.15s; background: none; border: none;
  color: var(--text-faint); font-size: 11px; cursor: pointer; padding: 2px 4px;
  line-height: 1; border-radius: 3px;
}
.dash-fw-wrap:hover .dash-fw-gear-btn { opacity: 1; }
.dash-fw-gear-btn:hover { color: var(--text-main); background: var(--bg-raised); }

/* Context menu */
.dash-fw-context-menu {
  position: fixed; z-index: 700; background: var(--bg-surface);
  border: 1px solid var(--border-strong); border-radius: 6px;
  box-shadow: var(--shadow-menu); min-width: 140px; overflow: hidden;
}
.dash-fw-context-item {
  display: block; width: 100%; padding: 8px 14px; background: none; border: none;
  text-align: left; font-size: 12px; font-family: inherit; cursor: pointer;
  color: var(--text-main);
}
.dash-fw-context-item:hover { background: var(--bg-raised); color: var(--danger); }

/* Filter widget chips style */
.dash-fw-chips { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
.dash-fw-label { font-size: var(--text-xs); font-weight: var(--weight-semibold); color: var(--text-muted); margin-right: 2px; }
.dash-fw-chip { padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-raised); color: var(--text-muted); font-size: var(--text-sm); cursor: pointer; transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast); font-family: inherit; }
.dash-fw-chip.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: var(--weight-semibold); }
.dash-fw-chip:hover:not(.active) { background: var(--bg-raised); border-color: var(--border-strong); }
.dash-fw-clear { background: none; border: none; color: var(--text-faint); font-size: var(--text-xs); cursor: pointer; padding: 2px 6px; font-family: inherit; }
.dash-fw-clear:hover { color: var(--danger); }

/* Filter widget dropdown style */
.dash-fw-dropdown-btn { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-raised); color: var(--text-muted); font-size: var(--text-sm); cursor: pointer; font-family: inherit; }
.dash-fw-dropdown-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.dash-fw-count { background: var(--accent); color: #fff; border-radius: 10px; padding: 0 6px; font-size: var(--text-xs); font-weight: var(--weight-bold); }

/* Excel-style panel */
.dash-fw-panel { position: fixed; background: var(--bg-surface); border: 1px solid var(--border-strong); border-radius: 8px; box-shadow: var(--shadow-modal); z-index: 600; width: 280px; display: flex; flex-direction: column; max-height: 400px; }
.dash-fw-search { margin: 8px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: var(--text-sm); background: var(--bg-surface); color: var(--text-main); font-family: inherit; outline: none; }
.dash-fw-search:focus { border-color: var(--accent); }
.dash-fw-panel-actions { display: flex; gap: 8px; padding: 4px 12px; border-bottom: 1px solid var(--border); }
.dash-fw-panel-actions button { background: none; border: none; color: var(--accent); font-size: var(--text-xs); cursor: pointer; padding: 4px 0; font-family: inherit; }
.dash-fw-panel-actions button:hover { text-decoration: underline; }
.dash-fw-list { overflow-y: auto; flex: 1; padding: 4px 0; }
.dash-fw-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; font-size: var(--text-sm); color: var(--text-main); user-select: none; }
.dash-fw-item:hover { background: var(--bg-raised); }
.dash-fw-item.active { color: var(--accent); }
.dash-fw-item input[type="checkbox"] { accent-color: var(--accent); flex-shrink: 0; }
.dash-fw-count-badge { margin-left: auto; font-size: var(--text-xs); color: var(--text-faint); }
.dash-fw-panel-footer { display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--border); justify-content: flex-end; }
.dash-fw-apply { padding: 5px 14px; font-size: var(--text-sm); }
.dash-fw-cancel { padding: 5px 10px; font-size: var(--text-sm); }

/* Filter chip interactivity */
.dash-filter-chip { cursor: pointer; user-select: none; }
.dash-filter-chip:hover { background: var(--accent-light); border-color: var(--accent); }
.dash-filter-chip.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* Filter chip dropdown */
.dash-filter-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  box-shadow: var(--shadow-menu);
  z-index: 600;
  min-width: 160px;
  max-height: 240px;
  overflow-y: auto;
}
.dash-filter-dropdown-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 7px 14px;
  font-size: var(--text-sm);
  font-family: inherit;
  background: none;
  border: none;
  color: var(--text-main);
  cursor: pointer;
}
.dash-filter-dropdown-item:hover { background: var(--bg-raised); }
.dash-filter-dropdown-item.active { color: var(--accent); font-weight: var(--weight-semibold); background: var(--accent-light); }

/* --- src\v2\displays\displays-tab.css --- */
/* === Displays Tab === */
#panel-displays {

}

/* Rail (left) */
#dt-rail {

.dt-display-item {

.dt-display-icon  { font-size: 16px; flex-shrink: 0; }

.dt-add-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* Canvas */

/* --- src\v2\displays\merge\merge-display.css --- */
/* === Merge Display === */

.mg-root {
  display: flex;
  height: 100%;
  overflow: hidden;
}

/* Left column */
.mg-left {
  width: 280px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

/* Right column */
.mg-right {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-main);
}

/* Config sections */
.mg-section {
  border-bottom: 1px solid var(--border);
}

.mg-section-title {
  padding: 8px 12px 4px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.mg-section-body {
  padding: 6px 12px 12px;
}

/* Empty state */
.mg-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 16px 8px;
  gap: 4px;
}

.mg-empty-icon { font-size: 28px; margin-bottom: 4px; }

.mg-empty-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-main);
}

.mg-empty-desc {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}

/* Template info */
.mg-template-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-main);
  margin-bottom: 2px;
}

.mg-template-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.mg-btn-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.mg-remove-btn {
  background: none;
  border: none;
  font-size: 12px;
  color: var(--text-muted);
  padding: 0;
  cursor: pointer;
  text-decoration: underline;
  transition: color var(--transition-fast);
}
.mg-remove-btn:hover { color: var(--danger); }
.mg-remove-btn.mg-confirm { color: var(--danger); font-weight: 600; }

/* Row count */
.mg-row-count {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* Binding rows */
.mg-binding-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.mg-binding-row:last-child { margin-bottom: 0; }

.mg-binding-label {
  flex: 0 0 96px;
  font-size: 12px;
  color: var(--text-main);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.mg-binding-sel {
  flex: 1;
  min-width: 0;
  font-size: 12px;
}

.mg-hint {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
}

/* Generate button spacing */
.mg-gen-pad { padding: 0 4px 8px; }

/* Preview header */
.mg-preview-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.mg-prev-nav {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.mg-prev-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Preview body */
.mg-preview-body {
  flex: 1;
  overflow: auto;
  display: flex;
  flex-direction: column;
}

.mg-preview-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-faint);
  gap: 4px;
}

.mg-svg-wrap {
  flex: 1;
  overflow: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
}

.mg-svg-inner {
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
  line-height: 0;
  max-width: 100%;
}

.mg-svg-inner svg {
  display: block;
  max-width: 100%;
  height: auto;
}

/* Toast */
.mg-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text-main);
  color: #fff;
  padding: 8px 18px;
  border-radius: 6px;
  font-size: 13px;
  z-index: 9999;
  box-shadow: var(--shadow-modal);
  pointer-events: none;
  white-space: nowrap;
}

.mg-toast-error { background: var(--danger); }

/* --- src\v2\displays\timeline\timeline.css --- */
/* === Timeline Renderers === */

/* Horizontal timeline */
.tl-h-wrap { overflow-x: auto; padding: 20px 16px; }
.tl-h-track {
  position: relative; height: 4px;
  background: var(--border); border-radius: 2px;
  margin: 40px 0 60px;
}
.tl-h-event {
  position: absolute; top: 50%; transform: translateY(-50%);
  cursor: pointer;
}
.tl-h-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--navy-sailor); border: 2px solid white;
  box-shadow: 0 0 0 2px var(--navy-sailor);
  position: relative; z-index: 1;
}
.tl-h-label {
  position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
  font-size: 11px; white-space: nowrap; color: var(--text-main);
  font-weight: 600; text-align: center;
}
.tl-h-date {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--text-muted); white-space: nowrap;
}

/* Gantt chart */
.tl-gantt-wrap { overflow: auto; padding: 8px; }
.tl-gantt-table { min-width: 600px; width: 100%; border-collapse: collapse; }
.tl-gantt-table th {
  background: var(--bg-raised); padding: 6px 8px;
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-align: left; border-bottom: 2px solid var(--border-strong);
  white-space: nowrap;
}
.tl-gantt-row td { padding: 4px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
.tl-gantt-bar-cell { padding: 4px 8px !important; }
.tl-gantt-bar-track { background: var(--bg-raised); border-radius: 3px; height: 20px; position: relative; min-width: 100px; }
.tl-gantt-bar {
  position: absolute; height: 100%; border-radius: 3px;
  background: var(--navy-sailor); display: flex; align-items: center;
  padding: 0 6px; font-size: 10px; color: white; font-weight: 600;
  white-space: nowrap; overflow: hidden;
}

/* Vertical timeline */
.tl-v-wrap { padding: 16px; overflow-y: auto; }
.tl-v-event {
  display: flex; gap: 12px; margin-bottom: 24px; position: relative;
}
.tl-v-event::before {
  content: '';
  position: absolute; left: 19px; top: 28px; bottom: -18px;
  width: 2px; background: var(--border);
}
.tl-v-event:last-child::before { display: none; }
.tl-v-dot-col { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-top: 4px; }
.tl-v-dot {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--navy-sailor); border: 3px solid white;
  box-shadow: 0 0 0 2px var(--navy-sailor);
  flex-shrink: 0; z-index: 1;
}
.tl-v-content { flex: 1; min-width: 0; }
.tl-v-title { font-size: 13px; font-weight: 700; color: var(--text-main); }
.tl-v-date  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.tl-v-desc  { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }

/* --- src\v2\shell\pipeline-tab.css --- */
/* === Pipeline Tab Layout === */
#panel-pipeline {
  flex-direction: row;
  overflow: hidden;
}

/* Main area (left) */
.pt-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* Data inspector */
#pt-inspector {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-main);
  position: relative;
  min-height: 80px;
}
#pt-inspector::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 18px;
  background: linear-gradient(transparent, var(--bg-main));
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--transition-fast);
  z-index: 1;
}
#pt-inspector.has-overflow::after { opacity: 1; }

#pt-inspector-meta {
  padding: 4px 12px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
}

#pt-table-wrap {
  flex: 1;
  overflow: auto;
}

/* Drag resize divider */
#pt-resize-divider {
  flex: 0 0 5px;
  background: var(--bg-raised);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: ns-resize;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  flex-shrink: 0;
}
#pt-resize-divider::before {
  content: '· · ·';
  font-size: 8px;
  color: var(--border-strong);
  letter-spacing: 3px;
}
#pt-resize-divider:hover { background: var(--accent-light); }

/* Config panel */
#pt-config-panel {
  flex: 0 0 220px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: flex-basis var(--transition-normal) ease;
  min-height: 32px;
}
#pt-config-panel.collapsed { flex-basis: 32px !important; }

#pt-config-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

/* Sidebar (right) */
#pt-sidebar {
  width: var(--sidebar-w);
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

#pt-node-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

/* Node cards */
.pt-node-card {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 9px;
  margin: 1px 5px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background var(--transition-fast);
  user-select: none;
}
.pt-node-card:hover { background: var(--bg-raised); }
.pt-node-card.selected { background: var(--accent-light); border-color: var(--accent); }

.pt-node-icon { font-size: 16px; flex-shrink: 0; }
.pt-node-info { flex: 1; min-width: 0; }
.pt-node-name {
  font-weight: 600; font-size: 12px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pt-node-type { font-size: 10px; color: var(--text-muted); }

.pt-node-del {
  background: none; border: none; font-size: 14px; line-height: 1;
  padding: 0 2px; color: var(--text-faint); opacity: 0;
  transition: opacity var(--transition-fast), color var(--transition-fast);
  flex-shrink: 0;
}
.pt-node-card:hover .pt-node-del { opacity: 1; }
.pt-node-del:hover { color: var(--danger); }

.pt-add-node-btn {
  display: flex; align-items: center; justify-content: center;
  width: calc(100% - 16px); margin: 2px 8px;
  padding: 5px; background: transparent;
  border: 1px dashed var(--accent); border-radius: 4px;
  color: var(--accent); font-size: 11px;
  transition: all var(--transition-fast);
}
.pt-add-node-btn:hover { background: var(--accent-light); }

/* Stash panel */
#pt-stash-panel {
  border-top: 1px solid var(--border);
  max-height: 160px;
  overflow: hidden;
  transition: max-height var(--transition-normal);
  flex-shrink: 0;
}
#pt-stash-panel.collapsed { max-height: 32px; }
#pt-stash-list { overflow-y: auto; max-height: 120px; }
.pt-stash-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; font-size: 11px;
  border-bottom: 1px solid var(--border);
}
.pt-stash-item:hover { background: var(--bg-raised); }
.pt-stash-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pt-stash-count { font-size: 10px; color: var(--text-faint); white-space: nowrap; }

/* Console panel */
#pt-console {
  flex-shrink: 0;
  background: #080e1c;
  border-top: 1px solid #1e3a5f;
  display: flex;
  flex-direction: column;
  max-height: 180px;
  overflow: hidden;
  transition: max-height var(--transition-normal) ease;
}
#pt-console.collapsed { max-height: 28px; }

#pt-console-header {
  display: flex; align-items: center;
  padding: 0 10px; height: 28px;
  background: #0c1628; border-bottom: 1px solid #1e3a5f;
  cursor: pointer; user-select: none; flex-shrink: 0; gap: 6px;
}
#pt-console-header .clabel {
  font-size: 11px; font-weight: 700; color: #4a7099;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.pt-console-clear {
  padding: 1px 6px; background: transparent;
  border: 1px solid #1e3a5f; border-radius: 3px;
  font-size: 10px; color: #4a7099;
}
.pt-console-clear:hover { color: #7ea3c4; }
#pt-console-arrow { margin-left: auto; color: #4a7099; }

#pt-console-log {
  height: 140px; overflow-y: auto;
  padding: 4px 10px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 11px;
}
#pt-console.collapsed #pt-console-log { display: none; }

.log-line { padding: 1px 0; line-height: 1.55; }
.log-ts { color: #2d5a8e; margin-right: 6px; }
.log-line.info    .log-msg { color: #7ea3c4; }
.log-line.error   .log-msg { color: #f87171; }
.log-line.warn    .log-msg { color: #fbbf24; }
.log-line.success .log-msg { color: #34d399; }

/* Empty inspector state */
.pt-inspector-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 160px; color: var(--text-faint);
  gap: 8px; font-size: 12px;
}
.pt-inspector-empty .ei-icon { font-size: 32px; }

/* Column header VDP */
.vdp {
  border-top: 1px solid var(--border);
  padding: 3px 8px 5px;
  background: var(--bg-surface);
  font-size: 10px; color: var(--text-muted);
}
.vdp-stats { display: flex; gap: 8px; margin-bottom: 3px; }
.vdp-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.vdp-bar-fill  { height: 100%; background: var(--accent); border-radius: 2px; }

.row-num-cell {
  color: var(--text-faint); font-size: 10px;
  text-align: right; padding: 3px 6px;
  user-select: none; width: 40px;
}

/* --- src\v2\shell\splash.css --- */
/* === DWBSplash: splash screen and live tour styles === */
:root {
  --shadow-splash: 0 32px 96px rgba(0,0,0,0.6);
  --shadow-focus:  0 0 0 6px rgba(197,178,48,0.3);
}

/* Splash overlay */
#sp-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.3s ease;
}

#sp-card {
  width: 640px;
  background: var(--bg-surface);
  border-radius: 16px;
  box-shadow: var(--shadow-splash);
  padding: 48px 48px 40px;
  text-align: center;
  animation: slideUp 0.35s ease;
}

.sp-anchor {
  font-size: 42px;
  color: var(--navy-gold);
  line-height: 1;
  margin-bottom: 12px;
}

.sp-title-row {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 8px;
}

.sp-title-dwb {
  font-size: 28px;
  font-weight: 900;
  color: var(--text-main);
}

.sp-title-ver {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-muted);
}

.sp-tagline {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 16px;
}

.sp-rule {
  width: 80px;
  height: 2px;
  background: var(--navy-gold);
  margin: 24px auto;
}

.sp-pills {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.sp-pill {
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12px;
  padding: 8px 14px;
  color: var(--text-main);
}

.sp-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 24px;
}

.sp-btn-lg {
  padding: 9px 24px;
  font-size: 13px;
}

/* Tour dim overlay */
#sp-tour-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 900;
  pointer-events: all;
}

/* Tour highlight ring (above overlay, around target element) */
#sp-tour-ring {
  position: fixed;
  border: 4px solid var(--navy-gold);
  box-shadow: var(--shadow-focus);
  border-radius: 6px;
  pointer-events: none;
  z-index: 901;
  transition: top 0.15s ease, left 0.15s ease, width 0.15s ease, height 0.15s ease;
}

/* Tour tooltip card */
#sp-tour-tooltip {
  position: fixed;
  width: 280px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-modal);
  padding: 16px;
  z-index: 902;
  animation: fadeIn 0.15s ease;
}

.sp-tip-step {
  font-size: 11px;
  color: var(--text-faint);
  margin-bottom: 6px;
}

.sp-tip-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-main);
}

.sp-tip-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  line-height: 1.5;
}

.sp-tip-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
}

.sp-tip-btn {
  padding: 5px 12px;
  font-size: 12px;
}

.sp-tip-skip {
  font-size: 11px;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  white-space: nowrap;
}

.sp-tip-skip:hover { color: var(--text-main); }

/* --- src\v2\shell\topbar.css --- */
/* topbar styles are in design-tokens.css — this file intentionally minimal */
#topbar .tb-btn + .tb-btn { margin-left: 2px; }

/* --- src\v2\viz\viz-tab.css --- */
/* === Viz Tab === */
#panel-viz {
  flex-direction: row;
  overflow: hidden;
}

/* Asset library sidebar */
#vt-sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#vt-sidebar-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  height: 36px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  flex-shrink: 0;
}

#vt-asset-list { flex: 1; overflow-y: auto; padding: 4px 0; }

.vt-asset-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  cursor: pointer;
  border: 1px solid transparent;
  margin: 1px 5px;
  border-radius: 5px;
  transition: background var(--transition-fast);
}
.vt-asset-item:hover { background: var(--bg-raised); }
.vt-asset-item.selected { background: var(--accent-light); border-color: var(--accent); }

.vt-asset-icon { font-size: 16px; flex-shrink: 0; }
.vt-asset-info { flex: 1; min-width: 0; }
.vt-asset-label {
  font-size: 12px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.vt-asset-type { font-size: 10px; color: var(--text-muted); }
.vt-asset-del {
  background: none; border: none; font-size: 13px; color: var(--text-faint);
  opacity: 0; padding: 0 2px; transition: opacity var(--transition-fast);
}
.vt-asset-item:hover .vt-asset-del { opacity: 1; }
.vt-asset-del:hover { color: var(--danger); }

.vt-add-btn {
  display: flex; align-items: center; justify-content: center;
  width: calc(100% - 16px); margin: 4px 8px;
  padding: 5px; background: transparent;
  border: 1px dashed var(--accent); border-radius: 4px;
  color: var(--accent); font-size: 11px;
  transition: all var(--transition-fast);
}
.vt-add-btn:hover { background: var(--accent-light); }

/* Main area */
#vt-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

#vt-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#vt-config {
  width: 260px;
  flex-shrink: 0;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  display: none;
}
#vt-config.visible { display: block; }

.vt-config-section {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.vt-config-label {
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em;
  display: block; margin-bottom: 6px;
}

#vt-canvas-wrap {
  flex: 1;
  display: flex;
  min-width: 0;
  overflow: hidden;
}

#vt-canvas {
  flex: 1;
  overflow: auto;
  background: var(--bg-main);
  padding: 24px;
}

/* Viz blocks (in preview) */
.vt-preview-block {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--navy-gold);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
  margin-bottom: 20px;
  animation: slideUp 0.2s ease;
}

.vt-block-header {
  display: flex;
  align-items: center;
  padding: 8px 14px;
  background: linear-gradient(135deg, var(--navy-midnight) 0%, var(--navy-sailor) 100%);
  gap: 8px;
}
.vt-block-title { flex: 1; font-size: 13px; font-weight: 600; color: #fff; }

.vt-block-body { padding: 0; min-height: 200px; }

/* Viz element picker */
.vt-picker-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 8px 12px;
}
.vt-picker-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  text-align: center;
  transition: all var(--transition-fast);
}
.vt-picker-item:hover { border-color: var(--accent); background: var(--accent-light); }
.vt-picker-icon { font-size: 24px; }
.vt-picker-name { font-size: 11px; font-weight: 600; color: var(--text-main); }
.vt-picker-desc { font-size: 10px; color: var(--text-muted); line-height: 1.3; }

/* KPI stat */
.vt-kpi {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 140px; padding: 20px; gap: 4px; text-align: center;
}
.vt-kpi-value { font-size: 48px; font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: -0.02em; }
.vt-kpi-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.vt-kpi-sub   { font-size: 11px; color: var(--text-faint); }

/* Placeholder for unimplemented renderers */
.vt-renderer-placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 200px; gap: 8px;
  color: var(--text-faint); font-size: 13px;
}

/* No snapshots warning */
.vt-no-data {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex: 1; gap: 12px; color: var(--text-faint);
  font-size: 13px; text-align: center; padding: 40px;
}

/* ── Display Filters section ────────────────────────────────────────────── */
.vt-filter-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 6px;
  min-height: 24px;
}

.vt-filter-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 11px;
  padding: 3px 8px;
  color: var(--text-main);
}

.vt-filter-tag-remove {
  background: none;
  border: none;
  font-size: 13px;
  line-height: 1;
  color: var(--text-faint);
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
}
.vt-filter-tag-remove:hover { color: var(--danger); }

.vt-filter-add-btn {
  background: none;
  border: 1px dashed var(--border-strong);
  border-radius: 12px;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 3px 10px;
  transition: border-color var(--transition-fast), color var(--transition-fast);
}
.vt-filter-add-btn:hover { border-color: var(--accent); color: var(--accent); }

.vt-filter-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  z-index: 200;
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  min-width: 160px;
  max-height: 200px;
  overflow-y: auto;
}

.vt-filter-dropdown-item {
  display: block;
  width: 100%;
  padding: 7px 12px;
  background: none;
  border: none;
  text-align: left;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  color: var(--text-main);
}
.vt-filter-dropdown-item:hover { background: var(--bg-raised); }

/* ── Toggle switch ──────────────────────────────────────────────────────── */
.vt-toggle {
  position: relative;
  display: inline-block;
  width: 34px;
  height: 20px;
  flex-shrink: 0;
  cursor: pointer;
}
.vt-toggle input {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}
.vt-toggle-track {
  position: absolute;
  inset: 0;
  background: var(--border-strong);
  border-radius: 20px;
  transition: background var(--transition-fast);
}
.vt-toggle-track::before {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  top: 3px;
  left: 3px;
  transition: transform var(--transition-fast);
}
.vt-toggle input:checked + .vt-toggle-track { background: var(--accent); }
.vt-toggle input:checked + .vt-toggle-track::before { transform: translateX(14px); }

<div id="app">

        lbl.appendChild(cntBadge);
        listEl.appendChild(lbl);
      });
    }

    renderList('');

    if (searchEl) {
      searchEl.addEventListener('input', function() { renderList(this.value); });
    }

    selAllBtn.addEventListener('click', function() {
      pendingArr = vals.slice();
      renderList(searchEl ? searchEl.value : '');
    });
    clrAllBtn.addEventListener('click', function() {
      pendingArr = [];
      renderList(searchEl ? searchEl.value : '');
    });

    var footer = document.createElement('div');
    footer.className = 'dash-fw-panel-footer';

    var cancelBtn = document.createElement('button');
    cancelBtn.className = 'dash-fw-cancel tb-btn';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', function() { panel.remove(); });

    var applyBtn = document.createElement('button');
    applyBtn.className = 'dash-fw-apply btn-primary';
    applyBtn.textContent = 'Apply';
    applyBtn.addEventListener('click', function() {
      display.filterContext = display.filterContext || { activeFilters: {} };
      display.filterContext.activeFilters = display.filterContext.activeFilters || {};
      display.filterContext.activeFilters[field] = pendingArr.slice();
      panel.remove();
      if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
      if (onFilterChange) onFilterChange();
    });

    footer.appendChild(cancelBtn);
    footer.appendChild(applyBtn);
    panel.appendChild(footer);

    document.body.appendChild(panel);

    var rect = btnEl.getBoundingClientRect();
    panel.style.top = (rect.bottom + 4) + 'px';
    panel.style.left = Math.min(rect.left, window.innerWidth - 290) + 'px';

    setTimeout(function() {
      document.addEventListener('click', function _panelCloser(ev) {
        if (!panel.contains(ev.target) && ev.target !== btnEl) {
          panel.remove();
          document.removeEventListener('click', _panelCloser);
        }
      });
    }, 10);
  }

  function mount(container, display) {
    if (!container || !display) return;

    const cfg = display.config || {};
    const layout = cfg.layout || '2col';
    const state = window.DWBState;
    const snapshots = state.snapshots || {};
    const vizList = (state.flow && state.flow.visualizations) || [];

    container.innerHTML = `
      <div class="dash-root">
        <div class="dash-toolbar">
          <span class="dash-toolbar-label">${_dEsc(display.label)}</span>
          <div style="display:flex;gap:4px">
            ${_dLayouts.map(function(l) {
              return '<button class="dash-layout-btn' + (layout === l.key ? ' active' : '') + '" data-layout="' + l.key + '">' + l.label + '</button>';
            }).join('')}
          </div>
          <div class="flex-spacer"></div>
          <button class="dash-tb-ghost" id="dash-add-viz-btn">＋ Add Viz</button>
          <button class="dash-tb-ghost" id="dash-add-filter-btn">+ Filter</button>
          <div class="dash-tb-sep"></div>
          <button class="dash-tb-sec" id="dash-fullscreen-btn">⛶ Present</button>
          <button class="dash-tb-sec" id="dash-export-btn">Export HTML</button>
        </div>
        <div class="dash-filter-bar hidden" id="dash-filter-bar"></div>
        <div class="dash-canvas" id="dash-canvas">
          <div class="dash-grid layout-${layout}" id="dash-grid"></div>
        </div>
      </div>`;

    container.querySelectorAll('.dash-layout-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        display.config = display.config || {};
        display.config.layout = btn.dataset.layout;
        if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
        mount(container, display);
      });
    });

    container.querySelector('#dash-add-filter-btn').addEventListener('click', function() {
      _dShowAddFilterModal(container, display);
    });

    container.querySelector('#dash-add-viz-btn').addEventListener('click', function() {
      _dShowAddPlacementModal(container, display);
    });

    container.querySelector('#dash-fullscreen-btn').addEventListener('click', function() {
      _dEnterFullscreen(display);
    });

    container.querySelector('#dash-export-btn').addEventListener('click', function() {
      _dExportHtml(display, container.querySelector('#dash-export-btn'));
    });

    var filterBarEl = container.querySelector('#dash-filter-bar');
    var gridEl = container.querySelector('#dash-grid');

    function _doFilterUpdate() {
      _dRenderFilterBar(filterBarEl, display, vizList, snapshots, _doFilterUpdate);
      _dDisposeDomCharts(gridEl);
      gridEl.innerHTML = '';
      _dRenderPlacements(display, gridEl, _dActiveFilters(display), _doFilterUpdate);
    }

    _dRenderFilterBar(filterBarEl, display, vizList, snapshots, _doFilterUpdate);
    _dRenderPlacements(display, gridEl, _dActiveFilters(display), _doFilterUpdate);
  }

  function _dRenderPlacements(display, grid, filters, onFilterChange) {
    if (!grid) return;
    const placements = (display.placements || []);
    const state = window.DWBState;
    const snapshots = state.snapshots || {};
    const vizList = (state.flow && state.flow.visualizations) || [];

    if (placements.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1"><button class="dash-add-placement-btn" id="dash-first-add">＋ Add your first visualization</button></div>';
      const firstAdd = grid.querySelector('#dash-first-add');
      if (firstAdd) firstAdd.addEventListener('click', function() {
        _dShowAddPlacementModal(grid.closest('.dash-root').parentElement, display);
      });
      return;
    }

    placements.forEach(function(placement) {
      const viz = vizList.find(function(v) { return v.id === placement.vizId; });
      if (viz && viz.type === 'FILTER_WIDGET') return; // rendered in filter bar, not canvas
      const card = document.createElement('div');
      card.className = 'dash-placement';

      if (!viz) {
        card.innerHTML = '<div class="dash-placement-body" style="display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:12px">Visualization not found</div>';
        grid.appendChild(card);
        return;
      }

      const rows = _dGetFilteredRows(viz, snapshots, filters);
      const allRows = snapshots[viz.snapshotName] || [];

      card.innerHTML = `<div class="dash-placement-header">
        <span class="dash-placement-title">${_dEsc(viz.label)}</span>
        <button class="dash-fullscreen-btn" style="margin-left:auto" data-placement-id="${placement.id}" title="Remove">✕</button>
      </div>
      <div class="dash-placement-body" id="dash-pb-${placement.id}"></div>`;

      card.querySelector('.dash-fullscreen-btn').addEventListener('click', function() {
        display.placements = display.placements.filter(function(p) { return p.id !== placement.id; });
        if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
        _dDisposeDomCharts(grid);
        grid.innerHTML = '';
        _dRenderPlacements(display, grid, _dActiveFilters(display), onFilterChange);
      });

      grid.appendChild(card);

      const body = card.querySelector('#dash-pb-' + placement.id);
      if (!body) return;

      switch (viz.type) {
        case 'BAR_VERTICAL':          _dRenderBarVertical(viz, rows, body, display, onFilterChange); break;
        case 'LINE':                  _dRenderLine(viz, rows, body, display, onFilterChange); break;
        case 'PIE':                   _dRenderPie(viz, rows, body, display, onFilterChange); break;
        case 'STACKED_DIVERGING_BAR': _dRenderStackedDivergingBar(viz, rows, body, display, onFilterChange); break;
        case 'WORD_CLOUD':            _dRenderWordCloud(viz, rows, body, display, onFilterChange); break;
        case 'STAT_CARD':             _dRenderStatCard(body, viz, allRows, rows); break;
        case 'DATA_TABLE':            _dRenderDataTable(body, viz, rows); break;
        case 'AI_ASSIST':             _dRenderAiAssist(body, viz, rows); break;
        case 'QUOTES_BOARD':          _dRenderQuotesBoard(body, viz, rows); break;
        case 'RICH_TEXT':             _dRenderRichText(body, viz, rows); break;
        default:
          if (window.DWBVizTab) window.DWBVizTab.renderViz(viz, rows, body, allRows);
      }
    });
  }

  function _dGetFilteredRows(viz, snapshots, filters) {
    let rows = snapshots[viz.snapshotName] || [];
    if (!viz.linkToDisplayFilters) return rows;
    const filterKeys = Object.keys(filters);
    if (filterKeys.length === 0) return rows;
    return rows.filter(function(row) {
      return filterKeys.every(function(k) {
        var filterVal = filters[k];
        if (Array.isArray(filterVal)) {
          return filterVal.length === 0 || filterVal.indexOf(String(row[k] !== undefined ? row[k] : '')) !== -1;
        }
        return String(row[k] !== undefined ? row[k] : '') === String(filterVal);
      });
    });
  }

  function _dShowAddFilterModal(container, display) {
    var state = window.DWBState;
    var allVizes = (state.flow && state.flow.visualizations) || [];
    var placedIds = (display.placements || []).map(function(p) { return p.vizId; });

    var available = allVizes.filter(function(v) {
      return v.type === 'FILTER_WIDGET' && placedIds.indexOf(v.id) === -1;
    });

    var listHTML = '';
    if (!available.length) {
      listHTML = '<div class="dash-fw-picker-empty">No filter widgets defined yet — create one in the Visualizations tab first.</div>';
    } else {
      listHTML = available.map(function(v) {
        var cfg = v.config || {};
        var field = cfg.field || '';
        var styleName = cfg.style === 'chips' ? 'Chips' : 'Dropdown';
        var showLabel = v.label && v.label !== field;
        return '<button class="dash-fw-picker-card" data-viz-id="' + _dEsc(v.id) + '">' +
          '<div class="dash-fw-picker-field">' + _dEsc(field) + '</div>' +
          (showLabel ? '<div class="dash-fw-picker-sublabel">' + _dEsc(v.label) + '</div>' : '') +
          '<span class="dash-fw-style-badge">' + _dEsc(styleName) + '</span>' +
          '</button>';
      }).join('');
    }

    var overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.style.zIndex = '700';
    overlay.innerHTML =
      '<div class="modal" style="width:400px">' +
        '<div class="modal-header"><span>Add Filter Widget</span><button class="modal-close" id="afw-close">✕</button></div>' +
        '<div style="padding:16px">' + listHTML + '</div>' +
      '</div>';

    document.body.appendChild(overlay);
    overlay.querySelector('#afw-close').addEventListener('click', function() { document.body.removeChild(overlay); });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) document.body.removeChild(overlay); });

    overlay.querySelectorAll('.dash-fw-picker-card').forEach(function(card) {
      card.addEventListener('click', function() {
        var vizId = card.dataset.vizId;
        var placement = window.DWBSchema.createPlacement(vizId, 'DASHBOARD');
        display.placements = display.placements || [];
        display.placements.push(placement);
        if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
        document.body.removeChild(overlay);
        window.DWBDisplaysTab && window.DWBDisplaysTab.mount();
      });
    });
  }

  function _dShowAddPlacementModal(container, display) {
    const state = window.DWBState;
    const vizList = ((state.flow && state.flow.visualizations) || []).filter(function(v) {
      return v.type !== 'FILTER_WIDGET';
    });

    if (vizList.length === 0) {
      alert('No visualizations exist yet. Create some in the Viz tab first.');
      return;
    }

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.style.zIndex = '600';
    overlay.innerHTML = `<div class="modal" style="width:400px">
      <div class="modal-header">
        <span>Add to Dashboard</span>
        <button class="modal-close" id="dash-modal-close">✕</button>
      </div>
      <div style="padding:16px">
        <div class="form-row">
          <label>Select Visualization</label>
          <select id="dash-viz-select" style="width:100%">
            ${vizList.map(function(v) { return '<option value="' + _dEsc(v.id) + '">' + _dEsc(v.label) + ' (' + v.type + ')</option>'; }).join('')}
          </select>
        </div>
        <div class="form-row">
          <label>Column (for multi-column layouts)</label>
          <select id="dash-col-select" style="width:100%">
            <option value="1">Column 1</option>
            <option value="2">Column 2</option>
            <option value="3">Column 3</option>
          </select>
        </div>
        <button class="btn-primary" id="dash-add-confirm" style="width:100%;padding:8px;margin-top:8px">Add to Dashboard</button>
      </div>
    </div>`;

    document.body.appendChild(overlay);
    overlay.querySelector('#dash-modal-close').addEventListener('click', function() { document.body.removeChild(overlay); });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) document.body.removeChild(overlay); });

    overlay.querySelector('#dash-add-confirm').addEventListener('click', function() {
      const vizId = overlay.querySelector('#dash-viz-select').value;
      const col   = parseInt(overlay.querySelector('#dash-col-select').value, 10) || 1;
      const placement = window.DWBSchema.createPlacement(vizId, 'DASHBOARD');
      placement.column = col;
      display.placements = display.placements || [];
      display.placements.push(placement);
      if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();

  function _dEnterFullscreen(display) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:800;background:var(--bg-main);overflow:auto;padding:32px';

    const closeBtn = document.createElement('button');
    closeBtn.textContent = '✕ Exit';
    closeBtn.style.cssText = 'position:fixed;top:12px;right:16px;padding:6px 14px;background:var(--navy-midnight);color:#fff;border:none;border-radius:4px;cursor:pointer;z-index:801;font-size:12px';
    closeBtn.addEventListener('click', function() { document.body.removeChild(overlay); });

    const inner = document.createElement('div');
    const cfg = display.config || {};
    const layout = cfg.layout || '2col';
    const state = window.DWBState;
    const snapshots = state.snapshots || {};
    const vizList = (state.flow && state.flow.visualizations) || [];

    inner.className = 'dash-grid layout-' + layout;
    inner.style.cssText = 'gap:20px;max-width:1400px;margin:0 auto';

    (display.placements || []).forEach(function(placement) {
      const viz = vizList.find(function(v) { return v.id === placement.vizId; });
      if (!viz || viz.type === 'FILTER_WIDGET') return;
      const rows = snapshots[viz.snapshotName] || [];
      const card = document.createElement('div');
      card.className = 'dash-placement';
      card.innerHTML = '<div class="dash-placement-header"><span class="dash-placement-title">' + _dEsc(viz.label) + '</span></div><div class="dash-placement-body" id="fs-pb-' + placement.id + '"></div>';
      inner.appendChild(card);
      overlay.appendChild(card);
    });

    overlay.appendChild(closeBtn);
    overlay.appendChild(inner);

    // Re-render placements into fullscreen
    (display.placements || []).forEach(function(placement) {
      const viz = vizList.find(function(v) { return v.id === placement.vizId; });
      if (!viz || viz.type === 'FILTER_WIDGET') return;
      const rows = snapshots[viz.snapshotName] || [];
      const body = overlay.querySelector('#fs-pb-' + placement.id);
      if (body) {
        if (viz.type === 'AI_ASSIST') {
          _dRenderAiAssist(body, viz, rows);
        } else if (window.DWBVizTab) {
          window.DWBVizTab.renderViz(viz, rows, body);
        }
      }
    });

    document.body.appendChild(overlay);
  }

  // ── Shared chart palette ─────────────────────────────────────────────────────
  var _D_PALETTE = ['#005EB8','#C5B230','#059669','#dc2626','#f59e0b','#0ea5e9','#8b5cf6','#ec4899'];

  // Word-cloud CDN lazy-load promise (own cached promise, own failure state)
  var _dWcPromise = null;

  // ── Likert scale presets ─────────────────────────────────────────────────────
  var _LIKERT_SCALES = {
    '5point': ['Strongly Disagree','Disagree','Neutral','Agree','Strongly Agree'],
    '7point': ['Strongly Disagree','Disagree','Somewhat Disagree','Neutral','Somewhat Agree','Agree','Strongly Agree']
  };
  var _LIKERT_COLORS_5 = ['#1d4ed8','#3b82f6','#94a3b8','#f97316','#c2410c'];
  var _LIKERT_COLORS_7 = ['#1d4ed8','#3b82f6','#93c5fd','#94a3b8','#fdba74','#f97316','#c2410c'];

  // ── Utilities ─────────────────────────────────────────────────────────────────

  function _dMissingConfig(container, type) {
    container.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:12px;text-align:center">⚙️ Configure ' + _dEsc(type) + ' in the config panel.</div>';
  }

  function _dDisposeDomCharts(container) {
    if (window.echarts) {
      container.querySelectorAll('.dash-block-chart').forEach(function(el) {
        var inst = window.echarts.getInstanceByDom(el);
        if (inst) inst.dispose();
      });
    }
  }

  // ── Single aggregation implementation ────────────────────────────────────────
  function _dAggregateRows(rows, categoryField, valueField, aggregation) {
    var groups = {};
    var counts = {};
    (rows || []).forEach(function(row) {
      var cat = row[categoryField] !== undefined ? String(row[categoryField]) : '(blank)';
      var val = parseFloat(row[valueField]) || 0;
      if (!groups[cat]) { groups[cat] = 0; counts[cat] = 0; }
      groups[cat] += val;
      counts[cat]++;
    });
    return Object.keys(groups).map(function(cat) {
      var value;
      if (aggregation === 'count') value = counts[cat];
      else if (aggregation === 'average') value = counts[cat] ? +(groups[cat] / counts[cat]).toFixed(2) : 0;
      else value = groups[cat];
      return { category: cat, value: value };
    });
  }

  // ── BAR_VERTICAL renderer (uses _dAggregateRows) ─────────────────────────────
  function _dRenderBarVertical(viz, rows, container, display, onFilterChange) {
    var cfg = viz.config || {};
    var catField = cfg.categoryField || '';
    var valField = cfg.valueField || '';
    var agg = cfg.aggregation || 'sum';

    if (!catField || !valField || !rows.length) {
      _dMissingConfig(container, 'BAR_VERTICAL');
      return;
    }

    var data = _dAggregateRows(rows, catField, valField, agg);
    _dDisposeDomCharts(container);
    var el = document.createElement('div');
    el.className = 'dash-block-chart';
    el.style.cssText = 'width:100%;height:300px';
    container.innerHTML = '';
    container.appendChild(el);

    var activeFilters = (display && display.filterContext && display.filterContext.activeFilters) || {};
    var activeVal = activeFilters.hasOwnProperty(catField) ? String(activeFilters[catField]) : null;
    var barData = data.map(function(d) {
      var color = (activeVal !== null)
        ? (String(d.category) === activeVal ? '#005EB8' : 'rgba(0,94,184,0.3)')
        : '#005EB8';
      return { value: d.value, itemStyle: { color: color } };
    });

    window.DWBVizTab.loadEcharts().then(function(ec) {
      var existing = ec.getInstanceByDom(el);
      if (existing) existing.dispose();
      var chart = ec.init(el);
      chart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: data.map(function(d) { return d.category; }), axisLabel: { rotate: 30, fontSize: 11 } },
        yAxis: { type: 'value' },
        series: [{ type: 'bar', data: barData }],
        grid: { left: 50, right: 20, bottom: 60, top: 20 }
      });
      setTimeout(function() { chart.resize(); }, 50);
      chart.on('click', function(params) {
        if (!display || !onFilterChange) return;
        if (!viz.linkToDisplayFilters || !(viz.filterableFields || []).length) return;
        if (!catField) return;
        var value = params.name || (params.data && params.data.name) || '';
        if (!value) return;
        display.filterContext = display.filterContext || { activeFilters: {} };
        display.filterContext.activeFilters = display.filterContext.activeFilters || {};
        if (display.filterContext.activeFilters[catField] === value) {
          delete display.filterContext.activeFilters[catField];
        } else {
          display.filterContext.activeFilters[catField] = value;
        }
        if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
        onFilterChange();
      });
    }).catch(function() { _dMissingConfig(container, 'BAR_VERTICAL (ECharts unavailable)'); });
  }

  // ── LINE renderer ─────────────────────────────────────────────────────────────
  function _dRenderLine(viz, rows, container, display, onFilterChange) {
    var cfg = viz.config || {};
    var xField = cfg.xField || '';
    var series = cfg.series || [];
    var agg = cfg.aggregation || 'sum';

    if (!xField || !series.length || !series.some(function(s) { return s.valueField; })) {
      _dMissingConfig(container, 'LINE');
      return;
    }

    // Collect unique x categories in row order
    var xCats = [];
    var xSeen = {};
    rows.forEach(function(row) {
      var x = row[xField] !== undefined ? String(row[xField]) : '(blank)';
      if (!xSeen[x]) { xSeen[x] = true; xCats.push(x); }
    });

    var echartsSeries = series.filter(function(s) { return s.valueField; }).map(function(s, idx) {
      var aggData = _dAggregateRows(rows, xField, s.valueField, agg);
      var catMap = {};
      aggData.forEach(function(d) { catMap[d.category] = d.value; });
      var yData = xCats.map(function(x) { return catMap[x] !== undefined ? catMap[x] : 0; });
      return {
        type: 'line',
        name: s.label || s.valueField,
        smooth: cfg.smoothed || false,
        data: yData,
        itemStyle: { color: s.color || _D_PALETTE[idx % _D_PALETTE.length] },
        yAxisIndex: cfg.dualYAxis ? (idx % 2) : 0
      };
    });

    var yAxisDef;
    if (cfg.dualYAxis) {
      yAxisDef = [
        { type: 'value', name: cfg.yLabel || '', nameTextStyle: { fontSize: 11 } },
        { type: 'value', name: cfg.y2Label || '', nameTextStyle: { fontSize: 11 } }
      ];
    } else {
      yAxisDef = { type: 'value', name: cfg.yLabel || '' };
    }

    _dDisposeDomCharts(container);
    var el = document.createElement('div');
    el.className = 'dash-block-chart';
    el.style.cssText = 'width:100%;height:300px';
    container.innerHTML = '';
    container.appendChild(el);

    window.DWBVizTab.loadEcharts().then(function(ec) {
      var existing = ec.getInstanceByDom(el);
      if (existing) existing.dispose();
      var chart = ec.init(el);
      chart.setOption({
        tooltip: { trigger: 'axis' },
        legend: echartsSeries.length > 1 ? { bottom: 0 } : { show: false },
        xAxis: { type: 'category', data: xCats, name: cfg.xLabel || '', nameTextStyle: { fontSize: 11 } },
        yAxis: yAxisDef,
        series: echartsSeries,
        grid: { top: 40, bottom: 40, left: 60, right: cfg.dualYAxis ? 60 : 20 }
      });
      setTimeout(function() { chart.resize(); }, 50);
      chart.on('click', function(params) {
        if (!display || !onFilterChange) return;
        if (!viz.linkToDisplayFilters || !(viz.filterableFields || []).length) return;
        if (!xField) return;
        var value = params.name || '';
        if (!value) return;
        display.filterContext = display.filterContext || { activeFilters: {} };
        display.filterContext.activeFilters = display.filterContext.activeFilters || {};
        if (display.filterContext.activeFilters[xField] === value) {
          delete display.filterContext.activeFilters[xField];
        } else {
          display.filterContext.activeFilters[xField] = value;
        }
        if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
        onFilterChange();
      });
    }).catch(function() { _dMissingConfig(container, 'LINE (ECharts unavailable)'); });
  }

  // ── PIE renderer ──────────────────────────────────────────────────────────────
  function _dRenderPie(viz, rows, container, display, onFilterChange) {
    var cfg = viz.config || {};
    var catField = cfg.categoryField || '';
    var agg = cfg.aggregation || 'sum';

    if (!catField) {
      _dMissingConfig(container, 'PIE');
      return;
    }

    var data;
    if (agg === 'count' || !cfg.valueField) {
      var countMap = {};
      rows.forEach(function(row) {
        var cat = row[catField] !== undefined ? String(row[catField]) : '(blank)';
        countMap[cat] = (countMap[cat] || 0) + 1;
      });
      data = Object.keys(countMap).map(function(cat) { return { name: cat, value: countMap[cat] }; });
    } else {
      data = _dAggregateRows(rows, catField, cfg.valueField, agg).map(function(d) { return { name: d.category, value: d.value }; });
    }

    var showLabels = cfg.showLabels !== false;
    var showLegend = cfg.showLegend !== false;

    var activeFilters = (display && display.filterContext && display.filterContext.activeFilters) || {};
    var activeVal = activeFilters.hasOwnProperty(catField) ? String(activeFilters[catField]) : null;
    if (activeVal !== null) {
      data = data.map(function(d) {
        return { name: d.name, value: d.value, selected: d.name === activeVal };
      });
    }

    _dDisposeDomCharts(container);
    var el = document.createElement('div');
    el.className = 'dash-block-chart';
    el.style.cssText = 'width:100%;height:300px';
    container.innerHTML = '';
    container.appendChild(el);

    window.DWBVizTab.loadEcharts().then(function(ec) {
      var existing = ec.getInstanceByDom(el);
      if (existing) existing.dispose();
      var chart = ec.init(el);
      chart.setOption({
        color: _D_PALETTE,
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { show: showLegend, orient: 'vertical', right: 10, type: 'scroll' },
        series: [{
          type: 'pie',
          radius: cfg.donut ? ['40%','70%'] : '70%',
          selectedMode: 'single',
          selectedOffset: 10,
          data: data,
          label: { show: showLabels, formatter: '{b}: {d}%' },
          emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } }
        }]
      });
      setTimeout(function() { chart.resize(); }, 50);
      chart.on('click', function(params) {
        if (!display || !onFilterChange) return;
        if (!viz.linkToDisplayFilters || !(viz.filterableFields || []).length) return;
        if (!catField) return;
        var value = params.name || '';
        if (!value) return;
        display.filterContext = display.filterContext || { activeFilters: {} };
        display.filterContext.activeFilters = display.filterContext.activeFilters || {};
        if (display.filterContext.activeFilters[catField] === value) {
          delete display.filterContext.activeFilters[catField];
        } else {
          display.filterContext.activeFilters[catField] = value;
        }
        if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();

      });
    }).catch(function() { _dMissingConfig(container, 'PIE (ECharts unavailable)'); });
  }

  // ── STACKED_DIVERGING_BAR (Likert) renderer ───────────────────────────────────
  function _dRenderStackedDivergingBar(viz, rows, container, display, onFilterChange) {
    var cfg = viz.config || {};
    var questionField = cfg.questionField || '';
    var responseField = cfg.responseField || '';

    if (!questionField || !responseField) {
      _dMissingConfig(container, 'STACKED_DIVERGING_BAR');
      return;
    }

    var scaleType = cfg.scaleType || '5point';
    var scaleLabels = (scaleType === 'custom') ? (cfg.scaleLabels || []) : (_LIKERT_SCALES[scaleType] || _LIKERT_SCALES['5point']);
    var scaleColors;
    if (scaleType === '7point') {
      scaleColors = _LIKERT_COLORS_7.slice();
    } else if (scaleType === 'custom') {
      var baseC = ['#1d4ed8','#3b82f6','#93c5fd','#94a3b8','#fdba74','#f97316','#c2410c'];
      scaleColors = baseC.slice(0, scaleLabels.length);
    } else {
      scaleColors = _LIKERT_COLORS_5.slice();
    }

    var n = scaleLabels.length;
    if (!n) { _dMissingConfig(container, 'STACKED_DIVERGING_BAR'); return; }

    var midIdx = Math.floor(n / 2);
    var hasNeutral = (n % 2 === 1);

    // Unique questions in first-occurrence order
    var questions = [];
    var qSeen = {};
    rows.forEach(function(row) {
      var q = row[questionField] !== undefined ? String(row[questionField]) : '';
      if (q && !qSeen[q]) { qSeen[q] = true; questions.push(q); }
    });
    if (!questions.length) { _dMissingConfig(container, 'STACKED_DIVERGING_BAR'); return; }

    // Count responses per question per scale label
    var counts = {};
    questions.forEach(function(q) {
      counts[q] = {};
      scaleLabels.forEach(function(l) { counts[q][l] = 0; });
    });

    rows.forEach(function(row) {
      var q = row[questionField] !== undefined ? String(row[questionField]) : '';
      var r = row[responseField] !== undefined ? String(row[responseField]) : '';
      if (!q || !counts[q]) return;
      var rLower = r.toLowerCase().trim();
      var matched = null;
      for (var li = 0; li < scaleLabels.length; li++) {
        if (scaleLabels[li].toLowerCase().trim() === rLower) { matched = scaleLabels[li]; break; }
      }
      if (matched) {
        var inc = 1;
        if (cfg.countField && row[cfg.countField] !== undefined) inc = parseInt(row[cfg.countField]) || 1;
        counts[q][matched] = (counts[q][matched] || 0) + inc;
      }
    });

    // Build diverging series following v1.0 stacking pattern:
    // [neutral-left(neg), ...negOrd(outermost-first, idx 0..midIdx-1), neutral-right(pos), ...posOrd(innermost-first, idx midIdx+1..n-1)]
    var neutralLabel = hasNeutral ? scaleLabels[midIdx] : '';
    var neutralColor = hasNeutral ? (scaleColors[midIdx] || '#94a3b8') : '';

    var series = [];

    if (hasNeutral) {
      series.push({
        type: 'bar', name: '__nl_' + neutralLabel, stack: 'likert',
        data: questions.map(function(q) { return -Math.floor((counts[q][neutralLabel] || 0) / 2); }),
        itemStyle: { color: neutralColor }, label: { show: false }
      });
    }

    // Negative series: outermost first = ascending index order (index 0 = most negative)
    for (var ni = 0; ni < midIdx; ni++) {
      (function(idx) {
        var lbl = scaleLabels[idx];
        series.push({
          type: 'bar', name: lbl, stack: 'likert',
          data: questions.map(function(q) { return -(counts[q][lbl] || 0); }),
          itemStyle: { color: scaleColors[idx] || '#94a3b8' },
          emphasis: { focus: 'series' }
        });
      })(ni);
    }

    if (hasNeutral) {
      series.push({
        type: 'bar', name: neutralLabel, stack: 'likert',
        data: questions.map(function(q) { return Math.ceil((counts[q][neutralLabel] || 0) / 2); }),
        itemStyle: { color: neutralColor }, emphasis: { focus: 'series' }
      });
    }

    // Positive series: innermost first = ascending index order (midIdx+1 = least positive)
    var posStart = midIdx + (hasNeutral ? 1 : 0);
    for (var pi = posStart; pi < n; pi++) {
      (function(idx) {
        var lbl = scaleLabels[idx];
        series.push({
          type: 'bar', name: lbl, stack: 'likert',
          data: questions.map(function(q) { return counts[q][lbl] || 0; }),
          itemStyle: { color: scaleColors[idx] || '#94a3b8' },
          emphasis: { focus: 'series' }
        });
      })(pi);
    }

    // Legend (skip __ ghost series, deduplicate)
    var legendData = [];
    var legendSeen = {};
    series.forEach(function(s) {
      if (!s.name.startsWith('__') && !legendSeen[s.name]) { legendSeen[s.name] = true; legendData.push(s.name); }
    });

    _dDisposeDomCharts(container);
    var el = document.createElement('div');
    el.className = 'dash-block-chart';
    el.style.cssText = 'width:100%;height:' + Math.max(200, questions.length * 40 + 80) + 'px';
    container.innerHTML = '';
    container.appendChild(el);

    window.DWBVizTab.loadEcharts().then(function(ec) {
      var existing = ec.getInstanceByDom(el);
      if (existing) existing.dispose();
      var chart = ec.init(el);
      chart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        legend: { data: legendData, bottom: 4, type: 'scroll' },
        grid: { top: 20, bottom: 40, left: 160, right: 20 },
        xAxis: {
          type: 'value',
          min: function(value) { return -Math.max(Math.abs(value.min), Math.abs(value.max)); },
          max: function(value) { return Math.max(Math.abs(value.min), Math.abs(value.max)); }
        },
        yAxis: { type: 'category', data: questions, inverse: true },
        series: series
      });
      setTimeout(function() { chart.resize(); }, 50);
      chart.on('click', function(params) {
        if (!display || !onFilterChange) return;
        if (!viz.linkToDisplayFilters || !(viz.filterableFields || []).length) return;
        var field = (viz.config || {}).questionField || '';
        if (!field) return;
        var value = params.name || '';
        if (!value || value.indexOf('__') === 0) return;
        display.filterContext = display.filterContext || { activeFilters: {} };
        display.filterContext.activeFilters = display.filterContext.activeFilters || {};
        if (display.filterContext.activeFilters[field] === value) {
          delete display.filterContext.activeFilters[field];
        } else {
          display.filterContext.activeFilters[field] = value;
        }
        if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
        onFilterChange();
      });
    }).catch(function() { _dMissingConfig(container, 'STACKED_DIVERGING_BAR (ECharts unavailable)'); });
  }

  // ── WORD_CLOUD renderer ───────────────────────────────────────────────────────
  function _dRenderWordCloud(viz, rows, container, display, onFilterChange) {
    var cfg = viz.config || {};
    var wordField = cfg.wordField || '';

    if (!wordField) {
      _dMissingConfig(container, 'WORD_CLOUD');
      return;
    }

    var maxWords = cfg.maxWords || 100;
    var wordMap = {};
    rows.forEach(function(row) {
      var word = row[wordField] !== undefined ? String(row[wordField]).trim() : '';
      if (!word) return;
      if (cfg.weightField && row[cfg.weightField] !== undefined) {
        wordMap[word] = (wordMap[word] || 0) + (parseFloat(row[cfg.weightField]) || 0);
      } else {
        wordMap[word] = (wordMap[word] || 0) + 1;
      }
    });

    var wordData = Object.keys(wordMap)
      .map(function(w) { return { name: w, value: wordMap[w] }; })
      .sort(function(a, b) { return b.value - a.value; })
      .slice(0, maxWords);

    if (!wordData.length) { _dMissingConfig(container, 'WORD_CLOUD'); return; }

    var colorMode = cfg.colorMode || 'palette';

                ? accentColor

            }
          }]
        });
        setTimeout(function() { chart.resize(); }, 50);
        chart.on('click', function(params) {
          if (!display || !onFilterChange) return;
          if (!viz.linkToDisplayFilters || !(viz.filterableFields || []).length) return;
          var field = (viz.config || {}).categoryField || (viz.config || {}).xField || '';
          if (!field) return;
          var value = params.name || (params.data && params.data.name) || '';
          if (!value) return;
          display.filterContext = display.filterContext || { activeFilters: {} };
          display.filterContext.activeFilters = display.filterContext.activeFilters || {};
          if (display.filterContext.activeFilters[field] === value) {
            delete display.filterContext.activeFilters[field];
          } else {
            display.filterContext.activeFilters[field] = value;
          }
          if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();

      }).catch(function() {
        container.innerHTML = '<div style="padding:20px;color:var(--danger);font-size:12px">⚠️ Word cloud library unavailable.</div>';
      });
    }).catch(function() { _dMissingConfig(container, 'WORD_CLOUD (ECharts unavailable)'); });

  // ── STAT_CARD renderer ─────────────────────────────────────────────────────────
  function _dComputeStatVar(variable, allRows, filteredRows) {
    var rows = variable.scope === 'unfiltered' ? allRows : filteredRows;
    if (variable.aggregation === 'count') return rows.length;
    if (!variable.field) return 0;
    var vals = rows.map(function(r) { return r[variable.field]; }).filter(function(v) { return v !== undefined && v !== null && v !== ''; });
    if (variable.aggregation === 'sum') {
      return vals.reduce(function(s, v) { return s + (parseFloat(v) || 0); }, 0);
    }
    if (variable.aggregation === 'average') {
      if (!vals.length) return 0;
      var sum = vals.reduce(function(s, v) { return s + (parseFloat(v) || 0); }, 0);
      return +(sum / vals.length).toFixed(2);
    }
    if (variable.aggregation === 'mode') {
      var freq = {};
      vals.forEach(function(v) { freq[v] = (freq[v] || 0) + 1; });
      var best = null, bestCount = -1;
      Object.keys(freq).forEach(function(k) {
        if (freq[k] > bestCount) { best = k; bestCount = freq[k]; }
      });
      return best;
    }
    return 0;
  }

  function _dRenderStatCardLine(text, varMap) {
    return text.replace(/\{\{(\w+)\}\}/g, function(match, name) {
      return varMap.hasOwnProperty(name) ? String(varMap[name]) : match;
    });
  }

  function _dRenderStatCard(contentEl, viz, allRows, filteredRows) {
    var cfg = viz.config || {};
    if (!(cfg.lines || []).length) {
      _dMissingConfig(contentEl, 'STAT_CARD');
      return;
    }
    contentEl.innerHTML = '<div class="dash-statcard"></div>';
    var cardEl = contentEl.querySelector('.dash-statcard');
    var varMap = {};
    (cfg.variables || []).forEach(function(v) {
      if (v.name) varMap[v.name] = _dComputeStatVar(v, allRows, filteredRows);
    });
    (cfg.lines || []).forEach(function(line) {
      var div = document.createElement('div');
      div.className = 'dash-statcard-line';
      div.style.fontSize = (line.fontSize || 16) + 'px';
      div.style.fontWeight = line.weight === 'bold' ? '700' : '400';
      div.style.textAlign = line.align || 'center';
      if (line.color) div.style.color = line.color;
      div.textContent = _dRenderStatCardLine(line.text || '', varMap);
      cardEl.appendChild(div);
    });
  }

  // ── QUOTES_BOARD renderer ──────────────────────────────────────────────────────
  function _dRenderQuotesBoard(contentEl, viz, rows) {
    var cfg = viz.config || {};
    if (!cfg.quoteField) { _dMissingConfig(contentEl, 'QUOTES_BOARD'); return; }
    var maxQuotes = (cfg.maxQuotes != null) ? Math.max(1, cfg.maxQuotes) : 12;
    var layout = cfg.layout || 'grid';
    var filtered = (rows || []).filter(function(row) {
      var val = row[cfg.quoteField];
      return val !== undefined && val !== null && String(val).trim() !== '';
    }).slice(0, maxQuotes);
    var cardsHtml = filtered.map(function(row) {
      var text = String(row[cfg.quoteField]);
      var attribution = (cfg.attributionField && row[cfg.attributionField] != null)
        ? String(row[cfg.attributionField]).trim() : '';
      var sentiment = '';
      if (cfg.sentimentField && row[cfg.sentimentField] != null) {
        var s = String(row[cfg.sentimentField]).toLowerCase().trim();
        if (s === 'positive' || s === 'neutral' || s === 'negative') sentiment = s;
      }
      return '<div class="dash-quote-card' + (sentiment ? ' dash-quote-' + sentiment : '') + '">' +
        '<div class="dash-quote-text">“' + _dEsc(text) + '”</div>' +
        (attribution ? '<div class="dash-quote-attribution">— ' + _dEsc(attribution) + '</div>' : '') +
        '</div>';
    }).join('');
    contentEl.innerHTML = '<div class="dash-quotes-board' + (layout === 'list' ? ' layout-list' : '') + '">' + cardsHtml + '</div>';
  }

  // ── RICH_TEXT renderer ─────────────────────────────────────────────────────────

  // ── AI_ASSIST renderer ─────────────────────────────────────────────────────────
  function _dBuildAiPrompt(viz, rows) {
    var cfg = viz.config || {};
    var maxRows = cfg.maxRows || 50;
    var fields = (cfg.includeFields && cfg.includeFields.length)
      ? cfg.includeFields
      : (rows[0] ? Object.keys(rows[0]) : []);
    var sample = rows.slice(0, maxRows).map(function(row) {
      var obj = {};
      fields.forEach(function(f) { obj[f] = row[f]; });
      return obj;
    });
    var template = cfg.promptTemplate || 'Analyze the following data and provide insights:\n\n{{data}}';
    return template.replace('{{data}}', JSON.stringify(sample, null, 2));
  }

  function _dRenderAiAssist(contentEl, viz, rows) {
    var existing = (viz.config && viz.config.response) ? viz.config.response : '';
    contentEl.innerHTML =
      '<div class="dash-ai-assist">' +
        '<div class="dash-ai-controls">' +
          '<button class="dash-ai-copy-btn">📋 Copy Prompt</button>' +
          '<span class="dash-ai-copy-status"></span>' +
        '</div>' +
        '<div class="dash-ai-response-label">Response (paste here):</div>' +
        '<textarea class="dash-ai-response" placeholder="Paste the AI response here...">' + _dEsc(existing) + '</textarea>' +
      '</div>';
    var copyBtn = contentEl.querySelector('.dash-ai-copy-btn');
    var statusEl = contentEl.querySelector('.dash-ai-copy-status');
    var respEl = contentEl.querySelector('.dash-ai-response');
    copyBtn.addEventListener('click', function() {

      try {
        navigator.clipboard.writeText(prompt).then(function() {

          setTimeout(function() { statusEl.textContent = ''; }, 2000);
        }).catch(function() {

    respEl.addEventListener('blur', function() {

      if (window.DWBShell && window.DWBShell.markDirty) window.DWBShell.markDirty();
    });
  }

  // ── DATA_TABLE renderer ────────────────────────────────────────────────────────
  function _dRenderDataTable(body, viz, rows) {
    var cfg = viz.config || {};
    var selectedCols = (cfg.selectedColumns && cfg.selectedColumns.length) ? cfg.selectedColumns : null;
    var maxRows = cfg.maxRows || 200;
    var showRowNums = cfg.showRowNumbers === true;
    var enableSearch = cfg.enableSearch === true;

    if (!rows.length) {
      body.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:12px">No data available.</div>';
      return;
    }

    var allCols = Object.keys(rows[0]);
    var cols = selectedCols ? selectedCols.filter(function(c) { return allCols.indexOf(c) !== -1; }) : allCols;
    var allIndices = rows.map(function(_, i) { return i; });

    var wrap = document.createElement('div');
    var searchInput = null;

    if (enableSearch) {
      searchInput = document.createElement('input');
      searchInput.type = 'text';
      searchInput.className = 'dash-table-search';
      searchInput.placeholder = 'Search…';
      wrap.appendChild(searchInput);
    }

    var tableWrap = document.createElement('div');
    tableWrap.style.cssText = 'overflow:auto;max-height:360px';
    wrap.appendChild(tableWrap);

    function renderTable(indices) {
      var limit = Math.min(indices.length, maxRows);
      var html = '<table class="dwb-data-table"><thead><tr>';
      if (showRowNums) html += '<th style="color:var(--text-faint);font-weight:normal;width:40px">#</th>';
      html += cols.map(function(c) { return '<th>' + _dEsc(c) + '</th>'; }).join('') + '</tr></thead><tbody>';
      for (var i = 0; i < limit; i++) {
        var ri = indices[i];
        html += '<tr>';
        if (showRowNums) html += '<td class="row-num-cell">' + (ri + 1) + '</td>';
        html += cols.map(function(c) {
          var v = String(rows[ri][c] !== undefined ? rows[ri][c] : '');
          return '<td>' + _dEsc(v.length > 60 ? v.slice(0, 60) + '…' : v) + '</td>';
        }).join('') + '</tr>';
      }
      html += '</tbody></table>';
      if (indices.length > limit) {
        html += '<div style="padding:6px 8px;font-size:11px;color:var(--text-muted)">Showing ' + limit + ' of ' + indices.length + ' rows</div>';
      }
      tableWrap.innerHTML = html;
    }

    renderTable(allIndices);

    if (searchInput) {
      searchInput.addEventListener('input', function() {
        var term = this.value.toLowerCase();
        if (!term) { renderTable(allIndices); return; }
        var filtered = allIndices.filter(function(ri) {
          return cols.some(function(c) {
            return String(rows[ri][c] !== undefined ? rows[ri][c] : '').toLowerCase().indexOf(term) !== -1;
          });
        });
        renderTable(filtered);
      });
    }

    body.innerHTML = '';
    body.appendChild(wrap);
  }

  function _dGetEChartsSource() {
    return fetch('https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js')
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .catch(function() {
        for (var i = 0; i < document.scripts.length; i++) {
          var s = document.scripts[i];
          if (s.src && s.src.indexOf('echarts') !== -1 && s.src.indexOf('wordcloud') === -1) {
            return fetch(s.src).then(function(r2) { if (!r2.ok) throw new Error('HTTP ' + r2.status); return r2.text(); });
          }
        }
        throw new Error('no-source');
      });
  }

  function _dBuildExportRuntime() {

  var LIKERT_7 = ['Strongly Disagree','Disagree','Somewhat Disagree','Neutral','Somewhat Agree','Agree','Strongly Agree'];
  var LCOLORS_5 = ['#1d4ed8','#3b82f6','#94a3b8','#f97316','#c2410c'];
  var LCOLORS_7 = ['#1d4ed8','#3b82f6','#93c5fd','#94a3b8','#fdba74','#f97316','#c2410c'];

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function getFilteredRows(viz) {
    var rows = snaps[viz.snapshotName] || [];

    var keys = Object.keys(activeFilters);
    if (!keys.length) return rows;
    return rows.filter(function(row) {
      return keys.every(function(k) {
        var fv = activeFilters[k];
        if (Array.isArray(fv)) { return fv.length === 0 || fv.indexOf(String(row[k]!==undefined?row[k]:'')) !== -1; }
        return String(row[k]!==undefined?row[k]:'')===String(fv);
      });
    });
  }

  function getWidgetFields() {
    var fields = [];
    (display.placements||[]).forEach(function(p) {
      var viz=vizList.find(function(v){return v.id===p.vizId;});

    });

  }

  function getWidgetPlacements() {
    return (display.placements||[]).filter(function(p) {
      var viz=vizList.find(function(v){return v.id===p.vizId;});
      return viz && viz.type==='FILTER_WIDGET' && viz.config && viz.config.field;

  }

  function getFilterableFields() {

  function getUniqueValues(field) {

      chip.addEventListener('click', (function(f,arr){return function(){

          document.addEventListener('click',function closer(e){
            if(!wrapper.contains(e.target)){if(wrapper.contains(dd))wrapper.removeChild(dd);document.removeEventListener('click',closer);}

      }
      chip.addEventListener('click', (function(f, av) { return function() {
        var existing = wrapper.querySelector('.export-chip-dropdown');
        if (existing) { wrapper.removeChild(existing); return; }

        dd.appendChild(allBtn);

          document.addEventListener('click', function closer(e) {
            if (!wrapper.contains(e.target)) { if (wrapper.contains(dd)) wrapper.removeChild(dd); document.removeEventListener('click', closer); }
          });
        }, 10);
      }; })(field, activeVal));
      wrapper.appendChild(chip);

    });

  function aggregateRows(rows, catField, valField, agg) {
    var g = {}, c = {};
    (rows||[]).forEach(function(row) {
      var cat = row[catField]!==undefined ? String(row[catField]) : '(blank)';
      var val = parseFloat(row[valField]) || 0;
      if (!g[cat]) { g[cat]=0; c[cat]=0; }
      g[cat]+=val; c[cat]++;
    });
    return Object.keys(g).map(function(cat) {
      var v = agg==='count' ? c[cat] : agg==='average' ? (c[cat] ? +(g[cat]/c[cat]).toFixed(2) : 0) : g[cat];
      return { category: cat, value: v };
    });
  }

  function renderLine(viz, rows, container) {

    rows.forEach(function(row){ var q=row[qF]!==undefined?String(row[qF]):''; if(q&&!qSeen[q]){qSeen[q]=true;questions.push(q);} });

    rows.forEach(function(row){
      var q=row[qF]!==undefined?String(row[qF]):''; var r=row[rF]!==undefined?String(row[rF]):'';
      if(!q||!counts[q]) return;
