/* === DWBNodes.FUZZY_STANDARDIZE: map variants to canonical values === */
window.DWBNodes = window.DWBNodes || {};

window.DWBNodes.FUZZY_STANDARDIZE = {
  label: 'Fuzzy Standardize',
  icon: '🔤',
  category: 'Validation',
  defaultConfig: { column: '', mappings: [], threshold: 80, outputColumn: '', addScoreColumn: false },

  run: function(rows, config) {
    if (!config.column) return rows;
    const mappings = config.mappings || [];
    if (mappings.length === 0) return rows;
    const outCol = (config.outputColumn || '').trim() || config.column;
    const threshold = config.threshold !== undefined ? config.threshold : 80;

    return rows.map(function(row) {
      const nr = Object.assign({}, row);
      const val = String(row[config.column] !== undefined ? row[config.column] : '').toLowerCase().trim();
      let bestScore = 0;
      let bestCanonical = row[config.column];

      mappings.forEach(function(mapping) {
        const canonical = mapping.canonical || '';
        const variants = (mapping.variants || []);
        // Check exact match first
        if (val === canonical.toLowerCase()) { bestScore = 100; bestCanonical = canonical; return; }
        variants.forEach(function(variant) {
          if (val === variant.toLowerCase().trim()) { bestScore = 100; bestCanonical = canonical; return; }
          const score = _fsLevenshteinSim(val, variant.toLowerCase().trim());
          if (score > bestScore) { bestScore = score; bestCanonical = canonical; }
        });
        // Also check canonical itself with fuzzy
        const cScore = _fsLevenshteinSim(val, canonical.toLowerCase());
        if (cScore > bestScore) { bestScore = cScore; bestCanonical = canonical; }
      });

      nr[outCol] = bestScore >= threshold ? bestCanonical : row[config.column];
      if (config.addScoreColumn) nr[outCol + '_score'] = bestScore;
      return nr;
    });
  },

  validate: function(config) {
    if (!config.column) return 'Select a column';
    if (!config.mappings || config.mappings.length === 0) return 'Add at least one mapping';
    return null;
  },

  configUI: function(config, onChange, currentRows) {
    const div = document.createElement('div');
    const cols = currentRows && currentRows.length ? Object.keys(currentRows[0]) : [];
    const mappings = config.mappings || [];

    function renderMappings() {
      const container = div.querySelector('#fs-mappings');
      if (!container) return;
      if (mappings.length === 0) {
        container.innerHTML = '<div style="color:var(--text-faint);font-size:11px;padding:6px 0">No mappings yet.</div>';
        return;
      }
      container.innerHTML = mappings.map(function(m, idx) {
        return `<div style="border:1px solid var(--border);border-radius:4px;padding:8px;margin-bottom:6px;font-size:11px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <strong style="flex:1">Canonical:</strong>
            <input type="text" class="fs-canonical" data-idx="${idx}" value="${_fsEsc(m.canonical||'')}" placeholder="Standard value" style="flex:2;padding:2px 6px;font-size:11px">
            <button class="fs-del-mapping" data-idx="${idx}" style="padding:1px 6px;font-size:11px;background:none;border:1px solid var(--border);border-radius:3px;color:var(--danger)">✕</button>
          </div>
          <div><label style="font-size:10px;color:var(--text-muted)">Variants (one per line):</label></div>
          <textarea class="fs-variants" data-idx="${idx}" style="width:100%;height:60px;font-size:11px;resize:vertical" placeholder="variant1&#10;variant2">${_fsEsc((m.variants||[]).join('\n'))}</textarea>
        </div>`;
      }).join('');

      container.querySelectorAll('.fs-canonical').forEach(function(inp) {
        inp.addEventListener('input', function() {
          mappings[parseInt(inp.dataset.idx,10)].canonical = inp.value;
          onChange('mappings', mappings.slice());
        });
      });
      container.querySelectorAll('.fs-variants').forEach(function(ta) {
        ta.addEventListener('input', function() {
          mappings[parseInt(ta.dataset.idx,10)].variants = ta.value.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
          onChange('mappings', mappings.slice());
        });
      });
      container.querySelectorAll('.fs-del-mapping').forEach(function(btn) {
        btn.addEventListener('click', function() {
          mappings.splice(parseInt(btn.dataset.idx,10), 1);
          onChange('mappings', mappings.slice());
          renderMappings();
        });
      });
    }

    div.innerHTML = `
      <div class="form-row"><label>Column</label>
        <select id="fs-col" style="width:100%"><option value="">-- select --</option>
        ${cols.map(function(c) { return '<option value="' + _fsEsc(c) + '"' + (config.column === c ? ' selected' : '') + '>' + _fsEsc(c) + '</option>'; }).join('')}
        </select></div>
      <div class="form-row"><label>Output column (blank = overwrite)</label>
        <input type="text" id="fs-out" value="${_fsEsc(config.outputColumn||'')}" style="width:100%"></div>
      <div class="form-row"><label>Match threshold (0–100)</label>
        <input type="number" id="fs-thresh" value="${config.threshold !== undefined ? config.threshold : 80}" min="0" max="100" style="width:100%"></div>
      <div class="form-row-inline form-row"><label><input type="checkbox" id="fs-score" ${config.addScoreColumn ? 'checked' : ''}> Add score column</label></div>
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin:8px 0 4px">Mappings</div>
      <div id="fs-mappings"></div>
      <button id="fs-add-mapping" style="padding:4px 10px;font-size:11px;background:var(--bg-raised);border:1px solid var(--border);border-radius:4px;color:var(--text-main);cursor:pointer">＋ Add Mapping</button>`;

    div.querySelector('#fs-col').addEventListener('change', function(e) { onChange('column', e.target.value); });
    div.querySelector('#fs-out').addEventListener('input', function(e) { onChange('outputColumn', e.target.value); });
    div.querySelector('#fs-thresh').addEventListener('input', function(e) { onChange('threshold', parseInt(e.target.value,10)||80); });
    div.querySelector('#fs-score').addEventListener('change', function(e) { onChange('addScoreColumn', e.target.checked); });
    div.querySelector('#fs-add-mapping').addEventListener('click', function() {
      mappings.push({ canonical: '', variants: [] });
      onChange('mappings', mappings.slice());
      renderMappings();
    });

    renderMappings();
    return div;
  }
};

function _fsLevenshteinSim(a, b) {
  if (a === b) return 100;
  const m = a.length, n = b.length;
  if (m === 0 || n === 0) return 0;
  const dp = [];
  for (let i = 0; i <= m; i++) { dp[i] = [i]; }
  for (let j = 0; j <= n; j++) { dp[0][j] = j; }
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  const dist = dp[m][n];
  return Math.round((1 - dist / Math.max(m, n)) * 100);
}

function _fsEsc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.DWBNodes = window.DWBNodes || {};

/* ── Shared helpers (_lr prefix) ── */

function _lrEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function _lrCols(currentRows) {
  return (currentRows && currentRows.length) ? Object.keys(currentRows[0]) : [];
}

function _lrColOptHtml(cols, selected) {
  return cols.length
    ? '<option value="">-- select --</option>' + cols.map(function(c) {
        return '<option value="' + _lrEsc(c) + '"' + (selected === c ? ' selected' : '') + '>' + _lrEsc(c) + '</option>';
      }).join('')
    : '<option value="" disabled selected>Run pipeline to see columns</option>';
}

/* Bigram similarity: returns 0–1 */
function _lrBigramSim(a, b) {
  a = String(a || '').toLowerCase().trim();
  b = String(b || '').toLowerCase().trim();
  if (a === b) return 1;
  if (a.length < 2 || b.length < 2) return 0;
  var biA = [];
  for (var i = 0; i < a.length - 1; i++) biA.push(a.slice(i, i + 2));
  var biB = {};
  for (var j = 0; j < b.length - 1; j++) biB[b.slice(j, j + 2)] = 1;
  var matches = 0;
  biA.forEach(function(bi) { if (biB[bi]) matches++; });
  return (2 * matches) / (biA.length + Object.keys(biB).length);
}

function _lrSnapshotNames() {
  var st = window.DWBState;
  return (st && st.snapshots) ? Object.keys(st.snapshots) : [];
}

function _lrSnapshotRows(name) {
  var st = window.DWBState;
  return (st && st.snapshots && st.snapshots[name]) ? st.snapshots[name] : null;
}

function _lrSnapshotCols(name) {
  var rows = _lrSnapshotRows(name);
  return (rows && rows.length) ? Object.keys(rows[0]) : [];
}

function _lrSnapOptHtml(names, selected) {
  if (!names.length) return '<option value="" disabled selected>No snapshots — add Push to Viz first</option>';
  return '<option value="">-- select --</option>' + names.map(function(n) {
    return '<option value="' + _lrEsc(n) + '"' + (selected === n ? ' selected' : '') + '>' + _lrEsc(n) + '</option>';
  }).join('');
}

window.DWBNodes.IF_THEN_ELSE = {
  label: 'If / Then / Else',
  icon: '🔀',
  category: 'Logic & Reconcile',
  defaultConfig: {
    conditionColumn: '',
    operator: 'equals',
    compareValue: '',
    thenValue: '',
    elseValue: '',
    outputColumn: 'result'
  },

  run: function(rows, config) {
    var col    = config.conditionColumn;
    var outCol = (config.outputColumn || 'result').trim() || 'result';
    var op     = config.operator || 'equals';
    var cmpVal = String(config.compareValue != null ? config.compareValue : '');
    var thenVal = String(config.thenValue != null ? config.thenValue : '');
    var elseVal = String(config.elseValue != null ? config.elseValue : '');

    function _test(cell) {
      if (op === 'is_empty')     return cell.trim() === '';
      if (op === 'is_not_empty') return cell.trim() !== '';
      if (op === 'greater_than') {
        var cn = parseFloat(cell), vn = parseFloat(cmpVal);
        return (!isNaN(cn) && !isNaN(vn)) ? cn > vn : cell > cmpVal;
      }
      if (op === 'less_than') {
        var cn2 = parseFloat(cell), vn2 = parseFloat(cmpVal);
        return (!isNaN(cn2) && !isNaN(vn2)) ? cn2 < vn2 : cell < cmpVal;
      }
      if (op === 'equals')     return cell === cmpVal;
      if (op === 'not_equals') return cell !== cmpVal;
      if (op === 'contains')   return cell.indexOf(cmpVal) !== -1;
      return false;
    }

    return rows.map(function(row) {
      var nr   = Object.assign({}, row);
      var cell = String(row[col] != null ? row[col] : '');
      nr[outCol] = _test(cell) ? thenVal : elseVal;
      return nr;
    });
  },

  validate: function(config) {
    if (!config.conditionColumn) return 'Select a condition column';
    if (!(config.outputColumn || '').trim()) return 'Enter an output column name';
    return null;
  },

  configUI: function(config, onChange, currentRows) {
    var div  = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;gap:8px';
    var cols = _lrCols(currentRows);
    var NO_VAL = { is_empty: 1, is_not_empty: 1 };
    var OPERATORS = [
      ['equals','equals'], ['not_equals','not equals'], ['contains','contains'],
      ['greater_than','greater than'], ['less_than','less than'],
      ['is_empty','is empty'], ['is_not_empty','is not empty']
    ];
    var curOp = config.operator || 'equals';

    div.innerHTML =
      '<div class="form-row"><label>Condition Column</label>' +
        '<select id="lr-ite-col" style="width:100%">' + _lrColOptHtml(cols, config.conditionColumn) + '</select></div>' +
      '<div class="form-row"><label>Operator</label>' +
        '<select id="lr-ite-op" style="width:100%">' +
          OPERATORS.map(function(p) {
            return '<option value="' + p[0] + '"' + (curOp === p[0] ? ' selected' : '') + '>' + p[1] + '</option>';
          }).join('') +
        '</select></div>' +
      '<div class="form-row" id="lr-ite-cmprow"' + (NO_VAL[curOp] ? ' style="display:none"' : '') + '>' +
        '<label>Compare Value</label>' +
        '<input type="text" id="lr-ite-cmp" value="' + _lrEsc(config.compareValue || '') + '" style="width:100%"></div>' +
      '<div class="form-row"><label>Then (if true)</label>' +
        '<input type="text" id="lr-ite-then" value="' + _lrEsc(config.thenValue || '') + '" style="width:100%"></div>' +
      '<div class="form-row"><label>Else (if false)</label>' +
        '<input type="text" id="lr-ite-else" value="' + _lrEsc(config.elseValue || '') + '" style="width:100%"></div>' +
      '<div class="form-row"><label>Output Column Name</label>' +
        '<input type="text" id="lr-ite-out" value="' + _lrEsc(config.outputColumn || 'result') + '" style="width:100%"></div>';

    div.querySelector('#lr-ite-col').addEventListener('change', function(e) { onChange('conditionColumn', e.target.value); });
    div.querySelector('#lr-ite-op').addEventListener('change', function(e) {
      onChange('operator', e.target.value);
      var row = div.querySelector('#lr-ite-cmprow');
      if (row) row.style.display = NO_VAL[e.target.value] ? 'none' : '';
    });
    div.querySelector('#lr-ite-cmp').addEventListener('input', function(e) { onChange('compareValue', e.target.value); });
    div.querySelector('#lr-ite-then').addEventListener('input', function(e) { onChange('thenValue', e.target.value); });
    div.querySelector('#lr-ite-else').addEventListener('input', function(e) { onChange('elseValue', e.target.value); });
    div.querySelector('#lr-ite-out').addEventListener('input', function(e) { onChange('outputColumn', e.target.value); });

    return div;
  }
};

/* ── FUZZY_MATCH ── */

window.DWBNodes.FUZZY_MATCH = {
  label: 'Fuzzy Match',
  icon: '🔍',
  category: 'Logic & Reconcile',
  defaultConfig: { sourceColumn: '', referenceColumn: '', threshold: 0.7, matches: [] },

  run: function(rows, config) {
    var matches = config.matches || [];
    if (!config.sourceColumn || !matches.length) return rows;
    var matchMap = {};
    matches.forEach(function(m) { matchMap[m.sourceValue] = m.matchedValue; });
    var outCol = config.sourceColumn + '_matched';
    return rows.map(function(row) {
      var nr     = Object.assign({}, row);
      var srcVal = String(row[config.sourceColumn] != null ? row[config.sourceColumn] : '');
      nr[outCol] = matchMap.hasOwnProperty(srcVal) ? matchMap[srcVal] : '';
      return nr;
    });
  },

  validate: function(config) {
    if (!config.sourceColumn)    return 'Select a source column';
    if (!config.referenceColumn) return 'Select a reference column';
    return null;
  },

  configUI: function(config, onChange, currentRows) {
    var div  = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;gap:8px';
    var cols = _lrCols(currentRows);
    var thresh = config.threshold !== undefined ? config.threshold : 0.7;

    div.innerHTML =
      '<div class="form-row"><label>Source Column</label>' +
        '<select id="lr-fm-src" style="width:100%">' + _lrColOptHtml(cols, config.sourceColumn) + '</select></div>' +
      '<div class="form-row"><label>Reference Column</label>' +
        '<select id="lr-fm-ref" style="width:100%">' + _lrColOptHtml(cols, config.referenceColumn) + '</select></div>' +
      '<div class="form-row"><label>Match Threshold: <span id="lr-fm-tval">' + Math.round(thresh * 100) + '%</span></label>' +
        '<input type="range" id="lr-fm-thresh" min="0" max="100" value="' + Math.round(thresh * 100) + '" style="width:100%"></div>' +
      '<button id="lr-fm-run-btn" style="padding:7px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit">🔍 Run Matching</button>' +
      '<div id="lr-fm-prog" style="display:none;flex-direction:column;gap:4px">' +
        '<div style="height:6px;border-radius:3px;background:var(--bg-raised);overflow:hidden">' +
          '<div id="lr-fm-pbar" style="height:100%;width:0%;background:var(--accent);border-radius:3px;transition:width 0.2s"></div></div>' +
        '<div id="lr-fm-ptxt" style="font-size:11px;color:var(--text-muted)">Running…</div></div>' +
      '<div id="lr-fm-cards"></div>';

    if (config.matches && config.matches.length) {
      _lrFmRenderCards(div, config, onChange, currentRows);
    }

    div.querySelector('#lr-fm-src').addEventListener('change', function(e) {
      onChange('sourceColumn', e.target.value);
      onChange('matches', []);
      config.matches = [];
      div.querySelector('#lr-fm-cards').innerHTML = '';
    });
    div.querySelector('#lr-fm-ref').addEventListener('change', function(e) {
      onChange('referenceColumn', e.target.value);
      onChange('matches', []);
      config.matches = [];
      div.querySelector('#lr-fm-cards').innerHTML = '';
    });
    div.querySelector('#lr-fm-thresh').addEventListener('input', function(e) {
      var pct = parseInt(e.target.value, 10);
      var sp = div.querySelector('#lr-fm-tval');
      if (sp) sp.textContent = pct + '%';
      onChange('threshold', pct / 100);
      config.threshold = pct / 100;
    });

    div.querySelector('#lr-fm-run-btn').addEventListener('click', function() {
      var srcCol = config.sourceColumn;
      var refCol = config.referenceColumn;
      if (!srcCol || !refCol || !currentRows || !currentRows.length) return;
      var threshold = config.threshold !== undefined ? config.threshold : 0.7;

      var srcMap = {}, refMap = {};
      currentRows.forEach(function(row) {
        var sv = row[srcCol]; if (sv != null && sv !== '') srcMap[String(sv)] = 1;
        var rv = row[refCol]; if (rv != null && rv !== '') refMap[String(rv)] = 1;
      });
      var srcValues = Object.keys(srcMap);
      var refValues = Object.keys(refMap);
      if (!srcValues.length || !refValues.length) return;

      var progDiv = div.querySelector('#lr-fm-prog');
      var pbar    = div.querySelector('#lr-fm-pbar');
      var ptxt    = div.querySelector('#lr-fm-ptxt');
      var runBtn  = div.querySelector('#lr-fm-run-btn');
      progDiv.style.display = 'flex';
      runBtn.style.display  = 'none';

      var results = [];
      var idx     = 0;
      var CHUNK   = 50;

      function _chunk() {
        var end = Math.min(idx + CHUNK, srcValues.length);
        for (var i = idx; i < end; i++) {
          var sv = srcValues[i];
          var bestScore = -1, bestRef = '';
          refValues.forEach(function(rv) {
            var s = _lrBigramSim(sv, rv);
            if (s > bestScore) { bestScore = s; bestRef = rv; }
          });
          results.push({
            sourceValue: sv,
            matchedValue: bestScore >= threshold ? bestRef : '',
            confidence: bestScore
          });
        }
        idx = end;
        var pct = Math.round(idx / srcValues.length * 100);
        pbar.style.width = pct + '%';
        ptxt.textContent = 'Processed ' + idx + ' / ' + srcValues.length + ' values…';
        if (idx < srcValues.length) {
          setTimeout(_chunk, 0);
        } else {
          onChange('matches', results);
          config.matches = results;
          progDiv.style.display = 'none';
          runBtn.style.display  = '';
          _lrFmRenderCards(div, config, onChange, currentRows);
        }
      }

      setTimeout(_chunk, 0);
    });

    return div;
  }
};

function _lrFmRenderCards(div, config, onChange, currentRows) {
  var cardsDiv = div.querySelector('#lr-fm-cards');
  if (!cardsDiv) return;
  var matches  = config.matches || [];
  if (!matches.length) { cardsDiv.innerHTML = ''; return; }

  var refMap = {};
  if (currentRows && currentRows.length && config.referenceColumn) {
    currentRows.forEach(function(row) {
      var v = row[config.referenceColumn];
      if (v != null) refMap[String(v)] = 1;
    });
  }
  var refValues = Object.keys(refMap).sort();

  var html = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-faint);margin-bottom:6px">' +
    matches.length + ' unique values</div>' +
    '<div style="display:flex;flex-direction:column;gap:4px">' +
    matches.map(function(m, idx) {
      var pct        = Math.round(m.confidence * 100);
      var badgeColor = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
      var refOpts    = '<option value="">— no match —</option>' + refValues.map(function(rv) {
        return '<option value="' + _lrEsc(rv) + '"' + (m.matchedValue === rv ? ' selected' : '') + '>' + _lrEsc(rv) + '</option>';
      }).join('');

window.DWBNodes.DATA_VALIDATION = {
  label: 'Data Validation',
  icon: '✅',
  category: 'Logic & Reconcile',
  defaultConfig: {
    rules: [{ column: '', type: 'not_empty', param: '' }],
    outputColumn: 'validation_status'
  },

  run: function(rows, config) {
    var rules  = config.rules || [];
    var outCol = (config.outputColumn || 'validation_status').trim() || 'validation_status';

    function _evalRule(rule, row) {
      var cell  = String(row[rule.column] != null ? row[rule.column] : '');
      var param = String(rule.param || '');
      switch (rule.type) {
        case 'not_empty':
          return cell.trim() !== '' ? null : 'Column "' + rule.column + '" must not be empty';
        case 'is_number':
          return (!isNaN(parseFloat(cell)) && isFinite(cell)) ? null : 'Column "' + rule.column + '" must be a number';
        case 'is_email':
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(cell) ? null : 'Column "' + rule.column + '" must be a valid email';
        case 'min_length': {
          var min = parseInt(param, 10) || 0;
          return cell.length >= min ? null : 'Column "' + rule.column + '" must be at least ' + min + ' chars';
        }
        case 'max_length': {
          var max = parseInt(param, 10) || 0;
          return (max <= 0 || cell.length <= max) ? null : 'Column "' + rule.column + '" must be at most ' + max + ' chars';
        }
        case 'matches_pattern': {
          try { return new RegExp(param).test(cell) ? null : 'Column "' + rule.column + '" must match pattern: ' + param; }
          catch (e) { return null; }
        }
        default: return null;
      }
    }

    return rows.map(function(row) {
      var nr = Object.assign({}, row);
      var firstErr = null;
      for (var i = 0; i < rules.length; i++) {
        if (!rules[i].column) continue;
        var err = _evalRule(rules[i], row);
        if (err) { firstErr = err; break; }
      }
      nr[outCol] = firstErr ? 'invalid: ' + firstErr : 'valid';
      return nr;
    });
  },

  validate: function(config) {
    if (!config.rules || !config.rules.length) return 'Add at least one rule';
    if (!(config.outputColumn || '').trim()) return 'Enter an output column name';
    return null;
  },

  configUI: function(config, onChange, currentRows) {
    var div  = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;gap:8px';
    var cols  = _lrCols(currentRows);
    var rules = (config.rules || []);

    var RULE_TYPES = [
      ['not_empty','Not empty'], ['is_number','Is number'], ['is_email','Is email'],
      ['min_length','Min length'], ['max_length','Max length'], ['matches_pattern','Matches pattern']
    ];
    var NEEDS_PARAM = { min_length: 1, max_length: 1, matches_pattern: 1 };

    function _ruleTypeOpts(sel) {
      return RULE_TYPES.map(function(p) {
        return '<option value="' + p[0] + '"' + (sel === p[0] ? ' selected' : '') + '>' + p[1] + '</option>';
      }).join('');
    }

    function renderRules() {
      var wrap = div.querySelector('#lr-dv-rules');
      if (!wrap) return;
      if (!rules.length) {
        wrap.innerHTML = '<div style="font-size:11px;color:var(--text-faint);padding:6px">No rules yet.</div>';
        return;
      }
      wrap.innerHTML = rules.map(function(r, i) {
        var np = NEEDS_PARAM[r.type];
        return '<div style="display:grid;grid-template-columns:1fr 1fr ' + (np ? '1fr ' : '') + 'auto;gap:4px;align-items:center;padding:5px 6px;border-bottom:1px solid var(--border)">' +
          '<select class="lr-dv-col" data-idx="' + i + '" style="font-size:12px">' + _lrColOptHtml(cols, r.column) + '</select>' +
          '<select class="lr-dv-type" data-idx="' + i + '" style="font-size:12px">' + _ruleTypeOpts(r.type) + '</select>' +
          (np ? '<input type="text" class="lr-dv-param" data-idx="' + i + '" value="' + _lrEsc(r.param || '') + '" placeholder="' + (r.type === 'matches_pattern' ? 'regex' : 'number') + '" style="font-size:12px">' : '') +
          '<button class="lr-dv-rm" data-idx="' + i + '" style="padding:1px 6px;background:none;border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:11px;color:var(--danger)">✕</button>' +
        '</div>';
      }).join('');

      wrap.querySelectorAll('.lr-dv-col').forEach(function(sel) {
        sel.addEventListener('change', function() {
          rules[parseInt(sel.dataset.idx, 10)].column = sel.value;
          onChange('rules', rules.slice());
        });
      });
      wrap.querySelectorAll('.lr-dv-type').forEach(function(sel) {
        sel.addEventListener('change', function() {
          rules[parseInt(sel.dataset.idx, 10)].type = sel.value;
          onChange('rules', rules.slice());
          renderRules();
        });
      });
      wrap.querySelectorAll('.lr-dv-param').forEach(function(inp) {
        inp.addEventListener('input', function() {

        });

      '<button id="lr-dv-add" style="padding:4px 10px;background:none;border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit">＋ Add Rule</button>' +
      '<div class="form-row"><label>Output Column</label>' +
        '<input type="text" id="lr-dv-out" value="' + _lrEsc(config.outputColumn || 'validation_status') + '" style="width:100%"></div>';

    renderRules();

    div.querySelector('#lr-dv-add').addEventListener('click', function() {
      rules.push({ column: cols[0] || '', type: 'not_empty', param: '' });
      onChange('rules', rules.slice());

    return div;
  }
};

window.DWBNodes.DIFF_TABLES = {
  label: 'Diff Tables',
  icon: '📊',
  category: 'Logic & Reconcile',
  defaultConfig: { keyColumn: '', compareSnapshot: '' },

  run: function(rows, config) {
    if (!config.keyColumn || !config.compareSnapshot) return rows;
    var cmpRows = _lrSnapshotRows(config.compareSnapshot);
    if (!cmpRows) {
      console.warn('[DIFF_TABLES] Snapshot "' + config.compareSnapshot + '" not found — pass-through');
      return rows;
    }

    var keyCol  = config.keyColumn;
    var cmpMap  = {};
    cmpRows.forEach(function(cr) {
      var k = String(cr[keyCol] != null ? cr[keyCol] : '').trim();
      if (k) cmpMap[k] = cr;
    });

    var seenKeys = {};
    var outRows  = [];

    rows.forEach(function(row) {
      var nr  = Object.assign({}, row);
      var key = String(row[keyCol] != null ? row[keyCol] : '').trim();
      if (!key) { nr._diff_status = 'unchanged'; outRows.push(nr); return; }
      seenKeys[key] = 1;
      if (!cmpMap.hasOwnProperty(key)) {
        nr._diff_status = 'added';
      } else {
        var cmpRow  = cmpMap[key];
        var changed = false;
        var keys    = Object.keys(row);
        for (var i = 0; i < keys.length; i++) {
          var c = keys[i];
          if (String(row[c] != null ? row[c] : '') !== String(cmpRow[c] != null ? cmpRow[c] : '')) {
            changed = true; break;
          }
        }
        nr._diff_status = changed ? 'changed' : 'unchanged';
      }
      outRows.push(nr);
    });

    Object.keys(cmpMap).forEach(function(key) {
      if (!seenKeys[key]) {
        var removedRow = Object.assign({}, cmpMap[key], { _diff_status: 'removed' });
        outRows.push(removedRow);
      }
    });

    return outRows;
  },

  validate: function(config) {
    if (!config.keyColumn)        return 'Select a key column';
    if (!config.compareSnapshot)  return 'Select a snapshot to compare against';
    return null;
  },

  configUI: function(config, onChange, currentRows) {
    var div       = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;gap:8px';
    var cols      = _lrCols(currentRows);
    var snapNames = _lrSnapshotNames();

    var noSnapNote = !snapNames.length
      ? '<div style="font-size:11px;color:var(--text-faint);padding:6px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg-raised)">No snapshots available. Add a Push to Viz node upstream and run the pipeline first.</div>'
      : '';

    div.innerHTML =
      noSnapNote +
      '<div class="form-row"><label>Key Column</label>' +
        '<select id="lr-dt-key" style="width:100%">' + _lrColOptHtml(cols, config.keyColumn) + '</select></div>' +
      '<div class="form-row"><label>Compare Against Snapshot</label>' +
        '<select id="lr-dt-snap" style="width:100%">' + _lrSnapOptHtml(snapNames, config.compareSnapshot) + '</select></div>' +
      '<div style="font-size:11px;color:var(--text-muted)">Adds a <strong>_diff_status</strong> column: <em>added</em>, <em>removed</em>, <em>changed</em>, <em>unchanged</em>.</div>';

    div.querySelector('#lr-dt-key').addEventListener('change', function(e) { onChange('keyColumn', e.target.value); });
    div.querySelector('#lr-dt-snap').addEventListener('change', function(e) { onChange('compareSnapshot', e.target.value); });

    return div;
  }
};

    cols.forEach(function(col) {

      rowLbl.style.cssText = 'display:flex;align-items:center;gap:7px;padding:3px 2px;font-size:12px;cursor:pointer';
      var chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.value = col;
      chk.checked = selected.indexOf(col) !== -1;
      chk.addEventListener('change', function() { onToggle(col, chk.checked); });
      rowLbl.appendChild(chk);
      rowLbl.appendChild(document.createTextNode(col));
      list.appendChild(rowLbl);
    });
  }

  wrap.appendChild(list);
  return wrap;
}

/* Find a checkbox in a checklist element by its column value */
function _stFindChk(wrapEl, col) {
  var inputs = wrapEl.querySelectorAll('input[type=checkbox]');
  for (var i = 0; i < inputs.length; i++) {
    if (inputs[i].value === col) return inputs[i];
  }
  return null;
}

function _stUnpivot(rows, idColumns, valueColumns, nameLabel, valueLabel) {
  var out = [];
  rows.forEach(function(row) {
    valueColumns.forEach(function(col) {
      var newRow = {};
      idColumns.forEach(function(id) { newRow[id] = row[id]; });
      newRow[nameLabel] = col;
      newRow[valueLabel] = row[col];
      out.push(newRow);
    });
  });
  return out;
}

/* ── PIVOT ── */

function _stPivot(rows, idColumns, nameColumn, valueColumn, aggregation) {
  var groups = {};
  var groupOrder = [];
  rows.forEach(function(row) {
    var key = idColumns.map(function(id) { return row[id]; }).join('||');
    if (!groups[key]) {
      groups[key] = { idVals: {}, cells: {} };
      idColumns.forEach(function(id) { groups[key].idVals[id] = row[id]; });
      groupOrder.push(key);
    }
    var nameVal = String(row[nameColumn]);
    var val = row[valueColumn];
    if (!groups[key].cells[nameVal]) groups[key].cells[nameVal] = [];
    groups[key].cells[nameVal].push(val);
  });
  return groupOrder.map(function(key) {
    var g = groups[key];
    var out = Object.assign({}, g.idVals);
    Object.keys(g.cells).forEach(function(nameVal) {
      var vals = g.cells[nameVal];
      var resolved;
      if (aggregation === 'count') {
        resolved = vals.length;
      } else if (aggregation === 'sum') {
        resolved = vals.reduce(function(s, v) { return s + (parseFloat(v) || 0); }, 0);
      } else if (aggregation === 'average') {
        resolved = vals.length
          ? +(vals.reduce(function(s, v) { return s + (parseFloat(v) || 0); }, 0) / vals.length).toFixed(2)
          : 0;
      } else {
        resolved = vals[0]; // 'first'
      }
      out[nameVal] = resolved;
    });
    return out;
  });
}

window.DWBNodes = window.DWBNodes || {};

/* ── Shared helpers ── */

function _tfEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* Returns a .form-row div with a <label> and a <select> for column names.
   If currentRows is empty/absent the select gets a single disabled placeholder. */
function _tfColumnSelect(label, key, config, currentRows, onChange) {
  var wrap = document.createElement('div');
  wrap.className = 'form-row';
  var cols = (currentRows && currentRows.length) ? Object.keys(currentRows[0]) : [];
  var optionsHtml;
  if (cols.length) {
    optionsHtml = '<option value="">-- select --</option>' +
      cols.map(function(c) {
        return '<option value="' + _tfEsc(c) + '"' +
          (config[key] === c ? ' selected' : '') + '>' + _tfEsc(c) + '</option>';
      }).join('');
  } else {
    optionsHtml = '<option value="" disabled selected>Run pipeline to see columns</option>';
  }
  wrap.innerHTML = '<label>' + _tfEsc(label) + '</label>' +
    '<select style="width:100%">' + optionsHtml + '</select>';
  var sel = wrap.querySelector('select');
  sel.addEventListener('change', function(e) { onChange(key, e.target.value); });
  return wrap;
}

function _tfFormatDate(date, fmt) {
  if (isNaN(date.getTime())) return '';
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return fmt
    .replace('YYYY', date.getFullYear())
    .replace('MM',   pad(date.getMonth() + 1))
    .replace('DD',   pad(date.getDate()))
    .replace('HH',   pad(date.getHours()))
    .replace('mm',   pad(date.getMinutes()))
    .replace('ss',   pad(date.getSeconds()));
}

function _tfParseDate(value, inputFormat) {
  var s = String(value == null ? '' : value).trim();
  if (!s) return null;
  if (inputFormat) {
    /* Try known explicit patterns first */
    var m;
    if (inputFormat === 'MM/DD/YYYY') {
      m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m) return new Date(+m[3], +m[1] - 1, +m[2]);
    } else if (inputFormat === 'DD/MM/YYYY') {
      m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
    } else if (inputFormat === 'YYYY-MM-DD') {
      m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
    } else if (inputFormat === 'MM-DD-YYYY') {
      m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
      if (m) return new Date(+m[3], +m[1] - 1, +m[2]);
    } else if (inputFormat === 'DD-MM-YYYY') {
      m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
      if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
    }
  }
  /* Fallback: native Date parsing */
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function _tfSlugify(str) {
  return String(str).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function _tfApplyPhoneFormat(digits, format) {
  var di = 0;
  return format.split('').map(function(ch) {
    if (ch === 'X' && di < digits.length) { return digits[di++]; }
    return ch;
  }).join('');
}

window.DWBNodes.BASIC_MATH = {
  label: 'Basic Math',
  icon: '➗',
  category: 'Transform',
  defaultConfig: { columnA: '', operator: '+', columnB: '', constant: null, useConstant: false, outputColumn: 'result' },

  run: function(rows, config) {
    if (!config.columnA) return rows;
    var op       = config.operator || '+';
    var outCol   = (config.outputColumn || 'result').trim();
    var useConst = !!config.useConstant;
    var constVal = parseFloat(config.constant);
    if (isNaN(constVal)) constVal = 0;

    return rows.map(function(row) {
      var nr = Object.assign({}, row);
      try {
        var a = parseFloat(row[config.columnA]);
        var b = useConst ? constVal : parseFloat(row[config.columnB]);
        if (isNaN(a)) a = 0;
        if (isNaN(b)) b = 0;
        var result;
        switch (op) {
          case '+': result = a + b; break;
          case '-': result = a - b; break;
          case '*': result = a * b; break;
          case '/': result = b === 0 ? null : a / b; break;
          default:  result = null;
        }
        nr[outCol] = (result === null || !isFinite(result)) ? '' : result;
      } catch (e) {
        nr[outCol] = '';
      }
      return nr;
    });

  validate: function(config) {

window.DWBNodes = window.DWBNodes || {};

window.DWBNodes.INGEST = {
  label: 'Ingest CSV',
  icon: '📁',
  category: 'Input & Output',
  defaultConfig: { csvText: '', filename: '' },
  run: function(rows, config) { return rows; }, // handled by pipeline executor
  validate: function(config) { return null; },
  configUI: function(config, onChange, node) {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;flex-direction:column;gap:10px';

    const status = (config.filename || (node && node.config && node.config.filename))
      ? '<div style="font-size:12px;color:var(--success)">✓ Loaded: ' + (config.filename || node.config.filename) + '</div>'
      : '';

    div.innerHTML = `
      <div id="ingest-dz" style="border:2px dashed var(--border-strong);border-radius:6px;padding:20px;text-align:center;cursor:pointer;transition:all 0.15s">
        <div style="font-size:28px;margin-bottom:6px">📁</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Drop a CSV file here, or click Browse</div>
        <label style="display:inline-block;padding:5px 16px;background:var(--accent);color:#fff;border-radius:4px;font-size:12px;cursor:pointer">
          Browse…
          <input type="file" accept=".csv,.tsv,.txt" style="display:none" id="ingest-file-input">
        </label>
      </div>
      ${status}`;

    const input = div.querySelector('#ingest-file-input');
    const dz = div.querySelector('#ingest-dz');

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        // Parse CSV and store as sourceData
        const parsed = window.DWBPipeline.parseCSV(ev.target.result);
        const state = window.DWBState;
        const selectedId = state.selectedNodeId;
        const flowNode = state.flow.pipeline.nodes.find(function(n) { return n.id === selectedId; });
        if (!flowNode) return;

        // Find or create sourceData entry
        let sd = state.flow.pipeline.sourceData.find(function(s) { return s.id === flowNode.sourceId; });
        if (!sd) {
          sd = window.DWBSchema.createSourceData(file.name);
          state.flow.pipeline.sourceData.push(sd);
          flowNode.sourceId = sd.id;
        }
        sd.filename = file.name;
        sd.rows = parsed.rows;
        flowNode.label = file.name;
        window.DWBShell.markDirty();
        window.DWBPipeline.run().then(function() {
          window.DWBPipelineTab && window.DWBPipelineTab.refresh();
        });
      };
      reader.readAsText(file);
    }

    input.addEventListener('change', function(e) { handleFile(e.target.files[0]); });
    dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.style.borderColor = 'var(--accent)'; });
    dz.addEventListener('dragleave', function() { dz.style.borderColor = 'var(--border-strong)'; });
    dz.addEventListener('drop', function(e) {
      e.preventDefault(); dz.style.borderColor = 'var(--border-strong)';
      handleFile(e.dataTransfer.files[0]);
    });

    return div;
  }
};

/* === DWBio: file I/O and autosave === */

window.DWBio = (function() {
  const AUTOSAVE_KEY = 'dwb2_autosave';

  function autoSave() {
    const state = window.DWBState;
    if (!state || !state.flow) return;
    try {
      const data = window.DWBSchema.serialize(state.flow);
      localStorage.setItem(AUTOSAVE_KEY, data);
    } catch (e) {
      // storage quota or serialization error - non-fatal
    }
  }

  function loadAutoSave() {
    try {
      const raw = localStorage.getItem(AUTOSAVE_KEY);
      if (!raw) return false;
      const flow = window.DWBSchema.deserialize(raw);
      window.DWBShell.loadFlow(flow);
      window.DWBShell.log('Resumed autosaved flow: ' + flow.meta.name, 'success');
      // Refresh pipeline tab if already mounted
      setTimeout(function() {
        if (window.DWBState.pipelineTabMounted) {
          window.DWBPipelineTab && window.DWBPipelineTab.refresh();
        }
      }, 0);
      return true;
    } catch (e) {
      return false;
    }
  }

  function newFlow() {
    window.DWBShell.initNewFlow();
    window.DWBState.pipelineTabMounted = false;
    window.DWBPipelineTab && window.DWBPipelineTab.mount();
    window.DWBShell.switchTab('pipeline');
    window.DWBShell.log('New flow started', 'info');
  }

  function openFile(file) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const flow = window.DWBSchema.deserialize(ev.target.result);
        window.DWBShell.loadFlow(flow);
        window.DWBState.pipelineTabMounted = false;
        window.DWBPipelineTab && window.DWBPipelineTab.mount();
        window.DWBShell.switchTab('pipeline');
        window.DWBShell.log('Opened: ' + flow.meta.name, 'success');
      } catch (e) {
        window.DWBShell && window.DWBShell.log('Failed to open file: ' + e.message, 'error');
        alert('Could not open file: ' + e.message);
      }
    };
    reader.readAsText(file);
  }

  function saveFlow() {
    const state = window.DWBState;
    if (!state || !state.flow) return;
    try {
      const data = window.DWBSchema.serialize(state.flow);
      const name = (state.flow.meta.name || 'flow').replace(/[^a-zA-Z0-9_-]/g, '_');
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name + '.dwbflow';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      state.dirty = false;
      window.DWBTopbar && window.DWBTopbar.setDirty(false);
      window.DWBShell.log('Saved: ' + a.download, 'success');
    } catch (e) {
      window.DWBShell && window.DWBShell.log('Save failed: ' + e.message, 'error');
    }
  }

  return { autoSave: autoSave, loadAutoSave: loadAutoSave, newFlow: newFlow, openFile: openFile, saveFlow: saveFlow };
})();

window.DWBPipeline = (function() {
  function _parseCSV(text) {
    const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    const rows = [];
    let headers = null;

    function parseLine(line) {
      const result = [];
      let cur = '';
      let inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuote) {
          if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
          else if (ch === '"') { inQuote = false; }
          else { cur += ch; }
        } else {
          if (ch === '"') { inQuote = true; }
          else if (ch === ',') { result.push(cur); cur = ''; }
          else { cur += ch; }
        }
      }
      result.push(cur);
      return result;
    }

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const fields = parseLine(line);
      if (!headers) { headers = fields; continue; }
      if (fields.length === 0 || (fields.length === 1 && fields[0] === '')) continue;
      const row = {};
      headers.forEach(function(h, idx) { row[h] = fields[idx] !== undefined ? fields[idx] : ''; });
      rows.push(row);
    }
    return { headers: headers || [], rows };
  }

  function _peRunNodes(nodes, sourceData, stashes, snapshots, onLog) {
    let currentRows = [];
    const localStashes = Object.assign({}, stashes);
    const nodeResults = {};

    for (let i = 0; i < nodes.length; i++) {
      const node = nodes[i];
      const type = node.type;

      try {
        if (type === 'INGEST') {
          if (node.sourceId) {
            const sd = sourceData.find(function(s) { return s.id === node.sourceId; });
            if (sd) {
              if (typeof sd.rows === 'string') {
                const parsed = _parseCSV(sd.rows);
                sd._parsedRows = parsed.rows;
                currentRows = parsed.rows;
              } else {
                currentRows = Array.isArray(sd.rows) ? sd.rows : (sd._parsedRows || []);
              }
              onLog('Ingested ' + sd.filename + ': ' + currentRows.length + ' rows', 'success');
            }
          } else if (node.config && node.config.csvText) {
            const parsed = _parseCSV(node.config.csvText);
            currentRows = parsed.rows;
            onLog('Ingested inline CSV: ' + currentRows.length + ' rows', 'success');
          } else {
            currentRows = [];
          }
        } else if (type === 'STASH_SAVE') {
          const sname = (node.config && node.config.name) || ('stash_' + i);
          localStashes[sname] = currentRows.slice();
          onLog('Stashed "' + sname + '": ' + currentRows.length + ' rows', 'info');
        } else if (type === 'STASH_RESTORE') {
          const sname = (node.config && node.config.name) || '';
          if (localStashes[sname]) {
            currentRows = localStashes[sname].slice();
            onLog('Restored "' + sname + '": ' + currentRows.length + ' rows', 'info');
          } else {
            onLog('Stash "' + sname + '" not found', 'warn');
          }
        } else if (type === 'PUSH_TO_VIZ') {
          const sname = node.promotedAs || ('snapshot_' + i);
          if (sname) {
            snapshots[sname] = currentRows.slice();
            onLog('Pushed to viz as "' + sname + '": ' + currentRows.length + ' rows', 'success');
          }
          // pass-through: currentRows unchanged
        } else {
          const nodeImpl = window.DWBNodes && window.DWBNodes[type];
          if (nodeImpl && typeof nodeImpl.run === 'function') {
            const err = nodeImpl.validate ? nodeImpl.validate(node.config || {}) : null;
            if (err) {
              onLog(node.label + ': ' + err, 'warn');
            } else {
              currentRows = nodeImpl.run(currentRows, node.config || {});
            }
          } else {
            onLog('Unknown node type: ' + type + ' — passing through', 'warn');
          }
        }
        nodeResults[node.id] = { ok: true, rowCount: currentRows.length };
      } catch (e) {
        onLog(node.label + ' error: ' + e.message, 'error');
        nodeResults[node.id] = { ok: false, error: e.message, rowCount: currentRows.length };
      }
    }

    // copy local stashes back
    Object.assign(stashes, localStashes);
    return { rows: currentRows, nodeResults };
  }

  function run() {
    const state = window.DWBState;
    if (!state.flow) return Promise.resolve();
    state.snapshots = {};
    state.stashes = {};

    return new Promise(function(resolve) {
      try {
        const result = _peRunNodes(
          state.flow.pipeline.nodes,
          state.flow.pipeline.sourceData,
          state.stashes,
          state.snapshots,
          function(msg, level) { window.DWBShell && window.DWBShell.log(msg, level); }
        );
        resolve(result);
      } catch (e) {
        window.DWBShell && window.DWBShell.log('Pipeline error: ' + e.message, 'error');
        resolve({ rows: [], nodeResults: {} });
      }
    });
  }

  function runToNode(nodeId) {
    const state = window.DWBState;
    if (!state.flow) return Promise.resolve({ rows: [] });

    const nodes = state.flow.pipeline.nodes;
    const idx = nodes.findIndex(function(n) { return n.id === nodeId; });
    const subset = idx >= 0 ? nodes.slice(0, idx + 1) : nodes;
    const tmpSnaps = {};
    const tmpStashes = {};

    return new Promise(function(resolve) {
      try {
        const result = _peRunNodes(
          subset,
          state.flow.pipeline.sourceData,
          tmpStashes,
          tmpSnaps,
          function() {}
        );
        resolve(result);
      } catch (e) {
        resolve({ rows: [] });
      }
    });
  }

  return { run: run, runToNode: runToNode, parseCSV: _parseCSV };
})();

  function refresh() {
    _ptRenderNodeList();
    // Run pipeline and refresh inspector
    window.DWBPipeline.run().then(function(result) {
      _ptCurrentRows = result ? result.rows : [];
      _ptRenderInspector(_ptCurrentRows);
      _ptRenderStashes();
      // Re-select currently selected node config
      if (window.DWBState.selectedNodeId) {
        _ptSelectNode(window.DWBState.selectedNodeId, true);
      }
    });
  }

  function _ptRenderNodeList() {
    const list = document.getElementById('pt-node-list');
    if (!list) return;
    const state = window.DWBState;
    const nodes = state.flow ? state.flow.pipeline.nodes : [];
    const countEl = document.getElementById('pt-node-count');
    if (countEl) countEl.textContent = nodes.length + ' node' + (nodes.length !== 1 ? 's' : '');

    list.innerHTML = nodes.map(function(node) {
      const icon = _ptNodeIcon(node.type);
      const label = node.label || _ptNodeLabel(node.type);
      const isSelected = node.id === state.selectedNodeId;
      return `<div class="pt-node-card${isSelected ? ' selected' : ''}" data-node-id="${node.id}">
        <div class="status-dot idle" data-status-dot="${node.id}"></div>
        <span class="pt-node-icon">${icon}</span>
        <div class="pt-node-info">
          <div class="pt-node-name" title="${_esc(label)}">${_esc(label)}</div>
          <div class="pt-node-type">${node.type}</div>
        </div>
        <button class="pt-node-del" data-del-id="${node.id}" title="Delete node">✕</button>
      </div>`;
    }).join('');

    if (nodes.length === 0) {
      list.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-faint);font-size:11px">No nodes yet.<br>Click ＋ Add Node to start.</div>';
    }

    list.querySelectorAll('.pt-node-card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.pt-node-del')) return;
        _ptSelectNode(card.dataset.nodeId, false);
      });
    });
    list.querySelectorAll('.pt-node-del').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        _ptDeleteNode(btn.dataset.delId);
      });
    });
  }

  function _ptSelectNode(nodeId, skipRun) {
    const state = window.DWBState;
    state.selectedNodeId = nodeId;
    _ptRenderNodeList();

    // Build config UI
    const configBody = document.getElementById('pt-config-body');
    if (!configBody) return;

    const node = state.flow && state.flow.pipeline.nodes.find(function(n) { return n.id === nodeId; });
    if (!node) { configBody.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:8px 0">Node not found.</div>'; return; }

    const nodeImpl = window.DWBNodes && window.DWBNodes[node.type];

    if (skipRun) {
      _ptBuildConfigUI(configBody, node, nodeImpl, []);
      return;
    }

    // Run up to selected node for preview
    window.DWBPipeline.runToNode(nodeId).then(function(result) {
      _ptPreviewRows = result ? result.rows : [];
      _ptRenderInspector(_ptPreviewRows);
      _ptBuildConfigUI(configBody, node, nodeImpl, _ptPreviewRows);
    });
  }

  function _ptBuildConfigUI(configBody, node, nodeImpl, currentRows) {
    configBody.innerHTML = `<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px">${_esc(node.label || node.type)}</div>`;

    if (node.type === 'PUSH_TO_VIZ') {
      // promotedAs config
      const d = document.createElement('div');
      d.innerHTML = `<div class="form-row"><label>Snapshot name</label>
        <input type="text" id="pv-promoted" value="${_esc(node.promotedAs||'')}" placeholder="e.g. sales_data" style="width:100%"></div>`;
      d.querySelector('#pv-promoted').addEventListener('input', function(e) {
        node.promotedAs = e.target.value.trim();
        window.DWBShell.markDirty();
      });
      configBody.appendChild(d);
    }

    if (nodeImpl && typeof nodeImpl.configUI === 'function') {
      try {
        const uiEl = nodeImpl.configUI(
          node.config || {},
          function(key, val) {
            node.config = node.config || {};
            node.config[key] = val;
            window.DWBShell.markDirty();
          },
          currentRows,
          node
        );
        if (uiEl) configBody.appendChild(uiEl);
      } catch (e) {
        configBody.innerHTML += '<div style="color:var(--danger);font-size:11px">Config UI error: ' + _esc(e.message) + '</div>';
      }
    } else if (!nodeImpl) {
      configBody.innerHTML += '<div style="font-size:12px;color:var(--text-muted)">No config for ' + _esc(node.type) + '</div>';
    }

    // Apply button
    const applyBtn = document.createElement('button');
    applyBtn.className = 'btn-primary';
    applyBtn.style.cssText = 'width:100%;margin-top:12px;padding:7px';
    applyBtn.textContent = '▶ Apply & Run';
    applyBtn.addEventListener('click', function() {
      window.DWBPipeline.run().then(function(result) {
        _ptCurrentRows = result ? result.rows : [];
        _ptRenderInspector(_ptCurrentRows);
        _ptRenderStashes();
        _ptRenderNodeList();
      });
    });
    configBody.appendChild(applyBtn);
  }

  function _ptDeleteNode(nodeId) {
    const state = window.DWBState;
    if (!state.flow) return;
    const nodes = state.flow.pipeline.nodes;
    const idx = nodes.findIndex(function(n) { return n.id === nodeId; });
    if (idx < 0) return;
    const removed = nodes.splice(idx, 1)[0];
    // Remove sourceData if it was INGEST
    if (removed.type === 'INGEST' && removed.sourceId) {
      state.flow.pipeline.sourceData = state.flow.pipeline.sourceData.filter(function(s) { return s.id !== removed.sourceId; });
    }
    if (state.selectedNodeId === nodeId) state.selectedNodeId = null;
    window.DWBShell.markDirty();
    refresh();
  }

  function _ptRenderInspector(rows) {
    const wrap = document.getElementById('pt-table-wrap');
    const meta = document.getElementById('pt-meta-text');
    if (!wrap) return;

    if (!rows || rows.length === 0) {
      wrap.innerHTML = '<div class="pt-inspector-empty"><div class="ei-icon">📊</div><div>No data — add and configure nodes</div></div>';
      if (meta) meta.textContent = 'No data';
      return;
    }

    const cols = Object.keys(rows[0]);
    const previewRows = rows.slice(0, 200);

    // Column statistics
    const stats = {};
    cols.forEach(function(col) {
      let filled = 0;
      rows.forEach(function(r) { if (r[col] !== '' && r[col] !== null && r[col] !== undefined) filled++; });
      stats[col] = Math.round((filled / rows.length) * 100);
    });

    let html = '<table class="dwb-data-table" style="font-size:12px">';
    html += '<thead><tr><th style="width:40px"></th>';
    cols.forEach(function(col) {
      html += '<th><div class="col-header-name" style="padding:4px 8px;font-weight:600;font-size:12px">' + _esc(col) + '</div>';
      html += '<div class="vdp"><div class="vdp-stats"><span>' + stats[col] + '% filled</span></div>';
      html += '<div class="vdp-bar-track"><div class="vdp-bar-fill" style="width:' + stats[col] + '%"></div></div></div></th>';
    });
    html += '</tr></thead><tbody>';

    previewRows.forEach(function(row, i) {
      html += '<tr><td class="row-num-cell">' + (i + 1) + '</td>';
      cols.forEach(function(col) {
        const v = row[col] !== undefined ? String(row[col]) : '';
        html += '<td title="' + _esc(v) + '">' + _esc(v.length > 80 ? v.slice(0,80) + '…' : v) + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table>';

    wrap.innerHTML = html;
    if (meta) {
      const preview = _ptPreviewRows !== null ? ' (preview to selected node)' : '';
      meta.textContent = rows.length.toLocaleString() + ' rows · ' + cols.length + ' columns' + preview;
    }

    // overflow hint
    const inspector = document.getElementById('pt-inspector');
    if (inspector) {
      inspector.classList.toggle('has-overflow', wrap.scrollHeight > wrap.clientHeight + 10);
    }
  }

  function _ptRenderStashes() {
    const list = document.getElementById('pt-stash-list');
    if (!list) return;
    const stashes = window.DWBState.stashes || {};
    const keys = Object.keys(stashes);
    if (keys.length === 0) {
      list.innerHTML = '<div style="padding:6px 10px;font-size:11px;color:var(--text-faint)">No stashes</div>';
      return;
    }
    list.innerHTML = keys.map(function(k) {
      return `<div class="pt-stash-item">
        <span class="pt-stash-name">${_esc(k)}</span>
        <span class="pt-stash-count">${(stashes[k]||[]).length} rows</span>
      </div>`;
    }).join('');
  }

  function _ptShowNodePicker() {
    const overlay = document.getElementById('node-picker-overlay');
    if (!overlay) return;
    overlay.classList.remove('hidden');
    _ptBuildNodePicker();
  }

  function _ptBuildNodePicker() {
    const tabsEl = document.getElementById('picker-cat-tabs');
    const listEl = document.getElementById('picker-list');
    const searchEl = document.getElementById('picker-search');
    if (!tabsEl || !listEl) return;

    let activeCat = _ptNodeCats[0].cat;

    function renderList(query) {
      listEl.innerHTML = '';
      _ptNodeCats.forEach(function(catDef) {
        if (activeCat !== catDef.cat && !query) return;
        catDef.nodes.forEach(function(type) {
          const impl = window.DWBNodes && window.DWBNodes[type];
          const label = impl ? impl.label : type;
          const icon  = impl ? (impl.icon || '⚙') : '⚙';
          if (query && !label.toLowerCase().includes(query.toLowerCase()) && !type.toLowerCase().includes(query.toLowerCase())) return;
          const item = document.createElement('div');
          item.className = 'picker-item';
          item.innerHTML = `<span class="picker-item-icon">${icon}</span>
            <div><div class="picker-item-title">${_esc(label)}</div>
            <div class="picker-item-desc" style="font-size:11px;color:var(--text-muted)">${type}</div></div>`;
          item.addEventListener('click', function() {
            _ptAddNode(type, label);
            document.getElementById('node-picker-overlay').classList.add('hidden');
          });
          listEl.appendChild(item);
        });
      });
      if (!listEl.children.length) {
        listEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12px">No nodes found</div>';
      }
    }

    tabsEl.innerHTML = _ptNodeCats.map(function(c) {
      return '<button class="picker-tab" data-cat="' + _esc(c.cat) + '">' + _esc(c.cat) + '</button>';
    }).join('');

    tabsEl.querySelectorAll('.picker-tab').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.cat === activeCat);
      btn.addEventListener('click', function() {
        activeCat = btn.dataset.cat;
        tabsEl.querySelectorAll('.picker-tab').forEach(function(b) { b.classList.toggle('active', b.dataset.cat === activeCat); });
        if (searchEl) searchEl.value = '';
        renderList('');
      });
    });

    if (searchEl) {
      searchEl.value = '';
      searchEl.oninput = function() { renderList(searchEl.value.trim()); };
    }

    renderList('');
  }

  function _ptAddNode(type, label) {
    const state = window.DWBState;
    if (!state.flow) return;
    const node = window.DWBSchema.createNode(type, label);
    // Copy default config from implementation
    const impl = window.DWBNodes && window.DWBNodes[type];
    if (impl && impl.defaultConfig) {
      node.config = JSON.parse(JSON.stringify(impl.defaultConfig));
    }
    state.flow.pipeline.nodes.push(node);
    state.selectedNodeId = node.id;
    window.DWBShell.markDirty();
    refresh();
  }

  function _ptWireResize() {
    const divider = document.getElementById('pt-resize-divider');
    if (!divider) return;
    let startY, startH;
    divider.addEventListener('mousedown', function(e) {
      e.preventDefault();
      startY = e.clientY;
      const panel = document.getElementById('pt-config-panel');
      startH = panel ? panel.offsetHeight : 220;
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    function onMove(e) {
      const panel = document.getElementById('pt-config-panel');
      if (!panel) return;
      const delta = e.clientY - startY;
      const newH = Math.max(32, Math.min(600, startH + delta));
      panel.style.flexBasis = newH + 'px';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
  }

  function _ptWireNodePickerModal() {
    // Nothing extra needed - picker is wired in _ptBuildNodePicker
  }

  function appendLog(entry) {
    const logEl = document.getElementById('pt-console-log');
    if (!logEl) return;
    _ptAppendLogDOM(logEl, entry);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function _ptAppendLogDOM(logEl, entry) {
    const line = document.createElement('div');
    line.className = 'log-line ' + (entry.level || 'info');
    line.innerHTML = '<span class="log-ts">' + _esc(entry.ts) + '</span><span class="log-msg">' + _esc(entry.msg) + '</span>';
    logEl.appendChild(line);
  }

  function renderNodeList() { _ptRenderNodeList(); }

  function _esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  return { mount: mount, refresh: refresh, appendLog: appendLog, renderNodeList: renderNodeList };
})();

  var tooltip = document.getElementById('sp-tour-tooltip');
  if (tooltip) tooltip.remove();
  if (_spResizeHandler) {
    window.removeEventListener('resize', _spResizeHandler);
    _spResizeHandler = null;
  }
  localStorage.setItem('dwb2_toured', '1');
  if (window.DWBShell && window.DWBState && !window.DWBState.flow) {
    window.DWBShell.initNewFlow('Untitled Flow');
  }
}

function _spHasNextStep(fromIdx) {
  for (var i = fromIdx + 1; i < _spTourSteps.length; i++) {
    if (document.querySelector(_spTourSteps[i].target)) return true;
  }
  return false;
}

function _spAdvanceToStep(idx) {
  while (idx < _spTourSteps.length && !document.querySelector(_spTourSteps[idx].target)) {
    idx++;
  }
  if (idx >= _spTourSteps.length) {
    _spEndTour();
    return;
  }
  _spCurrentStep = idx;
  _spRenderStep(idx);
}

function _spRenderStep(idx) {
  var step = _spTourSteps[idx];
  var target = document.querySelector(step.target);

  var overlay = document.getElementById('sp-tour-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'sp-tour-overlay';
    document.body.appendChild(overlay);
  }

  var ring = document.getElementById('sp-tour-ring');
  if (!ring) {
    ring = document.createElement('div');
    ring.id = 'sp-tour-ring';
    document.body.appendChild(ring);
  }
  _spPositionRing(ring, target);

  var tooltip = document.getElementById('sp-tour-tooltip');
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.id = 'sp-tour-tooltip';
    document.body.appendChild(tooltip);
  }

  var isFirst = (idx === 0);
  var isLast  = !_spHasNextStep(idx);

  tooltip.innerHTML = _spBuildTooltipHTML(idx, step, isFirst, isLast);
  _spPositionTooltip(tooltip, target);

  var btnBack = tooltip.querySelector('#sp-tour-back');
  var btnNext = tooltip.querySelector('#sp-tour-next');
  var btnSkip = tooltip.querySelector('#sp-tour-skip');

  if (btnBack) {
    btnBack.addEventListener('click', function() {
      var prev = _spCurrentStep - 1;
      while (prev >= 0 && !document.querySelector(_spTourSteps[prev].target)) {
        prev--;
      }
      if (prev >= 0) {
        _spCurrentStep = prev;
        _spRenderStep(prev);
      }
    });
  }

  btnNext.addEventListener('click', function() {
    if (isLast) {
      _spEndTour();
    } else {
      _spAdvanceToStep(_spCurrentStep + 1);
    }
  });

  btnSkip.addEventListener('click', function() {
    _spEndTour();
  });

  if (_spResizeHandler) window.removeEventListener('resize', _spResizeHandler);
  _spResizeHandler = function() {
    var t = document.querySelector(_spTourSteps[_spCurrentStep].target);
    if (t) {
      _spPositionRing(ring, t);
      _spPositionTooltip(tooltip, t);
    }
  };
  window.addEventListener('resize', _spResizeHandler);
}

function _spPositionRing(ring, target) {
  var rect = target.getBoundingClientRect();
  var pad = 4;
  ring.style.top    = (rect.top    - pad) + 'px';
  ring.style.left   = (rect.left   - pad) + 'px';
  ring.style.width  = (rect.width  + pad * 2) + 'px';
  ring.style.height = (rect.height + pad * 2) + 'px';
}

function _spPositionTooltip(tooltip, target) {
  var rect = target.getBoundingClientRect();
  var vw   = window.innerWidth;
  var vh   = window.innerHeight;
  var TW   = 280;
  var TH   = tooltip.offsetHeight || 160;
  var GAP  = 12;

  var top, left;

  if (rect.bottom + GAP + TH <= vh - 8) {
    top = rect.bottom + GAP;
  } else {
    top = rect.top - GAP - TH;
    if (top < 8) top = Math.max(8, rect.bottom + GAP);
  }

  left = rect.left;
  if (left + TW > vw - 8) left = vw - TW - 8;
  if (left < 8) left = 8;

  tooltip.style.top  = top  + 'px';
  tooltip.style.left = left + 'px';
}

function _spBuildTooltipHTML(idx, step, isFirst, isLast) {
  return `<div class="sp-tip-step">Step ${idx + 1} of ${_spTourSteps.length}</div>
    <div class="sp-tip-title">${step.title}</div>
    <div class="sp-tip-desc">${step.desc}</div>
    <div class="sp-tip-nav">
      ${!isFirst ? '<button class="btn-secondary sp-tip-btn" id="sp-tour-back">← Back</button>' : '<span></span>'}
      <span class="flex-spacer"></span>
      <button class="sp-tip-skip" id="sp-tour-skip">Skip tour</button>
      <button class="btn-primary sp-tip-btn" id="sp-tour-next">${isLast ? 'Finish' : 'Next →'}</button>
    </div>`;
}

window.DWBSplash = {
  showSplash: _spShowSplash,
  hideSplash: _spHideSplash,
  startTour:  _spStartTour,
  endTour:    _spEndTour
};

})();

window.DWBShell = {
  initNewFlow: function(name) {
    window.DWBState.flow = window.DWBSchema.createFlow(name || 'Untitled Flow');
    window.DWBState.snapshots = {};
    window.DWBState.stashes = {};
    window.DWBState.selectedNodeId = null;

    window.DWBState.activeDisplayId = window.DWBState.flow.displays[0]
      ? window.DWBState.flow.displays[0].id : null;
    window.DWBState.dirty = false;
    window.DWBState.consoleLogs = [];
    window.DWBTopbar && window.DWBTopbar.updateTitle();
  },

  loadFlow: function(flow) {
    window.DWBState.flow = flow;
    window.DWBState.snapshots = {};
    window.DWBState.stashes = {};
    window.DWBState.selectedNodeId = null;
    window.DWBState.selectedVizId = null;
    window.DWBState.activeDisplayId = flow.displays && flow.displays[0]
      ? flow.displays[0].id : null;
    window.DWBState.dirty = false;
    window.DWBState.consoleLogs = [];
    window.DWBTopbar && window.DWBTopbar.updateTitle();
  },

  markDirty: function() {
    window.DWBState.dirty = true;
    window.DWBTopbar && window.DWBTopbar.setDirty(true);
    window.DWBio && window.DWBio.autoSave();
  },

  switchTab: function(tabName) {
    window.DWBState.activeTab = tabName;
    const panels = ['pipeline', 'viz', 'displays', 'wizard'];
    panels.forEach(function(p) {
      const el = document.getElementById('panel-' + p);
      if (el) el.style.display = (p === tabName) ? 'flex' : 'none';
    });
    const btns = document.querySelectorAll('.tab-mode-btn');
    btns.forEach(function(b) {
      b.classList.toggle('active', b.dataset.tab === tabName);
    });

    // Run pipeline first if snapshots empty and nodes exist
    const state = window.DWBState;
    const needsRun = Object.keys(state.snapshots).length === 0 &&
      state.flow && state.flow.pipeline.nodes.length > 0;

    if (tabName === 'viz') {
      const afterRun = function() { window.DWBVizTab && window.DWBVizTab.mount(); };
      needsRun ? window.DWBPipeline.run().then(afterRun) : afterRun();
    } else if (tabName === 'displays') {
      const afterRun = function() { window.DWBDisplaysTab && window.DWBDisplaysTab.mount(); };
      needsRun ? window.DWBPipeline.run().then(afterRun) : afterRun();
    } else if (tabName === 'wizard') {
      window.DWBWizard && window.DWBWizard.mount();
    } else if (tabName === 'pipeline') {
      if (state.pipelineTabMounted) {
        window.DWBPipelineTab && window.DWBPipelineTab.refresh();
      }
    }
  },

  log: function(msg, level) {
    const entry = { ts: new Date().toLocaleTimeString(), msg: String(msg), level: level || 'info' };
    window.DWBState.consoleLogs.push(entry);
    window.DWBPipelineTab && window.DWBPipelineTab.appendLog(entry);
  },

  confirm: function(title, body, onOk) {
    const overlay = document.getElementById('confirm-overlay');
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-body').textContent = body;
    overlay.classList.remove('hidden');
    const ok = document.getElementById('confirm-ok');
    const cancel = document.getElementById('confirm-cancel');
    const close = function() { overlay.classList.add('hidden'); };
    ok.onclick = function() { close(); onOk && onOk(); };
    cancel.onclick = close;
  }
};

    if (btnTheme) {
      btnTheme.addEventListener('click', function() {
        const isDark = document.documentElement.dataset.theme === 'dark';

      });
    }

    _tbRefreshName();
  }

  function _tbRefreshName() {
    const nameEl = document.getElementById('tb-flow-name');
    if (!nameEl) return;
    const state = window.DWBState;
    const name = (state && state.flow && state.flow.meta && state.flow.meta.name) || 'Untitled Flow';
    if (nameEl.textContent !== name) nameEl.textContent = name;
  }

  function updateTitle() {
    _tbRefreshName();
    setDirty(window.DWBState && window.DWBState.dirty);
  }

  function setDirty(dirty) {
    const dot = document.getElementById('tb-dirty-dot');
    if (dot) dot.style.display = dirty ? '' : 'none';
  }

  return { init: init, updateTitle: updateTitle, setDirty: setDirty };
})();

window.DWBVizTab = (function() {

    { type: 'TIMELINE_HORIZONTAL',   icon: '⏩', name: 'Timeline (H)',      desc: 'Horizontal timeline events' },

    { type: 'TIMELINE_VERTICAL',      icon: '📌', name: 'Timeline (V)',      desc: 'Vertical event timeline' },
    { type: 'FILTER_WIDGET',          icon: '🎛️', name: 'Filter Widget',    desc: 'Interactive filter control for the dashboard filter bar', category: 'Data' }
  ];

  function _vtLoadEcharts() {
    if (window.echarts) return Promise.resolve(window.echarts);
    if (_vtEchartsPromise) return _vtEchartsPromise;
    _vtEchartsPromise = new Promise(function(resolve, reject) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js';
      s.onload = function() { resolve(window.echarts); };
      s.onerror = function() { _vtEchartsPromise = null; reject(new Error('ECharts failed to load')); };
      document.head.appendChild(s);
      setTimeout(function() {
        if (!window.echarts) { _vtEchartsPromise = null; reject(new Error('ECharts load timeout')); }
      }, 8000);
    });
    return _vtEchartsPromise;
  }

  function _vtAggregateRows(rows, categoryField, valueField, aggregation) {
    const map = {};
    const order = [];
    rows.forEach(function(row) {
      const cat = String(row[categoryField] !== undefined ? row[categoryField] : '(blank)');
      const val = parseFloat(row[valueField]) || 0;
      if (!map[cat]) { map[cat] = { sum: 0, count: 0 }; order.push(cat); }
      map[cat].sum += val;
      map[cat].count++;
    });
    return order.map(function(cat) {
      const d = map[cat];
      let value;
      if (aggregation === 'count') value = d.count;
      else if (aggregation === 'average') value = d.count ? d.sum / d.count : 0;
      else value = d.sum;
      return { category: cat, value: Math.round(value * 100) / 100 };
    });
  }

  function mount() {
    const panel = document.getElementById('panel-viz');

    const snapshots = window.DWBState.snapshots || {};

          </select>

        db ? db.renderStackedDivergingBar(viz, rows, container) : _vtPlaceholder(container, 'STACKED_DIVERGING_BAR');

        });
      }
      var snapshots = window.DWBState.snapshots || {};
      var rows = snapshots[viz.snapshotName] || [];
      _vtRenderViz(viz, rows, renderArea);
    } else {
      _vtRenderCanvas();
    }
  }

  function _vtRenderBarVertical(viz, rows, container) {
    const cfg = viz.config || {};
    const catField = cfg.categoryField || (rows.length ? Object.keys(rows[0])[0] : '');
    const valField = cfg.valueField    || (rows.length ? Object.keys(rows[0])[1] : '');
    const agg      = cfg.aggregation   || 'sum';

    if (!catField || !valField || rows.length === 0) {
      container.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:12px">Configure category and value fields in the config panel.</div>';
      return;
    }

    const data = _vtAggregateRows(rows, catField, valField, agg);
    const el = document.createElement('div');
    el.style.cssText = 'width:100%;height:300px';
    container.innerHTML = '';
    container.appendChild(el);

    _vtLoadEcharts().then(function(ec) {
      const chart = ec.init(el);
      chart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: data.map(function(d) { return d.category; }), axisLabel: { rotate: 30, fontSize: 11 } },
        yAxis: { type: 'value' },
        series: [{ type: 'bar', data: data.map(function(d) { return d.value; }), itemStyle: { color: '#005EB8' } }],
        grid: { left: 50, right: 20, bottom: 60, top: 20 }
      });
      setTimeout(function() { chart.resize(); }, 50);
    }).catch(function() { _vtPlaceholder(container, 'BAR_VERTICAL (ECharts unavailable)'); });
  }

  function _vtRenderLine(viz, rows, container) {
    const cfg = viz.config || {};
    const catField = cfg.categoryField || (rows.length ? Object.keys(rows[0])[0] : '');
    const valField = cfg.valueField    || (rows.length ? Object.keys(rows[0])[1] : '');

      container.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:12px">Configure category and value fields.</div>';

    }

    const data = _vtAggregateRows(rows, catField, valField, agg);

    el.style.cssText = 'width:100%;height:300px';
    container.innerHTML = '';
    container.appendChild(el);

    _vtLoadEcharts().then(function(ec) {
      const chart = ec.init(el);
      chart.setOption({
        tooltip: { trigger: 'axis' },

        yAxis: { type: 'value' },
        series: [{ type: 'line', data: data.map(function(d) { return d.value; }), smooth: true, itemStyle: { color: '#005EB8' } }],
        grid: { left: 50, right: 20, bottom: 60, top: 20 }
      });
      setTimeout(function() { chart.resize(); }, 50);
    }).catch(function() { _vtPlaceholder(container, 'LINE (ECharts unavailable)'); });
